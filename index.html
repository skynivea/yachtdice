<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yacht Dice</title>
    <script src="/socket.io/socket.io.js"></script>
    <!-- 도파민 폭죽 이펙트용 오픈소스 라이브러리 탑재 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-hover: #2d2d2d;
            --accent-gold: #d4af37;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --matte-black: #1a1a1a;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 공통 버튼 */
        button {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: var(--surface-hover);
            border-color: var(--accent-gold);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* 1. 대기 화면 및 카드 뽑기 */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        #lobby-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 24px;
        }

        .title-logo {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .lobby-box {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .input-group input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent-gold);
        }

        /* 플레이어 리스트 */
        .player-list {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .player-tag {
            background-color: var(--matte-black);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 2. 카드 드로우 화면 */
        #card-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            text-align: center;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
            margin-top: 40px;
        }

        .matte-card {
            width: 140px;
            height: 210px;
            background: linear-gradient(145deg, #1f1f1f, #111111);
            border: 2px solid #222222;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .matte-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #444444;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }

        .matte-card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-back {
            background: radial-gradient(circle, #2a2a2a 20%, #111111 80%);
            border: 4px solid #1a1a1a;
        }

        .card-back::after {
            content: '?';
            font-size: 48px;
            font-weight: 800;
            color: #333333;
        }

        .card-front {
            background-color: var(--surface-color);
            transform: rotateY(180deg);
            border: 2px solid var(--accent-gold);
        }

        .card-front .number {
            font-size: 56px;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .card-front .owner {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* 3. 게임 메인 레이아웃 */
        #game-screen {
            display: none;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 100%;
        }

        /* 왼쪽 플레이 보드 */
        .play-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 최상단 프로필 바 */
        .profiles-bar {
            display: flex;
            gap: 12px;
            background-color: var(--surface-color);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .profile-card {
            background-color: var(--matte-black);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 120px;
            position: relative;
        }

        .profile-card.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }

        .profile-card.active::before {
            content: 'TURN';
            position: absolute;
            top: -10px;
            background-color: var(--accent-gold);
            color: black;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* 타이머 정보 */
        .timer-badge {
            background-color: #ef4444;
            color: white;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 4px;
        }

        /* 주사위 홈(Hold) & 필드(Roll) 구역 */
        .board-plate {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        /* 홀드 홈 구역 */
        .hold-home-zone {
            border: 2px dashed #444444;
            background-color: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            min-height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .hold-home-zone::after {
            content: 'HOLD ZONE (보관 홈)';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 11px;
            font-weight: bold;
            color: #555555;
            letter-spacing: 1px;
        }

        /* 컵(통) 및 흔들기 인터랙션 구역 */
        .shaking-plate {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: var(--matte-black);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .dice-cup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dice-cup {
            width: 100px;
            height: 120px;
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 2px solid #333333;
            border-radius: 12px 12px 40px 40px;
            position: relative;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease;
        }

        .dice-cup.shaking {
            animation: shakeCupAnim 0.15s infinite;
        }

        @keyframes shakeCupAnim {
            0% { transform: translate(3px, 5px) rotate(5deg); }
            50% { transform: translate(-3px, -5px) rotate(-5deg); }
            100% { transform: translate(2px, 4px) rotate(3deg); }
        }

        .cup-lid {
            position: absolute;
            top: 0;
            width: 100%;
            height: 10px;
            background-color: var(--accent-gold);
            border-radius: 12px 12px 0 0;
        }

        .cup-label {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-secondary);
        }

        /* 필드 (Roll Zone) */
        .roll-field-zone {
            background-color: #161616;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
            padding: 20px;
        }

        .roll-field-zone::after {
            content: 'ROLL FIELD (필드)';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 11px;
            font-weight: bold;
            color: #555555;
            letter-spacing: 1px;
        }

        /* 주사위 컴포넌트 */
        .dice {
            width: 70px;
            height: 70px;
            background-color: white;
            color: black;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            position: relative;
        }

        .dice:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        /* 주사위 도트 스타일 디자인 */
        .dice-dots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 46px;
            height: 46px;
        }

        .dot {
            background-color: #121212;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            margin: auto;
            visibility: hidden;
        }

        /* 주사위 눈별 도트 패턴 제어 */
        .dice[data-val="1"] .dot:nth-child(5) { visibility: visible; background-color: #ef4444; width: 12px; height: 12px; }
        .dice[data-val="2"] .dot:nth-child(1), .dice[data-val="2"] .dot:nth-child(9) { visibility: visible; }
        .dice[data-val="3"] .dot:nth-child(1), .dice[data-val="3"] .dot:nth-child(5), .dice[data-val="3"] .dot:nth-child(9) { visibility: visible; }
        .dice[data-val="4"] .dot:nth-child(1), .dice[data-val="4"] .dot:nth-child(3), .dice[data-val="4"] .dot:nth-child(7), .dice[data-val="4"] .dot:nth-child(9) { visibility: visible; }
        .dice[data-val="5"] .dot:nth-child(1), .dice[data-val="5"] .dot:nth-child(3), .dice[data-val="5"] .dot:nth-child(5), .dice[data-val="5"] .dot:nth-child(7), .dice[data-val="5"] .dot:nth-child(9) { visibility: visible; }
        .dice[data-val="6"] .dot:nth-child(1), .dice[data-val="6"] .dot:nth-child(3), .dice[data-val="6"] .dot:nth-child(4), .dice[data-val="6"] .dot:nth-child(6), .dice[data-val="6"] .dot:nth-child(7), .dice[data-val="6"] .dot:nth-child(9) { visibility: visible; }

        /* 게이지 바 */
        .gauge-container {
            width: 100%;
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .gauge-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold));
            width: 0%;
            transition: width 0.1s;
        }

        /* 4. 점수표 (우측 레이아웃) */
        .scoreboard-panel {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .scoreboard-title {
            font-size: 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th, .board-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .board-table th {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .score-row {
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .score-row:hover:not(.filled) {
            background-color: var(--surface-hover);
        }

        .score-row.filled {
            cursor: not-allowed;
        }

        .score-cell {
            text-align: right;
            font-weight: bold;
            font-size: 16px;
        }

        .score-cell.empty {
            color: #555555;
        }

        .score-cell.filled {
            color: var(--text-primary);
        }

        .score-cell.preview {
            color: rgba(255, 255, 255, 0.35);
        }

        /* 보너스 및 결과 칸 특별 스타일 */
        .bonus-row {
            background-color: rgba(212,175,55,0.05);
        }
        .total-row {
            background-color: rgba(255,255,255,0.05);
            font-weight: 800;
            font-size: 18px;
        }

        /* 모달 팝업 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 랭킹 최종 종료 화면 */
        #gameover-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .ranking-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }

        .ranking-item.winner {
            border-color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(212,175,55,0.1), transparent);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 대기 및 방 접속 화면 -->
        <div id="lobby-screen">
            <div>
                <h1 class="title-logo">YACHT DICE</h1>
                <p style="color: var(--text-secondary)">세련된 무광 다크 테마의 실시간 요트 다이스</p>
            </div>
            <div class="lobby-box">
                <div class="input-group">
                    <label>닉네임 설정</label>
                    <input type="text" id="nickname-input" placeholder="플레이어 닉네임" value="플레이어1">
                </div>
                <div class="input-group">
                    <label>방 코드</label>
                    <input type="text" id="room-input" placeholder="입장할 방 코드" value="YACHT101">
                </div>
                <button id="join-btn" style="margin-top: 10px;">접속하기</button>
            </div>

            <!-- 대기실 상태 -->
            <div id="room-waiting" style="display: none;">
                <h3 id="room-title">방 코드: -</h3>
                <div class="player-list" id="player-list"></div>
                <button id="start-game-btn" style="margin-top: 20px;" disabled>게임 시작하기</button>
                <p id="min-players-tip" style="color: var(--text-secondary); font-size: 12px; margin-top: 8px;">최소 1명 이상이어야 시작할 수 있습니다.</p>
            </div>
        </div>

        <!-- 2. 순서 결정 카드 뽑기 화면 -->
        <div id="card-screen">
            <h2>무광 검정 카드 뽑기</h2>
            <p style="color: var(--text-secondary)">뒷면을 터치해서 1~n 순서 번호를 뽑으세요. 조작 없는 100% 독립시행입니다.</p>
            <div class="card-container" id="card-container"></div>
        </div>

        <!-- 3. 본 플레이 화면 -->
        <div id="game-screen">
            <!-- 왼쪽 플레이 보드 영역 -->
            <div class="play-area">
                <!-- 프로필 타일 목록 -->
                <div class="profiles-bar" id="profiles-bar"></div>

                <!-- 주사위 제어판 플레이트 -->
                <div class="board-plate">
                    <!-- 1. 홀드 홈 구역 (보관 영역) -->
                    <div class="hold-home-zone" id="hold-home-zone"></div>

                    <!-- 2. 주사위 통(컵) 흔들기 및 컨트롤 섹션 -->
                    <div class="shaking-plate">
                        <div class="dice-cup-container">
                            <div class="dice-cup" id="dice-cup">
                                <div class="cup-lid"></div>
                            </div>
                            <span class="cup-label">드래그해 흔들기</span>
                            <div class="gauge-container">
                                <div class="gauge-fill" id="shake-gauge"></div>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 10px; align-items: flex-start;">
                            <div id="status-text" style="font-weight: 500;">플레이어의 차례입니다.</div>
                            <div id="rolls-left-text" style="color: var(--text-secondary); font-size: 14px;">리롤 남음: 3 / 3</div>
                            <div style="display: flex; gap: 10px;">
                                <button id="put-cup-btn">통에 주사위 넣기</button>
                                <button id="complete-turn-btn">리롤 끝내고 족보 기입</button>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 굴려진 주사위 필드 구역 -->
                    <div class="roll-field-zone" id="roll-field-zone"></div>
                </div>
            </div>

            <!-- 우측 스코어보드 채널 -->
            <div class="scoreboard-panel">
                <div class="scoreboard-title">
                    <span>족보 기입판</span>
                    <span id="turn-timer-badge" class="timer-badge">45초</span>
                </div>
                <table class="board-table">
                    <thead>
                        <tr>
                            <th>카테고리</th>
                            <th style="text-align: right;">점수</th>
                        </tr>
                    </thead>
                    <tbody id="score-tbody">
                        <!-- 족보 카테고리 로우들이 동적으로 배치됨 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 4. 게임오버 최종 랭킹 화면 -->
        <div id="gameover-screen">
            <h1 style="font-size: 40px; color: var(--accent-gold);">🏆 GAME OVER 🏆</h1>
            <p style="color: var(--text-secondary)">최종 순위 및 스코어보드</p>
            <div class="ranking-list" id="ranking-list"></div>
            <button id="lobby-back-btn" style="margin-top: 25px;">로비로 돌아가기</button>
        </div>
    </div>

    <!-- 기입 의사 확인 모달 -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <h3 id="modal-title">점수를 기입하시겠습니까?</h3>
            <p id="modal-desc" style="color: var(--text-secondary); font-size: 14px;"></p>
            <div style="display: flex; justify-content: center; gap: 12px; margin-top: 10px;">
                <button id="modal-cancel-btn">취소</button>
                <button id="modal-confirm-btn" style="background-color: var(--accent-blue); border-color: var(--accent-blue);">기입 확인</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        let myId = null;
        let activePlayerId = null;
        let isMyTurn = false;
        let rollsLeft = 3;
        let currentDice = [1, 1, 1, 1, 1];
        let currentKept = [true, true, true, true, true]; // 기본 상태는 컵 보관 상태
        let playersData = [];
        let scoreBoard = {};

        // DOM 요소 캡처
        const lobbyScreen = document.getElementById('lobby-screen');
        const cardScreen = document.getElementById('card-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameoverScreen = document.getElementById('gameover-screen');

        const joinBtn = document.getElementById('join-btn');
        const nicknameInput = document.getElementById('nickname-input');
        const roomInput = document.getElementById('room-input');
        const roomWaiting = document.getElementById('room-waiting');
        const startBtn = document.getElementById('start-game-btn');
        const playerList = document.getElementById('player-list');

        const cardContainer = document.getElementById('card-container');

        const profilesBar = document.getElementById('profiles-bar');
        const holdHomeZone = document.getElementById('hold-home-zone');
        const rollFieldZone = document.getElementById('roll-field-zone');
        const diceCup = document.getElementById('dice-cup');
        const shakeGauge = document.getElementById('shake-gauge');
        const statusText = document.getElementById('status-text');
        const rollsLeftText = document.getElementById('rolls-left-text');
        const putCupBtn = document.getElementById('put-cup-btn');
        const completeTurnBtn = document.getElementById('complete-turn-btn');
        const turnTimerBadge = document.getElementById('turn-timer-badge');
        const scoreTbody = document.getElementById('score-tbody');

        const confirmModal = document.getElementById('confirm-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');

        const rankingList = document.getElementById('ranking-list');
        const lobbyBackBtn = document.getElementById('lobby-back-btn');

        // 컵 드래그 흔들기 변수
        let isDraggingCup = false;
        let lastX = 0;
        let shakeProgress = 0;

        // 족보 정의
        const categories = [
            { id: 'ones', name: '에이스', desc: '1의 눈 총합' },
            { id: 'twos', name: '듀얼', desc: '2의 눈 총합' },
            { id: 'threes', name: '트리플', desc: '3의 눈 총합' },
            { id: 'fours', name: '쿼드', desc: '4의 눈 총합' },
            { id: 'fives', name: '펜타', desc: '5의 눈 총합' },
            { id: 'sixes', name: '헥사', desc: '6의 눈 총합' },
            { id: 'subtotal', name: '상단 소계', desc: '63점 돌파 시 보너스 +35', special: true },
            { id: 'choice', name: 'Choice', desc: '모든 눈의 총합' },
            { id: 'fourOfAKind', name: 'Four of a Kind', desc: '동일 눈 4개 이상 시 동일 눈 4개 합' },
            { id: 'fullHouse', name: 'Full House', desc: '3개 동일 + 2개 동일 조합 시 5개 합' },
            { id: 'smallStraight', name: '스몰 스트레이트', desc: '4개 연속 눈 (고정 15점)' },
            { id: 'largeStraight', name: '라지 스트레이트', desc: '5개 연속 눈 (고정 30점)' },
            { id: 'yacht', name: 'Yacht', desc: '5개 동일 눈 (고정 50점)' },
            { id: 'total', name: '총합 점수', desc: '', special: true }
        ];

        // 소켓 ID 캡처
        socket.on('connect', () => {
            myId = socket.id;
        });

        // 1. 대기방 조인
        joinBtn.addEventListener('click', () => {
            const nickname = nicknameInput.value.trim();
            const roomId = roomInput.value.trim();
            if (!nickname || !roomId) return alert('닉네임과 방 코드를 입력하세요.');

            socket.emit('joinRoom', { roomId, nickname });

            document.getElementById('room-title').innerText = `방 코드: ${roomId}`;
            roomWaiting.style.display = 'block';
            joinBtn.style.display = 'none';
            nicknameInput.disabled = true;
            roomInput.disabled = true;
        });

        socket.on('roomUpdate', ({ players, status }) => {
            playersData = players;
            playerList.innerHTML = '';
            players.forEach(p => {
                const tag = document.createElement('div');
                tag.className = 'player-tag';
                tag.innerHTML = `👤 ${p.nickname} ${p.id === socket.id ? '(나)' : ''}`;
                playerList.appendChild(tag);
            });

            // 방장 권한으로 시작버튼 제어 (첫 접속자)
            if (players.length > 0 && players[0].id === socket.id) {
                startBtn.removeAttribute('disabled');
                document.getElementById('min-players-tip').style.display = 'none';
            } else {
                startBtn.setAttribute('disabled', 'true');
            }
        });

        // 2. 카드 뽑기 연출 시작
        startBtn.addEventListener('click', () => {
            socket.emit('startGame');
        });

        socket.on('startCardDraw', ({ players, cards }) => {
            lobbyScreen.style.display = 'none';
            cardScreen.style.display = 'flex';
            renderCards(cards);
        });

        function renderCards(cards) {
            cardContainer.innerHTML = '';
            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `matte-card ${card.revealed ? 'flipped' : ''}`;
                cardEl.innerHTML = `
                    <div class="card-back"></div>
                    <div class="card-front">
                        <div class="number">${card.orderNum}</div>
                        <div class="owner">${card.drawnBy ? card.drawnBy : ''}</div>
                    </div>
                `;

                cardEl.addEventListener('click', () => {
                    if (!card.revealed) {
                        socket.emit('drawCard', card.id);
                    }
                });
                cardContainer.appendChild(cardEl);
            });
        }

        socket.on('cardRevealed', ({ cards }) => {
            renderCards(cards);
        });

        // 3. 본 게임 개시
        socket.on('turnStarted', ({ activePlayerId: activeId, turnIndex, rollsLeft: rolls, dice, kept, timeLeft }) => {
            cardScreen.style.display = 'none';
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'grid';

            activePlayerId = activeId;
            isMyTurn = (activeId === myId);
            rollsLeft = rolls;
            currentDice = dice;
            currentKept = kept;

            updateProfilesBar(turnIndex);
            updateStatusUI();
            renderDicePlate();
            renderScoreBoard();

            turnTimerBadge.innerText = `${timeLeft}초`;
        });

        socket.on('timerTick', (timeLeft) => {
            turnTimerBadge.innerText = `${timeLeft}초`;
            if (timeLeft <= 10) {
                turnTimerBadge.style.backgroundColor = '#ef4444';
            } else {
                turnTimerBadge.style.backgroundColor = 'var(--accent-blue)';
            }
        });

        // 프로필 바 렌더링 (플레이 순서 정렬 상태 유지)
        function updateProfilesBar(turnIndex) {
            profilesBar.innerHTML = '';
            playersData.forEach((player, idx) => {
                const card = document.createElement('div');
                card.className = `profile-card ${idx === turnIndex ? 'active' : ''}`;
                card.innerHTML = `
                    <span style="font-weight: 700;">${player.nickname}</span>
                    <span style="color: var(--accent-gold); font-size: 18px; font-weight: 800;">${player.totalScore} 점</span>
                `;
                profilesBar.appendChild(card);
            });
        }

        // 상태 지시 텍스트
        function updateStatusUI() {
            rollsLeftText.innerText = `리롤 남음: ${rollsLeft} / 3`;
            if (isMyTurn) {
                statusText.innerText = "당신의 차례입니다! 주사위를 흔들거나 족보를 기입하세요.";
                statusText.style.color = 'var(--accent-gold)';
                putCupBtn.disabled = (rollsLeft === 0);
                completeTurnBtn.disabled = false;
            } else {
                const activePlayer = playersData.find(p => p.id === activePlayerId);
                statusText.innerText = `${activePlayer ? activePlayer.nickname : '상대'}가 주사위를 굴리는 중입니다...`;
                statusText.style.color = 'white';
                putCupBtn.disabled = true;
                completeTurnBtn.disabled = true;
            }
        }

        // 주사위 돔 생성 공용 함수
        function createDiceElement(val, index, isHeld) {
            const d = document.createElement('div');
            d.className = 'dice';
            d.setAttribute('data-val', val);
            
            let dotsHtml = '<div class="dice-dots">';
            for(let i=0; i<9; i++) dotsHtml += '<div class="dot"></div>';
            dotsHtml += '</div>';
            d.innerHTML = dotsHtml;

            if (isMyTurn) {
                d.addEventListener('click', () => {
                    socket.emit('toggleKeep', index);
                });
            }
            return d;
        }

        // 주사위 홈 & 필드 분리 드로잉
        function renderDicePlate() {
            holdHomeZone.innerHTML = '';
            rollFieldZone.innerHTML = '';

            currentDice.forEach((val, idx) => {
                const isHeld = currentKept[idx];
                const diceEl = createDiceElement(val, idx, isHeld);

                if (isHeld) {
                    holdHomeZone.appendChild(diceEl);
                } else {
                    rollFieldZone.appendChild(diceEl);
                }
            });

            // 게이지 바 갱신
            shakeGauge.style.width = `${shakeProgress}%`;
        }

        // 컵 마우스 인터랙션으로 흔들기 구현
        let initialMouseX = 0;
        diceCup.addEventListener('mousedown', (e) => {
            if (!isMyTurn || rollsLeft === 0) return;
            // 컵에 아무것도 안담겨 있다면 흔들기 방지 (즉, 모두 필드에 나온 상태에서 그냥 흔들기 차단)
            if (!currentKept.some(k => k === true)) {
                return alert('먼저 [통에 주사위 넣기] 버튼을 누른 후 흔들어주세요.');
            }

            isDraggingCup = true;
            initialMouseX = e.clientX;
            diceCup.classList.add('shaking');
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDraggingCup) return;
            const currentX = e.clientX;
            const delta = Math.abs(currentX - initialMouseX);
            
            if (delta > 5) {
                initialMouseX = currentX;
                socket.emit('shakeCup', 2.5); // 서버로 흔들림 정도 전송
            }
        });

        window.addEventListener('mouseup', () => {
            if (!isDraggingCup) return;
            isDraggingCup = false;
            diceCup.classList.remove('shaking');

            if (shakeProgress >= 100) {
                // 완전히 다 흔들었을 때 쏟기 격발
                socket.emit('rollDice');
            } else {
                // 흔들다 멈췄을 땐 게이지 리셋
                shakeProgress = 0;
                socket.emit('shakeCup', -100);
            }
        });

        // 컵에 넣기 버튼 액션
        putCupBtn.addEventListener('click', () => {
            socket.emit('putDiceInCup');
        });

        // '통에 주사위 넣기' 처리 동기화
        socket.on('dicePutInCup', ({ kept }) => {
            currentKept = kept;
            shakeProgress = 0;
            renderDicePlate();
        });

        socket.on('cupShaking', ({ shakeProgress: servProgress, shakerNickname }) => {
            shakeProgress = servProgress;
            shakeGauge.style.width = `${shakeProgress}%`;
            if (!isMyTurn) {
                statusText.innerText = `${shakerNickname}가 컵을 마구 흔드는 중... (${Math.floor(shakeProgress)}%)`;
            }
        });

        // 주사위 필드로 떨어져서 리롤 완료
        socket.on('diceRolled', ({ dice, kept, rollsLeft: rolls }) => {
            currentDice = dice;
            currentKept = kept;
            rollsLeft = rolls;
            shakeProgress = 0;
            renderDicePlate();
            updateStatusUI();
            
            // 필드로 튕겨 나올 때 슬라이드/바운스 느낌 진동 효과
            rollFieldZone.style.animation = 'none';
            setTimeout(() => { rollFieldZone.style.animation = 'shakeCupAnim 0.2s 1'; }, 10);
        });

        socket.on('keepUpdated', (kept) => {
            currentKept = kept;
            renderDicePlate();
        });

        // 리롤 그만하고 즉시 점수표 호출
        completeTurnBtn.addEventListener('click', () => {
            // 필드에 꺼내져서 보관되지 않은 주사위가 있으면 전부 홀드 존으로 가져오는 애니메이션 연출을 위해 true 전환
            socket.emit('putDiceInCup');
            isMyTurn = false; // 카테고리 클릭 확정 전 임시 제어
            statusText.innerText = '족보 기입판에서 적용할 칸을 선택해 주세요.';
        });

        // 스코어 계산 도우미 로직 (클라이언트 프리뷰 전용)
        function previewScore(catId) {
            const counts = Array(7).fill(0);
            let sum = 0;
            currentDice.forEach(d => { counts[d]++; sum += d; });

            switch (catId) {
                case 'ones': return counts[1] * 1;
                case 'twos': return counts[2] * 2;
                case 'threes': return counts[3] * 3;
                case 'fours': return counts[4] * 4;
                case 'fives': return counts[5] * 5;
                case 'sixes': return counts[6] * 6;
                case 'choice': return sum;
                case 'fourOfAKind':
                    for(let i=1; i<=6; i++) { if(counts[i] >= 4) return i*4; }
                    return 0;
                case 'fullHouse':
                    let hasThree = false, hasTwo = false, tVal=0, twVal=0;
                    for(let i=1; i<=6; i++) {
                        if(counts[i] === 3) { hasThree = true; tVal=i; }
                        if(counts[i] === 2) { hasTwo = true; twVal=i; }
                        if(counts[i] === 5) { hasThree=true; hasTwo=true; tVal=i; twVal=i; }
                    }
                    return (hasThree && hasTwo) ? (tVal*3 + twVal*2) : 0;
                case 'smallStraight':
                    const uStr = Object.keys(counts).filter(k=>counts[k]>0).join('');
                    if(/1.*2.*3.*4|2.*3.*4.*5|3.*4.*5.*6/.test(uStr)) return 15;
                    return 0;
                case 'largeStraight':
                    const ulStr = Object.keys(counts).filter(k=>counts[k]>0).join('');
                    if(/1.*2.*3.*4.*5|2.*3.*4.*5.*6/.test(ulStr)) return 30;
                    return 0;
                case 'yacht':
                    for(let i=1; i<=6; i++) { if(counts[i] === 5) return 50; }
                    return 0;
                default: return 0;
            }
        }

        // 우측 족보 점수 기록판 렌더링
        function renderScoreBoard() {
            scoreTbody.innerHTML = '';
            const myData = playersData.find(p => p.id === myId);
            if (!myData) return;

            const board = myData.scoreBoard;

            // 서브토탈 상단 점수 합산 산출
            let upperSum = 0;
            ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'].forEach(c => upperSum += (board[c] || 0));

            categories.forEach(cat => {
                const tr = document.createElement('tr');
                tr.className = 'score-row';

                if (cat.special) {
                    tr.classList.add(cat.id === 'subtotal' ? 'bonus-row' : 'total-row');
                    const value = cat.id === 'subtotal' 
                        ? `${upperSum} / 63 ${myData.bonusEligible ? ' (+35 Bonus!)' : ''}` 
                        : `${myData.totalScore} 점`;
                    
                    tr.innerHTML = `
                        <td><strong>${cat.name}</strong></td>
                        <td class="score-cell filled">${value}</td>
                    `;
                } else {
                    const isFilled = board[cat.id] !== null;
                    if (isFilled) tr.classList.add('filled');

                    const scoreValue = isFilled ? board[cat.id] : previewScore(cat.id);
                    const cellClass = isFilled ? 'filled' : 'preview empty';

                    tr.innerHTML = `
                        <td>
                            <strong>${cat.name}</strong><br>
                            <span style="font-size: 11px; color: var(--text-secondary);">${cat.desc}</span>
                        </td>
                        <td class="score-cell ${cellClass}">${isFilled ? scoreValue + ' 점' : '(예상) ' + scoreValue}</td>
                    `;

                    // 본인 차례이고 아직 기록 안한 칸이면 기입 이벤트 등록
                    if (isMyTurn && !isHeldInCupState() && !isFilled) {
                        tr.addEventListener('click', () => {
                            showConfirmModal(cat.id, cat.name, scoreValue);
                        });
                    }
                }
                scoreTbody.appendChild(tr);
            });
        }

        // 주사위가 컵안에 들어가 숨겨져 있으면 점수를 적지 못하도록 체크
        function isHeldInCupState() {
            return currentKept.every(k => k === true) && rollsLeft === 3;
        }

        // 점수 기입 전 모달 띄우기
        let pendingCategory = null;
        function showConfirmModal(catId, catName, score) {
            pendingCategory = catId;
            modalTitle.innerText = `[${catName}]에 기입하시겠습니까?`;
            modalDesc.innerText = `확정 시 되돌릴 수 없습니다. 획득할 점수: ${score}점`;
            confirmModal.style.display = 'flex';
        }

        modalCancelBtn.addEventListener('click', () => {
            confirmModal.style.display = 'none';
        });

        modalConfirmBtn.addEventListener('click', () => {
            if (pendingCategory) {
                socket.emit('selectCategory', pendingCategory);
                confirmModal.style.display = 'none';
                pendingCategory = null;
            }
        });

        // 4. 도파민 대폭발 연출 정의
        socket.on('scoreSelected', ({ playerId, scoreBoard: sBoard, totalScore, category, score, isTimeout }) => {
            // 정보 업데이트
            const player = playersData.find(p => p.id === playerId);
            if (player) {
                player.scoreBoard = sBoard;
                player.totalScore = totalScore;
            }

            // 본인 기입 완료 시 임시 모달 닫기
            if (playerId === myId) {
                confirmModal.style.display = 'none';
            }

            // 도파민 연출 트리거 (폭죽)
            if (score > 0) {
                if (category === 'yacht') {
                    // 1. 요트 폭죽 (초특급 연출)
                    triggerBigConfetti();
                } else if (category === 'fullHouse' && score >= 27) {
                    // 2. 대박 풀하우스
                    triggerMediumConfetti('#3b82f6');
                } else if (category === 'fourOfAKind' && score >= 20) {
                    // 3. 고득점 쿼드
                    triggerMediumConfetti('#8b5cf6');
                }
            }
        });

        // 요트 파티 이펙트
        function triggerBigConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4af37', '#ffffff', '#ff0000']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4af37', '#ffffff', '#ff0000']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // 일반 족보 이펙트
        function triggerMediumConfetti(themeColor) {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: [themeColor, '#ffffff', '#ffae00']
            });
        }

        // 5. 게임오버 최종 랭킹
        socket.on('gameOver', (sortedPlayers) => {
            gameScreen.style.display = 'none';
            gameoverScreen.style.display = 'flex';
            rankingList.innerHTML = '';

            sortedPlayers.forEach((p, idx) => {
                const isWinner = (idx === 0);
                const item = document.createElement('div');
                item.className = `ranking-item ${isWinner ? 'winner' : ''}`;
                item.innerHTML = `
                    <div>
                        <strong style="color: var(--accent-gold); margin-right: 10px;">${idx + 1}위</strong>
                        <span>${p.nickname}</span>
                    </div>
                    <strong style="font-size: 22px;">${p.totalScore} 점</strong>
                `;
                rankingList.appendChild(item);
            });

            // 우승자 왕관 폭죽
            triggerBigConfetti();
        });

        lobbyBackBtn.addEventListener('click', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
