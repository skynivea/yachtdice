<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Deluxe</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark-gray: #121212;
            --bg-panel: #1e1e1e;
            --velvet-burgundy: #580f11; 
            --outer-black: #080808;      
            --accent-gold: #d4af37;
            --paper-white: #f5f5ee;      
            --paper-border: #cccccc;
        }
        body {
            background-color: var(--bg-dark-gray);
            color: #f5f5f5;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        
        #main-home, #waiting-lobby, #card-draw-stage {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #333;
            padding: 30px;
            margin-top: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .main-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 25px;
        }
        .lobby-title {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        .flat-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5c060, #d39325);
            color: #0d0d0d;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-outline {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-action {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn-action:hover:not(:disabled) {
            background: #d32f2f;
        }
        .btn-action:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 썸네일 리스트 스타일 */
        .profile-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .profile-card {
            position: relative;
            background: #252528;
            border: 2px solid #3e3e42;
            border-radius: 12px;
            width: 75px;
            padding: 10px 5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }
        .profile-card.active-turn {
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px var(--accent-gold);
        }
        .profile-avatar {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .profile-name {
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ddd;
        }
        .profile-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent-gold);
            color: #000;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        /* 크고 입체적인 실시간 이모티콘 리액션 말풍선 */
        .reaction-bubble {
            position: absolute;
            top: -65px;             /* 썸네일 머리 위로 넉넉하게 배치 */
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #ffffff;
            color: #000000;
            border: 3px solid #333333; /* 캐주얼한 느낌의 검은 테두리 */
            border-radius: 24px;
            width: 55px;            /* 크게 보이도록 크기 확장 */
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;        /* 이모티콘 자체 크기 키움 */
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            pointer-events: none;   /* 마우스 클릭 방해 금지 */
            animation: emojiPopIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .reaction-bubble::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-right: 3px solid #333333;
            border-bottom: 3px solid #333333;
        }
        @keyframes emojiPopIn {
            0% { transform: translateX(-50%) scale(0) translateY(15px); opacity: 0; }
            100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 1; }
        }

        /* 순서 카드 뽑기 스타일 */
        .card-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0;
        }
        .draw-card {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #444, #222);
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #777;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, background 0.3s, border-color 0.3s;
        }
        .draw-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }
        .draw-card.flipped {
            background: var(--paper-white);
            color: #111;
            border-color: var(--accent-gold);
            cursor: default;
            transform: rotateY(180deg);
        }

        #game-arena {
            display: flex;
            flex-direction: column;
            width: 98%;
            max-width: 1200px;
            margin: 10px auto;
        }
        .room-tag {
            text-align: center;
            font-size: 14px;
            background: var(--bg-panel);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #board-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            align-items: flex-start;
        }

        /* [좌측] 게임판 */
        #outer-board {
            flex: 1.2;
            background-color: var(--outer-black);
            border: 6px solid #222;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            aspect-ratio: 1 / 1;
        }

        .dice-slots-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 15px;
        }
        .dice-slot {
            flex: 1;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
        }

        #inner-velvet-field {
            flex: 1;
            background-color: var(--velvet-burgundy);
            border-radius: 16px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid #3d0709;
        }

        #active-dice-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        /* [중앙] 흔들기 구역 */
        #cup-shaker-zone {
            width: 140px;
            height: 420px;
            background: #181818;
            border: 2px dashed #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            box-sizing: border-box;
            position: relative;
        }
        .zone-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
            user-select: none;
        }

        /* 가죽 컵 */
        #dice-cup {
            width: 90px;
            height: 120px;
            background: linear-gradient(135deg, #3a2212 0%, #1c0e05 100%);
            border-left: 5px solid #28170b;
            border-right: 5px solid #28170b;
            border-top: 3px solid var(--accent-gold);
            border-bottom: 8px solid #100803;
            border-radius: 40px / 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 5px 15px rgba(255,255,255,0.05);
            cursor: grab;
            position: absolute;
            top: 150px;
            left: 25px;
            z-index: 500;
            touch-action: none;
            user-select: none;
            transition: transform 0.05s linear;
        }
        #dice-cup::after {
            content: '';
            position: absolute;
            bottom: 12px;
            width: 80%;
            height: 2px;
            background: #d4af37;
            opacity: 0.4;
        }
        #dice-cup:active { cursor: grabbing; }
        .cup-inner-text {
            color: var(--accent-gold);
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 35px;
        }

        /* 이모티콘 감정 표현 리액션 창 */
        .reaction-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 30px;
            margin-top: 10px;
            border: 1px solid #333;
        }
        .reaction-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .reaction-btn:hover {
            transform: scale(1.3);
        }

        /* [우측] 스코어판 */
        #scoreboard-section {
            flex: 1.4;
            background: var(--paper-white);
            color: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            box-sizing: border-box;
            overflow-x: auto;
        }
        .paper-title {
            font-size: 24px;
            font-weight: 900;
            text-align: left;
            margin: 0 0 15px 0;
            color: #111;
            letter-spacing: -1px;
        }
        
        .close-score-btn {
            display: none;
            background: #cc1111;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 320px;
        }
        th, td {
            border: 1px solid #c0c0b8;
            padding: 8px 5px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background: #e2e2da;
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }
        .category-label {
            text-align: left;
            padding-left: 10px;
            font-weight: bold;
            color: #222;
            min-width: 130px;
        }
        .score-cell {
            font-weight: 900;
            color: #888;
            background: rgba(0,0,0,0.02);
            transition: background 0.15s;
        }
        .score-cell.interactive {
            cursor: pointer;
        }
        .score-cell.confirmed {
            color: #1a1a1a;
            background: transparent;
            cursor: default;
        }
        .score-cell.active-preview {
            background: #ffe0b2 !important;
            color: #e65100 !important;
            font-size: 12px;
            border: 2px dashed #fb8c00;
        }
        .gray-row {
            background: #e9e9e2;
            font-weight: bold;
        }

        /* 주사위 디자인 */
        .dice {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 15px 15px, #ffffff, #eaeaea);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 -3px 0 #cccccc, inset 0 2px 3px rgba(255,255,255,0.9);
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: transform 0.1s ease, opacity 0.5s ease;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 5px;
            gap: 2px;
        }
        
        .dice.held {
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold), inset 0 -2px 0 #cccccc;
        }

        .dot {
            display: block;
            background-color: #111111;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            justify-self: center;
            align-self: center;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.5);
        }

        .dice[data-value="1"] .dot {
            grid-column: 2;
            grid-row: 2;
            width: 14px;
            height: 14px;
            background-color: #d32f2f;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
        }

        .pos-1 { grid-column: 1; grid-row: 1; }
        .pos-2 { grid-column: 3; grid-row: 1; }
        .pos-3 { grid-column: 1; grid-row: 2; }
        .pos-4 { grid-column: 2; grid-row: 2; }
        .pos-5 { grid-column: 3; grid-row: 2; }
        .pos-6 { grid-column: 1; grid-row: 3; }
        .pos-7 { grid-column: 3; grid-row: 3; }
        
        @keyframes dice-spurt {
            0% {
                transform: scale(0.2) rotate(0deg) translate(-50px, -50px);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(180deg) translate(10px, -10px);
                opacity: 0.8;
            }
            100% {
                transform: scale(1) rotate(360deg) translate(0, 0);
                opacity: 1;
            }
        }
        .dice-rolling {
            animation: dice-spurt 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .dice-glide {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
        }

        @keyframes dice-to-cup {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg) translate(150px, -50px);
                opacity: 0;
            }
        }
        .dice-gathering {
            animation: dice-to-cup 0.35s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards !important;
            pointer-events: none;
        }

        .roll-counter-display {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #ccc;
            margin-top: 15px;
        }
        .hidden { display: none !important; }

        /* 최종 결과창 모달 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .result-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-content {
            background: linear-gradient(135deg, #1e1e24 0%, #121214 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-modal.show .result-content {
            transform: scale(1);
        }

        .result-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        .result-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-rank {
            font-size: 32px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .result-score {
            font-size: 20px;
            color: #e0e0e0;
        }

        .close-result-btn {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .close-result-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        @media (max-width: 768px) {
            #board-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            #outer-board {
                width: 100%;
                max-width: 480px;
            }
            #cup-shaker-zone {
                width: 100%;
                max-width: 480px;
                height: 120px;
                flex-direction: row;
                padding: 10px 20px;
            }
            #dice-cup {
                top: 10px;
                left: calc(50% - 45px);
                height: 100px;
            }

            #scoreboard-section {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1000;
                border-radius: 0;
                background: var(--paper-white);
                overflow-y: auto;
                padding: 25px;
            }

            #scoreboard-section.mobile-open {
                display: block !important;
            }

            .close-score-btn {
                display: block;
            }
        }
    </style>
</head>
<body>

    <header style="background:#0a0a0a; width:100%; padding:15px; text-align:center; font-size:22px; font-weight:900; color:var(--accent-gold); border-bottom:1px solid #222;">
        YACHT DICE DELUXE
    </header>

    <!-- 1. 메인 홈 -->
    <div id="main-home">
        <h1 class="main-title">요트 다이스</h1>
        <div id="home-menu">
            <button class="btn-gold" onclick="showInputForm('create')">방 만들기</button>
            <button class="btn-outline" style="margin-top:10px;" onclick="showInputForm('join')">방 들어가기</button>
        </div>

        <div id="create-form" class="hidden">
            <h3 style="margin-top:0;">방 만들기</h3>
            <input type="text" id="nickname-create" class="flat-input" placeholder="닉네임 (최대 8자)" maxlength="8">
            <button class="btn-gold" onclick="createRoom()">방 생성</button>
            <button class="btn-outline" style="margin-top:8px;" onclick="goBackToMenu()">뒤로가기</button>
        </div>

        <div id="join-form" class="hidden">
            <h3 style="margin-top:0;">방 들어가기</h3>
            <input type="text" id="nickname-join" class="flat-input" placeholder="닉네임" maxlength="8">
            <input type="text" id="room-code-input" class="flat-input" placeholder="방 코드 (6자리)" maxlength="6" style="text-transform:uppercase;">
            <button class="btn-gold" onclick="joinRoom()">입장</button>
            <button class="btn-outline" style="margin-top:8px;" onclick="goBackToMenu()">뒤로가기</button>
        </div>
    </div>

    <!-- 2. 대기실 -->
    <div id="waiting-lobby" class="hidden">
        <div class="lobby-title">대기방</div>
        <div style="font-size: 28px; font-weight: bold; color: var(--accent-gold); margin: 10px 0;" id="lobby-code-display">-</div>
        
        <!-- 프로필 카드 리스트가 생성될 곳 -->
        <div id="lobby-profiles" class="profile-container"></div>
        
        <button id="start-btn" class="btn-gold hidden" onclick="startGame()">게임 시작</button>
        <div id="owner-waiting-msg" style="font-size:13px; color:#888;">방장이 시작하기를 기다리는 중...</div>
    </div>

    <!-- 3. 순서 카드 뽑기 스테이지 -->
    <div id="card-draw-stage" class="hidden">
        <div class="lobby-title" style="color:var(--accent-gold)">순서 카드 뽑기</div>
        <p style="font-size:13px; color:#ccc; margin-bottom:15px;">카드를 클릭해 선 턴을 정하는 운명의 뽑기를 진행하세요!</p>
        
        <div class="profile-container" id="card-draw-profiles"></div>
        <div class="card-grid" id="card-grid-container"></div>
    </div>

    <!-- 4. 인게임 메인 아레나 -->
    <div id="game-arena" class="hidden">
        <div class="room-tag">
            <span>방 코드: <strong id="room-code-display" style="color:var(--accent-gold);">-</strong></span>
            
            <div style="display:flex; gap: 5px;">
                <button id="show-score-btn" class="btn-outline" style="width:auto; padding:5px 12px; font-size:12px; background: #e65100; color:white; border:none;" onclick="openScoreboardMobile()">점수 확인</button>
                <button id="gyro-init-btn" class="btn-outline" style="width:auto; padding:5px 10px; font-size:11px;" onclick="requestGyroPermission()">흔들기 센서 활성화</button>
            </div>
            
            <span id="turn-indicator" style="font-weight:bold;">대기 중...</span>
        </div>

        <!-- 게임 상단: 프로필 썸네일 배열 -->
        <div id="game-profiles" class="profile-container" style="margin: 0 0 10px 0;"></div>

        <div id="board-wrapper">
            
            <!-- [왼쪽] 큰 네모 게임판 -->
            <div id="outer-board">
                <!-- 상단 홈 5개 -->
                <div class="dice-slots-container" id="hold-home">
                    <div class="dice-slot" data-index="0"></div>
                    <div class="dice-slot" data-index="1"></div>
                    <div class="dice-slot" data-index="2"></div>
                    <div class="dice-slot" data-index="3"></div>
                    <div class="dice-slot" data-index="4"></div>
                </div>

                <!-- 안쪽 작은 버건디 벨벳 필드 -->
                <div id="inner-velvet-field">
                    <div id="active-dice-area"></div>
                </div>

                <div class="roll-counter-display" id="roll-count-text">남은 횟수: 3/3</div>
                
                <!-- 액션 버튼 -->
                <button id="confirm-score-btn" class="btn-action" disabled onclick="forceEndRolls()">리롤 종료하고 점수 입력하기</button>
                <button id="restart-btn" class="btn-outline hidden" style="margin-top:10px;" onclick="requestRestart()">다시 하기</button>
                
                <!-- 감정 표현 이모티콘 퀵바 -->
                <div class="reaction-panel">
                    <button class="reaction-btn" onclick="sendReaction('😒')">😒</button>
                    <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
                    <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
                    <button class="reaction-btn" onclick="sendReaction('🎵')">🎵</button>
                    <button class="reaction-btn" onclick="sendReaction('🌀')">🌀</button>
                </div>
            </div>

            <!-- [중앙] 원통 컵 흔들기 구획 -->
            <div id="cup-shaker-zone">
                <div class="zone-label">자유롭게<br>사방으로<br>흔드세요</div>
                
                <!-- 원통 가죽 컵 -->
                <div id="dice-cup" class="hidden">
                    <div class="cup-inner-text">가죽 컵<br><br>흔들기</div>
                </div>

                <div class="zone-label">SHAKE IT</div>
            </div>

            <!-- [오른쪽/모바일 팝업] 스코어판 -->
            <div id="scoreboard-section">
                <!-- 모바일 전용 닫기 버튼 -->
                <button class="close-score-btn" onclick="closeScoreboardMobile()">닫기 (게임판으로)</button>

                <h2 class="paper-title">요트다이스</h2>
                <table id="score-table">
                    <thead>
                        <tr id="table-header">
                            <th>카테고리</th>
                        </tr>
                    </thead>
                    <tbody id="score-table-body">
                        <!-- JS 렌더링 영역 -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- 최종 결과 모달 팝업 -->
    <div id="game-result-modal" class="result-modal">
        <div class="result-content">
            <div class="result-title">GAME OVER</div>
            <div class="result-summary">
                <div id="my-final-rank" class="result-rank">1등</div>
                <div id="my-final-score" class="result-score">최종 점수: 0점</div>
            </div>
            
            <!-- 최종 순위표 요약 -->
            <div id="leaderboard-list" style="margin-bottom: 20px; text-align: left; padding: 0 10px;">
                <!-- 실시간 동적 렌더링 영역 -->
            </div>

            <button class="close-result-btn" onclick="closeResultModal()">확인</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let myId = null;
        let isClientRolling = false;
        let isDelayedMoving = false; 
        let selectedCategory = null; 

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playClatterSound() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const now = audioCtx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const timeOffset = i * 0.08;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(120 + Math.random() * 80, now + timeOffset);
                    osc.frequency.exponentialRampToValueAtTime(300 + Math.random() * 200, now + timeOffset + 0.05);
                    
                    gain.gain.setValueAtTime(0.15, now + timeOffset);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + timeOffset + 0.06);

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + timeOffset);
                    osc.stop(now + timeOffset + 0.07);
                }
            } catch (e) { console.log(e); }
        }

        const categories = [
            { id: 'aces', name: '에이스' },
            { id: 'duals', name: '듀얼' }, 
            { id: 'triples', name: '트리플' },
            { id: 'quads', name: '쿼드' },
            { id: 'pentas', name: '펜타' },
            { id: 'hexas', name: '헥사' },
            { id: 'bonus', name: '상단 보너스 +35점', isSpecial: true }, 
            { id: 'choice', name: '초이스' }, 
            { id: 'poker', name: '포커' },
            { id: 'full_house', name: '풀 하우스' },
            { id: 's_straight', name: '스몰 스트레이트' },
            { id: 'l_straight', name: '라지 스트레이트' },
            { id: 'yacht', name: '요트' },
            { id: 'total', name: '총점', isSpecial: true }
        ];

        let isDraggingCup = false;
        let lastX = 0, lastY = 0;
        let totalDragDistance = 0;
        let lastSoundTime = 0;

        let lastShakingX = null, lastShakingY = null, lastShakingZ = null;
        let shakeThreshold = 15; 
        let shakeAccumulator = 0;

        function openScoreboardMobile() {
            document.getElementById("scoreboard-section").classList.add("mobile-open");
        }

        function closeScoreboardMobile() {
            document.getElementById("scoreboard-section").classList.remove("mobile-open");
        }

        function showInputForm(type) {
            document.getElementById("home-menu").classList.add("hidden");
            if (type === 'create') {
                document.getElementById("create-form").classList.remove("hidden");
            } else {
                document.getElementById("join-form").classList.remove("hidden");
            }
        }

        function goBackToMenu() {
            document.getElementById("create-form").classList.add("hidden");
            document.getElementById("join-form").classList.add("hidden");
            document.getElementById("home-menu").classList.remove("hidden");
        }

        function createRoom() {
            const nickname = document.getElementById("nickname-create").value.trim() || `Player1`;
            socket.emit('createRoom', { nickname });
        }

        function joinRoom() {
            const nickname = document.getElementById("nickname-join").value.trim() || `Player2`;
            const roomCode = document.getElementById("room-code-input").value.trim().toUpperCase();
            if (!roomCode) return alert("방 코드를 입력하세요.");
            socket.emit('joinRoom', { roomCode, nickname });
        }

        function startGame() {
            if (!currentRoom || !currentRoom.code) return;
            socket.emit('startGame', { roomCode: currentRoom.code });
        }

        function requestRestart() {
            if (!currentRoom || !currentRoom.code) return;
            socket.emit('restartGame', { roomCode: currentRoom.code });
        }

        function handleCellClick(categoryId) {
            if (isClientRolling || isDelayedMoving) return;
            
            if (selectedCategory === categoryId) {
                confirmSelectedScore();
            } else {
                selectedCategory = categoryId;
                renderScoreBoard(); 
            }
        }

        function confirmSelectedScore() {
            if (!selectedCategory || !currentRoom) return;
            socket.emit('writeScore', {
                roomCode: currentRoom.code,
                category: selectedCategory
            });
            selectedCategory = null;
            closeScoreboardMobile();
        }

        function forceEndRolls() {
            if (!currentRoom || isClientRolling || isDelayedMoving) return;
            
            currentRoom.isHeld = [true, true, true, true, true];
            isDelayedMoving = true;
            renderDice(false);
            
            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: [true, true, true, true, true]
            });

            setTimeout(() => {
                isDelayedMoving = false;
                renderDice(false);
                renderScoreBoard();
                updateCupState();
                openScoreboardMobile();
            }, 800);
        }

        // 이모티콘 보내기 전송 함수 (HTML의 sendReaction과 맞춤)
        function sendReaction(emoji) {
            if (!currentRoom) return;
            socket.emit('sendReaction', { roomCode: currentRoom.code, reaction: emoji });
        }

        // 서버 오류 알림 수신
        socket.on('errorMsg', (msg) => {
            alert(msg);
        });

        socket.on('roomCreated', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        socket.on('roomJoined', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        function transitionToLobby(roomCode) {
            document.getElementById("main-home").classList.add("hidden");
            document.getElementById("waiting-lobby").classList.remove("hidden");
            document.getElementById("lobby-code-display").innerText = roomCode;
        }

        // 실시간 이모티콘 리액션 수신 및 예쁜 말풍선 팝업 처리
        socket.on('receiveReaction', ({ senderId, reaction }) => {
            // 인게임 및 대기실 화면 전체에서 senderId에 일치하는 프로필 요소를 정교하게 찾음
            const card = document.querySelector(`#game-profiles [data-player-id="${senderId}"]`) 
                       || document.querySelector(`#lobby-profiles [data-player-id="${senderId}"]`)
                       || document.querySelector(`.profile-card[data-player-id="${senderId}"]`);
            
            if (card) {
                // 기존 말풍선이 띄워져 있다면 부드럽게 지우고 시작
                const oldBubble = card.querySelector('.reaction-bubble');
                if (oldBubble) oldBubble.remove();

                // 부모 카드의 position이 relative가 아니면 맞춰줌
                if (window.getComputedStyle(card).position === 'static') {
                    card.style.position = 'relative';
                }

                const bubble = document.createElement('div');
                bubble.className = 'reaction-bubble';
                bubble.innerText = reaction;
                card.appendChild(bubble);

                // 2초 뒤 서서히 사라지는 연출 부여 후 완전 제거
                setTimeout(() => {
                    bubble.style.transition = 'all 0.4s ease-out';
                    bubble.style.opacity = '0';
                    bubble.style.transform = 'translateX(-50%) translateY(-20px) scale(0.8)';
                    setTimeout(() => {
                        bubble.remove();
                    }, 400);
                }, 2000);
            }
        });

        socket.on('gameStateUpdate', (room) => {
            currentRoom = room;
            
            if (room.stage === 'lobby') {
                document.getElementById("waiting-lobby").classList.remove("hidden");
                document.getElementById("card-draw-stage").classList.add("hidden");
                document.getElementById("game-arena").classList.add("hidden");
                updateLobbyProfiles(room);
                return;
            }
            
            if (room.stage === 'card_draw') {
                document.getElementById("waiting-lobby").classList.add("hidden");
                document.getElementById("card-draw-stage").classList.remove("hidden");
                document.getElementById("game-arena").classList.add("hidden");
                updateCardDrawStage(room);
                return;
            }

            // 본 게임중인 상태
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("card-draw-stage").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        // 대기실의 프로필 리스트 렌더링
        function updateLobbyProfiles(room) {
            const container = document.getElementById("lobby-profiles");
            container.innerHTML = "";
            
            room.players.forEach((p, idx) => {
                const card = document.createElement("div");
                card.className = "profile-card";
                card.setAttribute("data-player-id", p.id);
                
                if (idx === 0) {
                    const badge = document.createElement("span");
                    badge.className = "profile-badge";
                    badge.innerText = "방장";
                    card.appendChild(badge);
                }

                card.innerHTML += `
                    <div class="profile-avatar">${p.emoji}</div>
                    <div class="profile-name">${p.name} ${p.id === myId ? '(나)' : ''}</div>
                `;
                container.appendChild(card);
            });

            const isOwner = room.players[0].id === myId;
            if (isOwner) {
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("owner-waiting-msg").classList.add("hidden");
            } else {
                document.getElementById("start-btn").classList.add("hidden");
                document.getElementById("owner-waiting-msg").classList.remove("hidden");
            }
        }

        // 순서 뽑기 스테이지 화면 드로잉
        function updateCardDrawStage(room) {
            // 프로필 목록 동기화
            const profileContainer = document.getElementById("card-draw-profiles");
            profileContainer.innerHTML = "";
            room.players.forEach(p => {
                const card = document.createElement("div");
                card.className = "profile-card";
                card.setAttribute("data-player-id", p.id);
                card.innerHTML = `
                    <div class="profile-avatar">${p.emoji}</div>
                    <div class="profile-name" style="font-size:10px;">${p.name} ${p.drawOrder ? `(${p.drawOrder}번 픽)` : '(뽑는 중)'}</div>
                `;
                profileContainer.appendChild(card);
            });

            // 카드 그리드 동기화
            const cardGrid = document.getElementById("card-grid-container");
            cardGrid.innerHTML = "";

            const myPlayer = room.players.find(p => p.id === myId);
            const hasIMePicked = myPlayer && myPlayer.drawOrder !== null;

            room.cards.forEach(cardData => {
                const card = document.createElement("div");
                card.className = "draw-card";
                
                if (cardData.pickedBy !== null) {
                    card.classList.add("flipped");
                    card.innerText = cardData.number;
                } else {
                    card.innerText = "?";
                    // 내가 아직 안뽑았고 카드도 임자 없는 경우에만 클릭 가능
                    if (!hasIMePicked) {
                        card.onclick = () => {
                            socket.emit('pickCard', { roomCode: room.code, cardId: cardData.id });
                        };
                    }
                }
                cardGrid.appendChild(card);
            });
        }

        socket.on('gameStarted', (room) => {
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("card-draw-stage").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        socket.on('diceRolled', ({ diceValues, remainingRolls, isHeld, activePlayerId }) => {
            currentRoom.diceValues = diceValues;
            currentRoom.remainingRolls = remainingRolls;
            currentRoom.isHeld = isHeld;

            // 내가 굴렸든, 남이 굴렸든 모든 관전자 화면에서 다이스가 굴러가는 애니메이션 연출
            isClientRolling = true;
            renderDice(true);

            setTimeout(() => {
                isClientRolling = false;
                
                if (remainingRolls === 0) {
                    isDelayedMoving = true;
                    renderDice(false);
                    
                    setTimeout(() => {
                        currentRoom.isHeld = [true, true, true, true, true];
                        isDelayedMoving = false;
                        renderDice(false);
                        renderScoreBoard();
                        updateCupState();
                        if (activePlayerId === myId) {
                            openScoreboardMobile();
                        }
                    }, 1200);
                } else {
                    renderDice(false);
                    renderScoreBoard();
                    updateCupState();
                }
            }, 700);
        });

        socket.on('scoreRegistered', ({ playerId, category, score }) => {
            selectedCategory = null; 
            document.getElementById("confirm-score-btn").setAttribute("disabled", "true");
            if (category === 'yacht' && score === 50) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });

        socket.on('gameFinished', (room) => {
            currentRoom = room;
            updateRoomState(room);

            const leaderboard = room.players.map(p => {
                let total = 0;
                let upperSum = 0;
                
                categories.forEach(c => {
                    if (!c.isSpecial && p.scores[c.id] !== undefined) {
                        total += p.scores[c.id];
                    }
                });
                
                ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                    if (p.scores[c] !== undefined) upperSum += p.scores[c];
                });
                if (upperSum >= 63) total += 35;

                return {
                    id: p.id,
                    name: p.name,
                    totalScore: total
                };
            });

            leaderboard.sort((a, b) => b.totalScore - a.totalScore);

            const myRankIndex = leaderboard.findIndex(item => item.id === myId);
            const myTotalScore = myRankIndex !== -1 ? leaderboard[myRankIndex].totalScore : 0;
            const myRank = myRankIndex + 1;

            document.getElementById("my-final-rank").innerText = `${myRank}등`;
            document.getElementById("my-final-score").innerText = `최종 점수: ${myTotalScore}점`;

            const listContainer = document.getElementById("leaderboard-list");
            listContainer.innerHTML = "<h4 style='color:var(--accent-gold); margin-bottom: 10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;'>최종 순위표</h4>";
            
            leaderboard.forEach((user, index) => {
                const isMe = user.id === myId;
                const userRow = document.createElement("div");
                userRow.style.display = "flex";
                userRow.style.justifyContent = "space-between";
                userRow.style.padding = "6px 0";
                userRow.style.fontSize = "15px";
                userRow.style.color = isMe ? "#ffd700" : "#fff";
                userRow.style.fontWeight = isMe ? "bold" : "normal";
                userRow.innerHTML = `
                    <span>${index + 1}위. ${user.name} ${isMe ? '(나)' : ''}</span>
                    <span>${user.totalScore} 점</span>
                `;
                listContainer.appendChild(userRow);
            });

            document.getElementById("game-result-modal").classList.add("show");

            if (myRank === 1) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }

            if (room.players[0].id === myId) {
                document.getElementById("restart-btn").classList.remove("hidden");
            }
        });

        function closeResultModal() {
            document.getElementById("game-result-modal").classList.remove("show");
        }

        // 인게임 상단 플레이어 프로필 목록 업데이트
        function updateGameProfiles(room) {
            const container = document.getElementById("game-profiles");
            container.innerHTML = "";

            room.players.forEach((p, idx) => {
                const card = document.createElement("div");
                card.className = "profile-card";
                card.setAttribute("data-player-id", p.id);

                // 현재 턴인 사람 하이라이트
                if (room.currentTurnIndex === idx) {
                    card.classList.add("active-turn");
                }

                card.innerHTML = `
                    <div class="profile-avatar">${p.emoji}</div>
                    <div class="profile-name">${p.name} ${p.id === myId ? '(나)' : ''}</div>
                `;
                container.appendChild(card);
            });
        }

        function updateRoomState(room) {
            currentRoom = room;
            document.getElementById("room-code-display").innerText = room.code;

            const activePlayer = room.players[room.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;

            const turnIndicator = document.getElementById("turn-indicator");
            if (isMyTurn) {
                turnIndicator.innerHTML = `<span style="color:var(--accent-gold);">당신의 차례! 컵을 흔들어 굴려주세요!</span>`;
            } else {
                turnIndicator.innerText = `${activePlayer.name}의 차례입니다`;
            }

            document.getElementById("roll-count-text").innerText = `남은 횟수: ${room.remainingRolls}/3`;

            const confirmBtn = document.getElementById("confirm-score-btn");
            if (isMyTurn && room.remainingRolls < 3 && room.remainingRolls > 0) {
                confirmBtn.removeAttribute("disabled");
            } else {
                confirmBtn.setAttribute("disabled", "true");
            }

            updateGameProfiles(room);
            renderDice();
            renderScoreBoard();
            updateCupState();
        }

        const cup = document.getElementById("dice-cup");
        const shakerZone = document.getElementById("cup-shaker-zone");

        // 주사위 컵 상태 및 화면 표시 동기화 수정 (시공간 실종 차단 방어막 추가)
        function updateCupState() {
            if (!currentRoom) return;
            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            
            if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling && !isDelayedMoving) {
                cup.classList.remove("hidden");
                // 컵을 화면 영역에 강제로 다시 그려주고 좌표계를 고정합니다.
                cup.style.display = 'block';
                cup.style.visibility = 'visible';
                cup.style.opacity = '1';
                resetCupPosition();
            } else {
                cup.classList.add("hidden");
            }
        }

        function resetCupPosition() {
            if (window.innerWidth > 768) {
                cup.style.top = "150px";
                cup.style.left = "25px";
            } else {
                cup.style.top = "10px";
                cup.style.left = "calc(50% - 45px)";
            }
            cup.style.transform = "rotate(0deg) scale(1)";
            totalDragDistance = 0;
            isDraggingCup = false;

            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => {
                d.classList.remove("dice-gathering");
                d.style.display = "grid";
            });
        }

        cup.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', endDrag);

        cup.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (isDraggingCup && e.cancelable) e.preventDefault();
            dragMove(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (isClientRolling || isDelayedMoving) return;
            isDraggingCup = true;
            lastX = e.clientX;
            lastY = e.clientY;
            totalDragDistance = 0;

            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            if (activeDice.length > 0) {
                playClatterSound();
                activeDice.forEach(d => {
                    d.classList.add("dice-gathering");
                });
            }
        }

        function dragMove(e) {
            if (!isDraggingCup) return;

            const currentX = e.clientX;
            const currentY = e.clientY;
            
            const deltaX = currentX - lastX;
            const deltaY = currentY - lastY;
            
            lastX = currentX;
            lastY = currentY;

            let newLeft = cup.offsetLeft + deltaX;
            let newTop = cup.offsetTop + deltaY;

            const maxW = window.innerWidth - cup.clientWidth;
            const maxH = window.innerHeight - cup.clientHeight;
            if (newLeft < 0) newLeft = 0;
            if (newLeft > maxW) newLeft = maxW;
            if (newTop < 0) newTop = 0;
            if (newTop > maxH) newTop = maxH;

            cup.style.left = newLeft + "px";
            cup.style.top = newTop + "px";

            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => d.style.display = "none");

            const travel = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            totalDragDistance += travel;

            if (travel > 1.5 && Date.now() - lastSoundTime > 110) {
                playClatterSound();
                lastSoundTime = Date.now();
                const angle = (Math.random() - 0.5) * 35;
                cup.style.transform = `rotate(${angle}deg) scale(1.08)`;
            }
        }

        function endDrag() {
            if (!isDraggingCup) return;
            isDraggingCup = false;

            if (totalDragDistance > 650) {
                triggerRoll();
            } else {
                resetCupPosition();
            }
        }

        function triggerRoll() {
            if (!currentRoom || isClientRolling || isDelayedMoving) return;
            isClientRolling = true;
            cup.classList.add("hidden");
            
            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => d.style.display = "grid");

            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: currentRoom.isHeld
            });
        }

        function renderDice(animate = false) {
            const activeArea = document.getElementById("active-dice-area");
            const slots = document.querySelectorAll(".dice-slot");
            
            activeArea.innerHTML = "";
            slots.forEach(slot => slot.innerHTML = "");

            if (!currentRoom) return;

            const activePlayer = currentRoom.players[currentRoom.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            if (isTurnJustStarted) {
                if (isMyTurn) {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.4); font-size:12px; text-align:center;">가죽 컵을 사방으로 흔들거나<br>폰을 세게 쥐고 흔드세요!</span>`;
                } else {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.4); font-size:12px; text-align:center;">${activePlayer.name} 님이<br>컵을 만지작거리는 중...</span>`;
                }
                return;
            }

            const dotPositions = {
                1: [4],                  
                2: [1, 7],               
                3: [1, 4, 7],            
                4: [1, 2, 6, 7],         
                5: [1, 2, 4, 6, 7],      
                6: [1, 2, 3, 5, 6, 7]    
            };

            let holdSlotIndex = 0;
            for (let i = 0; i < 5; i++) {
                const diceValue = currentRoom.diceValues[i];
                
                const diceDiv = document.createElement("div");
                diceDiv.className = `dice ${currentRoom.isHeld[i] ? 'held' : ''}`;
                diceDiv.setAttribute("data-value", diceValue);
                
                if (animate && !currentRoom.isHeld[i]) {
                    diceDiv.classList.add("dice-rolling");
                }
                
                const positions = dotPositions[diceValue] || [];
                positions.forEach(pos => {
                    const dotSpan = document.createElement("span");
                    dotSpan.className = `dot pos-${pos}`;
                    diceDiv.appendChild(dotSpan);
                });

                // 내 턴일 때만 주사위 고정(Hold) 토글 작동
                if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling && !isDelayedMoving) {
                    diceDiv.onclick = () => {
                        currentRoom.isHeld[i] = !currentRoom.isHeld[i];
                        renderDice(false);
                    };
                }

                if (currentRoom.isHeld[i]) {
                    if (slots[holdSlotIndex]) {
                        if (isDelayedMoving) {
                            diceDiv.classList.add("dice-glide");
                        }
                        slots[holdSlotIndex].appendChild(diceDiv);
                        holdSlotIndex++;
                    }
                } else {
                    activeArea.appendChild(diceDiv);
                }
            }
        }

        function renderScoreBoard() {
            if (!currentRoom) return;

            const headerRow = document.getElementById("table-header");
            headerRow.innerHTML = "<th>카테고리</th>";

            currentRoom.players.forEach((p, idx) => {
                const th = document.createElement("th");
                const isPlayerTurn = currentRoom.currentTurnIndex === idx;
                th.innerHTML = `${isPlayerTurn ? '▶ ' : ''}${p.name}${p.id === myId ? '<br>(나)' : ''}`;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById("score-table-body");
            tbody.innerHTML = "";

            const activePlayer = currentRoom.players[currentRoom.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            categories.forEach(cat => {
                const tr = document.createElement("tr");

                if (cat.isSpecial) {
                    tr.className = "gray-row";
                    const nameTd = document.createElement("td");
                    nameTd.className = "category-label";
                    nameTd.innerText = cat.name;
                    tr.appendChild(nameTd);

                    currentRoom.players.forEach(p => {
                        const valTd = document.createElement("td");
                        if (cat.id === 'bonus') {
                            let sum = 0;
                            ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                                if (p.scores[c] !== undefined) sum += p.scores[c];
                            });
                            const bonusAchieved = sum >= 63;
                            valTd.innerHTML = `${sum}/63 <span style="color:${bonusAchieved?'#2e7d32':'#888'};">${bonusAchieved ? '(+35)' : '(0)'}</span>`;
                        } else if (cat.id === 'total') {
                            let sum = 0;
                            let upperSum = 0;
                            categories.forEach(c => {
                                if (!c.isSpecial && p.scores[c.id] !== undefined) {
                                    sum += p.scores[c.id];
                                }
                            });
                            ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                                if (p.scores[c] !== undefined) upperSum += p.scores[c];
                            });
                            if (upperSum >= 63) sum += 35;
                            valTd.innerText = sum;
                        }
                        tr.appendChild(valTd);
                    });
                    tbody.appendChild(tr);
                    return;
                }

                const nameTd = document.createElement("td");
                nameTd.className = "category-label";
                nameTd.innerText = cat.name;
                tr.appendChild(nameTd);

                currentRoom.players.forEach(p => {
                    const scoreTd = document.createElement("td");
                    scoreTd.className = "score-cell";

                    if (p.scores[cat.id] !== undefined) {
                        scoreTd.innerText = p.scores[cat.id];
                        scoreTd.classList.add("confirmed");
                    } else {
                        if (p.id === myId && isMyTurn && !isTurnJustStarted) {
                            scoreTd.classList.add("interactive");
                            const possible = calculatePossibleScore(cat.id, currentRoom.diceValues);
                            
                            if (selectedCategory === cat.id) {
                                scoreTd.innerText = `${possible} (선택됨)`;
                                scoreTd.classList.add("active-preview");
                            } else {
                                scoreTd.innerText = `${possible}`;
                                scoreTd.style.color = "#bbb";
                            }

                            scoreTd.onclick = () => {
                                handleCellClick(cat.id);
                            };
                        } else {
                            scoreTd.innerText = "-";
                            scoreTd.style.opacity = "0.3";
                        }
                    }
                    tr.appendChild(scoreTd);
                });

                tbody.appendChild(tr);
            });
        }

        function calculatePossibleScore(category, vals) {
            const counts = {};
            vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sumAll = vals.reduce((a, b) => a + b, 0);

            switch (category) {
                case 'aces': return (counts[1] || 0) * 1;
                case 'duals': return (counts[2] || 0) * 2;
                case 'triples': return (counts[3] || 0) * 3;
                case 'quads': return (counts[4] || 0) * 4;
                case 'pentas': return (counts[5] || 0) * 5;
                case 'hexas': return (counts[6] || 0) * 6;
                case 'choice': return sumAll;
                case 'poker': {
                    for (let val in counts) {
                        if (counts[val] >= 4) {
                            return Number(val) * 4;
                        }
                    }
                    return 0;
                }
                case 'full_house': {
                    let hasThree = false;
                    let hasTwo = false;
                    for (let val in counts) {
                        if (counts[val] === 3) hasThree = true;
                        if (counts[val] === 2) hasTwo = true;
                        if (counts[val] === 5) { hasThree = true; hasTwo = true; } 
                    }
                    if (hasThree && hasTwo) return sumAll;
                    return 0;
                }
                case 's_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr.includes('1234') || uniqueStr.includes('2345') || uniqueStr.includes('3456')) return 15;
                    return 0;
                }
                case 'l_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr === '12345' || uniqueStr === '23456') return 30;
                    return 0;
                }
                case 'yacht': {
                    for (let val in counts) {
                        if (counts[val] === 5) return 50;
                    }
                    return 0;
                }
                default: return 0;
            }
        }

        function requestGyroPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotionEvent);
                            alert("자이로 흔들기 기능이 활성화되었습니다!");
                            document.getElementById("gyro-init-btn").style.display = "none";
                        } else {
                            alert("자이로 센서 접근이 거부되었습니다. 드래그를 이용해 주세요.");
                        }
                    })
                    .catch(console.error);
            } else {
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', handleMotionEvent);
                    alert("모바일 흔들기 감지가 작동을 시도합니다!");
                    document.getElementById("gyro-init-btn").style.display = "none";
                } else {
                    alert("이 기기는 흔들기 센서를 지원하지 않습니다. 마우스/터치 드래그를 사용하세요.");
                }
            }
        }

        function handleMotionEvent(event) {
            if (isClientRolling || isDelayedMoving || !currentRoom) return;

            const activePlayer = currentRoom.players[currentRoom.currentTurnIndex];
            if (activePlayer.id !== myId || currentRoom.remainingRolls <= 0) return;

            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            if (lastShakingX === null) {
                lastShakingX = acc.x;
                lastShakingY = acc.y;
                lastShakingZ = acc.z;
                return;
            }

            const deltaX = Math.abs(acc.x - lastShakingX);
            const deltaY = Math.abs(acc.y - lastShakingY);
            const deltaZ = Math.abs(acc.z - lastShakingZ);

            if (deltaX + deltaY + deltaZ > shakeThreshold) {
                shakeAccumulator += (deltaX + deltaY + deltaZ);
                
                const activeDice = document.querySelectorAll("#active-dice-area .dice");
                activeDice.forEach(d => d.classList.add("dice-gathering"));

                if (Date.now() - lastSoundTime > 120) {
                    playClatterSound();
                    lastSoundTime = Date.now();
                }
            }

            lastShakingX = acc.x;
            lastShakingY = acc.y;
            lastShakingZ = acc.z;

            if (shakeAccumulator > 320) {
                shakeAccumulator = 0;
                triggerRoll();
            }
        }
    </script>
