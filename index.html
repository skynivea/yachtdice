<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Deluxe</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark-gray: #121212;
            --bg-panel: #1e1e1e;
            --velvet-burgundy: #580f11; 
            --outer-black: #080808;      
            --accent-gold: #d4af37;
            --paper-white: #f5f5ee;      
            --paper-border: #cccccc;
        }
        body {
            background-color: var(--bg-dark-gray);
            color: #f5f5f5;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        
        #main-home, #waiting-lobby {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #333;
            padding: 30px;
            margin-top: 50px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .main-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }
        .flat-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5c060, #d39325);
            color: #0d0d0d;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-outline {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-action {
            background: #b71c1c;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn-action:hover:not(:disabled) {
            background: #d32f2f;
        }
        .btn-action:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #game-arena {
            display: flex;
            flex-direction: column;
            width: 98%;
            max-width: 1200px;
            margin: 15px auto;
        }
        .room-tag {
            text-align: center;
            font-size: 14px;
            background: var(--bg-panel);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #board-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            align-items: flex-start;
        }

        /* [좌측] 게임판 */
        #outer-board {
            flex: 1.2;
            background-color: var(--outer-black);
            border: 6px solid #222;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            aspect-ratio: 1 / 1;
        }

        .dice-slots-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 15px;
        }
        .dice-slot {
            flex: 1;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
        }

        #inner-velvet-field {
            flex: 1;
            background-color: var(--velvet-burgundy);
            border-radius: 16px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid #3d0709;
        }

        #active-dice-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        /* [중앙] 흔들기 구역 */
        #cup-shaker-zone {
            width: 160px;
            height: 420px;
            background: #181818;
            border: 2px dashed #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            box-sizing: border-box;
            position: relative;
        }
        .zone-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
            user-select: none;
        }

        /* 가죽 컵 */
        #dice-cup {
            width: 90px;
            height: 120px;
            background: linear-gradient(135deg, #3a2212 0%, #1c0e05 100%);
            border-left: 5px solid #28170b;
            border-right: 5px solid #28170b;
            border-top: 3px solid var(--accent-gold);
            border-bottom: 8px solid #100803;
            border-radius: 40px / 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 5px 15px rgba(255,255,255,0.05);
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 150px;
            left: 35px;
            z-index: 500; /* 자유 드래그 시 다른 엘리먼트 위를 떠돌 수 있도록 높은 z-index */
            touch-action: none;
            user-select: none;
            transition: transform 0.05s linear;
        }
        #dice-cup::after {
            content: '';
            position: absolute;
            bottom: 12px;
            width: 80%;
            height: 2px;
            background: #d4af37;
            opacity: 0.4;
        }
        #dice-cup:active { cursor: grabbing; }
        .cup-inner-text {
            color: var(--accent-gold);
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* [우측] 스코어판 */
        #scoreboard-section {
            flex: 1.4;
            background: var(--paper-white);
            color: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            box-sizing: border-box;
            overflow-x: auto;
        }
        .paper-title {
            font-size: 24px;
            font-weight: 900;
            text-align: left;
            margin: 0 0 15px 0;
            color: #111;
            letter-spacing: -1px;
        }
        
        .close-score-btn {
            display: none;
            background: #cc1111;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 320px;
        }
        th, td {
            border: 1px solid #c0c0b8;
            padding: 8px 5px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background: #e2e2da;
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }
        .category-label {
            text-align: left;
            padding-left: 10px;
            font-weight: bold;
            color: #222;
            min-width: 130px;
        }
        .score-cell {
            font-weight: 900;
            color: #888;
            background: rgba(0,0,0,0.02);
            transition: background 0.15s;
        }
        .score-cell.interactive {
            cursor: pointer;
        }
        .score-cell.confirmed {
            color: #1a1a1a;
            background: transparent;
            cursor: default;
        }
        .score-cell.active-preview {
            background: #ffe0b2 !important;
            color: #e65100 !important;
            font-size: 12px;
            border: 2px dashed #fb8c00;
        }
        .gray-row {
            background: #e9e9e2;
            font-weight: bold;
        }

        /* 🎲 CSS 주사위 그래픽 개선 */
        .dice {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 15px 15px, #ffffff, #eaeaea);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 -3px 0 #cccccc, inset 0 2px 3px rgba(255,255,255,0.9);
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: transform 0.1s ease, opacity 0.5s ease;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 5px;
            gap: 2px;
        }
        
        .dice.held {
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold), inset 0 -2px 0 #cccccc;
        }

        /* 주사위 눈 디자인 (Dot) */
        .dot {
            display: block;
            background-color: #111111;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            justify-self: center;
            align-self: center;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.5);
        }

        /* 1의 눈 정중앙 크고 빨간색 */
        .dice[data-value="1"] .dot {
            grid-column: 2;
            grid-row: 2;
            width: 14px;
            height: 14px;
            background-color: #d32f2f;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
        }

        /* 각 주사위 값에 매칭되는 그리드 제어 클래스 */
        .pos-1 { grid-column: 1; grid-row: 1; }
        .pos-2 { grid-column: 3; grid-row: 1; }
        .pos-3 { grid-column: 1; grid-row: 2; }
        .pos-4 { grid-column: 2; grid-row: 2; }
        .pos-5 { grid-column: 3; grid-row: 2; }
        .pos-6 { grid-column: 1; grid-row: 3; }
        .pos-7 { grid-column: 3; grid-row: 3; }
        
        @keyframes dice-spurt {
            0% {
                transform: scale(0.2) rotate(0deg) translate(-50px, -50px);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(180deg) translate(10px, -10px);
                opacity: 0.8;
            }
            100% {
                transform: scale(1) rotate(360deg) translate(0, 0);
                opacity: 1;
            }
        }
        .dice-rolling {
            animation: dice-spurt 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .dice-glide {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
        }

        /* 컵으로 빨려 들어가는 애니메이션 효과 */
        @keyframes dice-to-cup {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(360deg) translate(150px, -50px);
                opacity: 0;
            }
        }
        .dice-gathering {
            animation: dice-to-cup 0.35s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards !important;
            pointer-events: none;
        }

        .roll-counter-display {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #ccc;
            margin-top: 15px;
        }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #board-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            #outer-board {
                width: 100%;
                max-width: 480px;
            }
            #cup-shaker-zone {
                width: 100%;
                max-width: 480px;
                height: 120px;
                flex-direction: row;
                padding: 10px 20px;
            }
            #dice-cup {
                top: 10px;
                left: calc(50% - 45px);
                height: 100px;
            }

            #scoreboard-section {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1000;
                border-radius: 0;
                background: var(--paper-white);
                overflow-y: auto;
                padding: 25px;
            }

            #scoreboard-section.mobile-open {
                display: block !important;
            }

            .close-score-btn {
                display: block;
            }
        }
    </style>
</head>
<body>

    <header style="background:#0a0a0a; width:100%; padding:15px; text-align:center; font-size:22px; font-weight:900; color:var(--accent-gold); border-bottom:1px solid #222;">
        🎲 YACHT DICE DELUXE
    </header>

    <!-- 1. 메인 홈 -->
    <div id="main-home">
        <h1 class="main-title">요트 다이스</h1>
        <div id="home-menu">
            <button class="btn-gold" onclick="showInputForm('create')">🏠 방 만들기</button>
            <button class="btn-outline" style="margin-top:10px;" onclick="showInputForm('join')">🔑 방 들어가기</button>
        </div>

        <div id="create-form" class="hidden">
            <h3 style="margin-top:0;">방 만들기</h3>
            <input type="text" id="nickname-create" class="flat-input" placeholder="닉네임 (최대 8자)" maxlength="8">
            <button class="btn-gold" onclick="createRoom()">방 생성</button>
            <button class="btn-outline" style="margin-top:8px;" onclick="goBackToMenu()">뒤로가기</button>
        </div>

        <div id="join-form" class="hidden">
            <h3 style="margin-top:0;">방 들어가기</h3>
            <input type="text" id="nickname-join" class="flat-input" placeholder="닉네임" maxlength="8">
            <input type="text" id="room-code-input" class="flat-input" placeholder="방 코드 (4자리)" maxlength="4" style="text-transform:uppercase;">
            <button class="btn-gold" onclick="joinRoom()">입장</button>
            <button class="btn-outline" style="margin-top:8px;" onclick="goBackToMenu()">뒤로가기</button>
        </div>
    </div>

    <!-- 2. 대기실 -->
    <div id="waiting-lobby" class="hidden">
        <div class="lobby-title">🚪 대기방</div>
        <div style="font-size: 32px; font-weight: bold; color: var(--accent-gold); margin: 15px 0;" id="lobby-code-display">-</div>
        <div class="user-list" id="lobby-users" style="background:#0a0a0a; padding:10px; border-radius:8px; text-align:left; min-height:100px; margin-bottom:20px;"></div>
        <button id="start-btn" class="btn-gold hidden" onclick="startGame()">▶️ 게임 시작</button>
        <div id="owner-waiting-msg" style="font-size:13px; color:#888;">방장이 시작하기를 기다리는 중...</div>
    </div>

    <!-- 3. 인게임 메인 아레나 -->
    <div id="game-arena" class="hidden">
        <div class="room-tag">
            <span>방 코드: <strong id="room-code-display" style="color:var(--accent-gold);">-</strong></span>
            
            <div style="display:flex; gap: 5px;">
                <button id="show-score-btn" class="btn-outline" style="width:auto; padding:5px 12px; font-size:12px; background: #e65100; color:white; border:none;" onclick="openScoreboardMobile()">📊 점수 확인</button>
                <button id="gyro-init-btn" class="btn-outline" style="width:auto; padding:5px 10px; font-size:11px;" onclick="requestGyroPermission()">📳 흔들기 센서 활성화</button>
            </div>
            
            <span id="turn-indicator" style="font-weight:bold;">대기 중...</span>
        </div>

        <div id="board-wrapper">
            
            <!-- [왼쪽] 큰 네모 게임판 -->
            <div id="outer-board">
                <!-- 상단 홈 5개 -->
                <div class="dice-slots-container" id="hold-home">
                    <div class="dice-slot" data-index="0"></div>
                    <div class="dice-slot" data-index="1"></div>
                    <div class="dice-slot" data-index="2"></div>
                    <div class="dice-slot" data-index="3"></div>
                    <div class="dice-slot" data-index="4"></div>
                </div>

                <!-- 안쪽 작은 버건디 벨벳 필드 -->
                <div id="inner-velvet-field">
                    <div id="active-dice-area"></div>
                </div>

                <div class="roll-counter-display" id="roll-count-text">남은 횟수: 3/3</div>
                
                <!-- 액션 버튼 (리롤 즉시 종료 및 점수입력) -->
                <button id="confirm-score-btn" class="btn-action" disabled onclick="forceEndRolls()">🛑 리롤 종료하고 점수 입력하기</button>
                <button id="restart-btn" class="btn-outline hidden" style="margin-top:10px;" onclick="requestRestart()">🔄 다시 하기</button>
            </div>

            <!-- [중앙] 원통 컵 흔들기 구획 -->
            <div id="cup-shaker-zone">
                <div class="zone-label">자유롭게<br>사방으로<br>흔드세요</div>
                
                <!-- 원통 가죽 컵 -->
                <div id="dice-cup" class="hidden">
                    <div class="cup-inner-text">가죽 컵<br>🪘<br>흔들기</div>
                </div>

                <div class="zone-label">SHAKE IT</div>
            </div>

            <!-- [오른쪽/모바일 팝업] 스코어판 -->
            <div id="scoreboard-section">
                <!-- 모바일 전용 닫기 버튼 -->
                <button class="close-score-btn" onclick="closeScoreboardMobile()">❌ 닫기 (게임판으로)</button>

                <h2 class="paper-title">요트다이스</h2>
                <table id="score-table">
                    <thead>
                        <tr id="table-header">
                            <th>카테고리</th>
                        </tr>
                    </thead>
                    <tbody id="score-table-body">
                        <!-- JS 렌더링 영역 -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
       const socket = io();
        let currentRoom = null;
        let myId = null;
        let isClientRolling = false;
        let isDelayedMoving = false; 
        let selectedCategory = null; 

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playClatterSound() {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const now = audioCtx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const timeOffset = i * 0.08;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(120 + Math.random() * 80, now + timeOffset);
                    osc.frequency.exponentialRampToValueAtTime(300 + Math.random() * 200, now + timeOffset + 0.05);
                    
                    gain.gain.setValueAtTime(0.15, now + timeOffset);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + timeOffset + 0.06);

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + timeOffset);
                    osc.stop(now + timeOffset + 0.07);
                }
            } catch (e) { console.log(e); }
        }

        const categories = [
            { id: 'aces', name: '에이스' },
            { id: 'duals', name: '듀얼' }, 
            { id: 'triples', name: '트리플' },
            { id: 'quads', name: '쿼드' },
            { id: 'pentas', name: '펜타' },
            { id: 'hexas', name: '헥사' },
            { id: 'bonus', name: '상단 보너스 +35점', isSpecial: true }, 
            { id: 'choice', name: '초이스' }, 
            { id: 'poker', name: '포커' },
            { id: 'full_house', name: '풀 하우스' },
            { id: 's_straight', name: '스몰 스트레이트' },
            { id: 'l_straight', name: '라지 스트레이트' },
            { id: 'yacht', name: '요트' },
            { id: 'total', name: '총점', isSpecial: true }
        ];

        let isDraggingCup = false;
        let lastX = 0, lastY = 0;
        let totalDragDistance = 0;
        let lastSoundTime = 0;

        let lastShakingX = null, lastShakingY = null, lastShakingZ = null;
        let shakeThreshold = 15; 
        let shakeAccumulator = 0;

        function openScoreboardMobile() {
            document.getElementById("scoreboard-section").classList.add("mobile-open");
        }

        function closeScoreboardMobile() {
            document.getElementById("scoreboard-section").classList.remove("mobile-open");
        }

        function showInputForm(type) {
            document.getElementById("home-menu").classList.add("hidden");
            if (type === 'create') {
                document.getElementById("create-form").classList.remove("hidden");
            } else {
                document.getElementById("join-form").classList.remove("hidden");
            }
        }

        function goBackToMenu() {
            document.getElementById("create-form").classList.add("hidden");
            document.getElementById("join-form").classList.add("hidden");
            document.getElementById("home-menu").classList.remove("hidden");
        }

        function createRoom() {
            const nickname = document.getElementById("nickname-create").value.trim() || `Player1`;
            socket.emit('createRoom', { nickname });
        }

        function joinRoom() {
            const nickname = document.getElementById("nickname-join").value.trim() || `Player2`;
            const roomCode = document.getElementById("room-code-input").value.trim().toUpperCase();
            if (!roomCode) return alert("방 코드를 입력하세요.");
            socket.emit('joinRoom', { roomCode, nickname });
        }

        function startGame() {
            socket.emit('startGame', { roomCode: currentRoom.code });
        }

        function requestRestart() {
            socket.emit('restartGame', { roomCode: currentRoom.code });
        }

        // 족보 클릭 시 "더블 클릭(두 번째 클릭) 즉시 확정" 플로우
        function handleCellClick(categoryId) {
            if (isClientRolling || isDelayedMoving) return;
            
            if (selectedCategory === categoryId) {
                // 이미 대기/선택 상태인 칸을 다시 누르면 즉시 그 점수로 확정되어 서버 전송[cite: 1]
                confirmSelectedScore();
            } else {
                // 최초 1회 클릭 시 대기 상태 전환 및 스코어판 갱신
                selectedCategory = categoryId;
                renderScoreBoard(); 
            }
        }

        function confirmSelectedScore() {
            if (!selectedCategory || !currentRoom) return;
            socket.emit('writeScore', {
                roomCode: currentRoom.code,
                category: selectedCategory
            });
            selectedCategory = null;
            closeScoreboardMobile();
        }

        // 🛑 "리롤 종료하고 점수 입력하기" 버튼 연동 로직 보완[cite: 1]
        function forceEndRolls() {
            if (!currentRoom || isClientRolling || isDelayedMoving) return;
            
            // 1. 모든 주사위를 킵(Hold) 처리[cite: 1]
            currentRoom.isHeld = [true, true, true, true, true];
            isDelayedMoving = true;
            renderDice(false);
            
            // 2. 서버 측과 상태 동기를 맞추기 위해 서버로 남은 횟수 완전 소진용 "빈 롤링" 혹은 상태 저장 요청 송신
            // (서버 규칙에 따라 'rollDice' 또는 별도 엔드 턴 이벤트가 처리되도록 호환 구성)
            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: [true, true, true, true, true] // 모두 잠갔으므로 서버에서도 남은 횟수가 0으로 차감됩니다
            });

            // 3. 킵 영역으로 스무스하게 모여드는 연출 후 즉시 점수판 활성화[cite: 1]
            setTimeout(() => {
                isDelayedMoving = false;
                renderDice(false);
                renderScoreBoard();
                updateCupState();
                openScoreboardMobile();
            }, 800);
        }

        socket.on('roomCreated', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        socket.on('roomJoined', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        function transitionToLobby(roomCode) {
            document.getElementById("main-home").classList.add("hidden");
            document.getElementById("waiting-lobby").classList.remove("hidden");
            document.getElementById("lobby-code-display").innerText = roomCode;
        }

        socket.on('gameStateUpdate', (room) => {
            currentRoom = room;
            if (room.stage === 'lobby') {
                updateLobbyUsers(room);
                return;
            }
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        function updateLobbyUsers(room) {
            const container = document.getElementById("lobby-users");
            container.innerHTML = "";
            room.players.forEach((p, idx) => {
                const item = document.createElement("div");
                item.style.padding = "8px";
                item.style.borderBottom = "1px solid #222";
                item.innerHTML = `<span>${idx === 0 ? '👑 ' : '👤 '}${p.name} ${p.id === myId ? '(나)' : ''}</span>`;
                container.appendChild(item);
            });

            const isOwner = room.players[0].id === myId;
            if (isOwner) {
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("owner-waiting-msg").classList.add("hidden");
            } else {
                document.getElementById("start-btn").classList.add("hidden");
                document.getElementById("owner-waiting-msg").classList.remove("hidden");
            }
        }

        socket.on('gameStarted', (room) => {
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        socket.on('diceRolled', ({ diceValues, remainingRolls, isHeld }) => {
            currentRoom.diceValues = diceValues;
            currentRoom.remainingRolls = remainingRolls;
            currentRoom.isHeld = isHeld;

            isClientRolling = true;
            renderDice(true);

            setTimeout(() => {
                isClientRolling = false;
                
                if (remainingRolls === 0) {
                    isDelayedMoving = true;
                    renderDice(false);
                    
                    setTimeout(() => {
                        currentRoom.isHeld = [true, true, true, true, true];
                        isDelayedMoving = false;
                        renderDice(false);
                        renderScoreBoard();
                        updateCupState();
                        openScoreboardMobile();
                    }, 1200);
                } else {
                    renderDice(false);
                    renderScoreBoard();
                    updateCupState();
                }
            }, 700);
        });

        socket.on('scoreRegistered', ({ playerId, category, score }) => {
            selectedCategory = null; 
            document.getElementById("confirm-score-btn").setAttribute("disabled", "true");
            if (category === 'yacht' && score === 50) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });

        socket.on('gameFinished', (room) => {
            updateRoomState(room);
            alert("게임이 종료되었습니다!");
            if (room.players[0].id === myId) {
                document.getElementById("restart-btn").classList.remove("hidden");
            }
        });

        function updateRoomState(room) {
            currentRoom = room;
            document.getElementById("room-code-display").innerText = room.code;

            const activePlayer = room.players[room.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;

            const turnIndicator = document.getElementById("turn-indicator");
            if (isMyTurn) {
                turnIndicator.innerHTML = `<span style="color:var(--accent-gold);">🎲 당신의 차례! 컵을 흔들어 주사위를 굴리세요!</span>`;
            } else {
                turnIndicator.innerText = `👤 ${activePlayer.name} 차례`;
            }

            // [남은 횟수 실시간 연동 완성][cite: 1]
            document.getElementById("roll-count-text").innerText = `남은 횟수: ${room.remainingRolls}/3`;

            // 액션 버튼의 제어: 내 턴이고 최소 한 번은 굴려서 횟수가 1, 2회 남은 경우에만 "리롤 즉시 종료" 활성화
            const confirmBtn = document.getElementById("confirm-score-btn");
            if (isMyTurn && room.remainingRolls < 3 && room.remainingRolls > 0) {
                confirmBtn.removeAttribute("disabled");
            } else {
                confirmBtn.setAttribute("disabled", "true");
            }

            renderDice();
            renderScoreBoard();
            updateCupState();
        }

        const cup = document.getElementById("dice-cup");
        const shakerZone = document.getElementById("cup-shaker-zone");

        function updateCupState() {
            if (!currentRoom) return;
            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            
            if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling && !isDelayedMoving) {
                cup.classList.remove("hidden");
                resetCupPosition();
            } else {
                cup.classList.add("hidden");
            }
        }

        function resetCupPosition() {
            if (window.innerWidth > 768) {
                cup.style.top = "150px";
                cup.style.left = "35px";
            } else {
                cup.style.top = "10px";
                cup.style.left = "calc(50% - 45px)";
            }
            cup.style.transform = "rotate(0deg) scale(1)";
            totalDragDistance = 0;
            isDraggingCup = false;

            // 드래그 거리가 부족하여 취소된 경우 원래 주사위 상태 복귀 및 숨김 해제[cite: 1]
            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => {
                d.classList.remove("dice-gathering");
                d.style.display = "grid";
            });
        }

        cup.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', endDrag);

        cup.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
        window.addEventListener('touchmove', (e) => {
            // 모바일 터치 드래그 시 배경 스크롤을 차단해 드래그 조작감 극대화
            if (isDraggingCup && e.cancelable) e.preventDefault();
            dragMove(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (isClientRolling || isDelayedMoving) return;
            isDraggingCup = true;
            lastX = e.clientX;
            lastY = e.clientY;
            totalDragDistance = 0;

            // 주사위 가죽 컵 안으로 빨려 들어가기 시각 효과 클래스 부여[cite: 1]
            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            if (activeDice.length > 0) {
                playClatterSound();
                activeDice.forEach(d => {
                    d.classList.add("dice-gathering");[cite: 1]
                });
            }
        }

        function dragMove(e) {
            if (!isDraggingCup) return;

            const currentX = e.clientX;
            const currentY = e.clientY;
            
            const deltaX = currentX - lastX;
            const deltaY = currentY - lastY;
            
            lastX = currentX;
            lastY = currentY;

            let newLeft = cup.offsetLeft + deltaX;
            let newTop = cup.offsetTop + deltaY;

            // [잠재적 버그 방지] 화면 바깥 최소/최대 영역 튕김(이탈) 방지 뷰포트 가이드 안전선 추가[cite: 1]
            const maxW = window.innerWidth - cup.clientWidth;
            const maxH = window.innerHeight - cup.clientHeight;
            if (newLeft < 0) newLeft = 0;
            if (newLeft > maxW) newLeft = maxW;
            if (newTop < 0) newTop = 0;
            if (newTop > maxH) newTop = maxH;

            cup.style.left = newLeft + "px";
            cup.style.top = newTop + "px";

            // 컵 안에서 흔들리는 동안 필드 위의 원본 주사위 그래픽 완전 숨김[cite: 1]
            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => d.style.display = "none");

            const travel = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            totalDragDistance += travel;

            if (travel > 1.5 && Date.now() - lastSoundTime > 110) {
                playClatterSound();
                lastSoundTime = Date.now();
                const angle = (Math.random() - 0.5) * 35;
                cup.style.transform = `rotate(${angle}deg) scale(1.08)`;
            }
        }

        function endDrag() {
            if (!isDraggingCup) return;
            isDraggingCup = false;

            if (totalDragDistance > 650) {
                triggerRoll();
            } else {
                resetCupPosition();
            }
        }

        function triggerRoll() {
            if (!currentRoom || isClientRolling || isDelayedMoving) return;
            isClientRolling = true;
            cup.classList.add("hidden");
            
            // 던졌으므로 필드 위 주사위를 보이고 롤링 시작
            const activeDice = document.querySelectorAll("#active-dice-area .dice");
            activeDice.forEach(d => d.style.display = "grid");

            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: currentRoom.isHeld
            });
        }

        // 🎲 주사위 렌더링 함수 (3x3 CSS Grid 방식)[cite: 1]
        function renderDice(animate = false) {
            const activeArea = document.getElementById("active-dice-area");
            const slots = document.querySelectorAll(".dice-slot");
            
            activeArea.innerHTML = "";
            slots.forEach(slot => slot.innerHTML = "");

            if (!currentRoom) return;

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            if (isTurnJustStarted) {
                if (isMyTurn) {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.4); font-size:12px; text-align:center;">가죽 컵을 사방으로 흔들거나<br>폰을 세게 쥐고 흔드세요!</span>`;
                } else {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.4); font-size:12px;">상대가 고민하는 중입니다...</span>`;
                }
                return;
            }

            // Grid 좌표 눈 매핑 테이블[cite: 1]
            const dotPositions = {
                1: [4],                  // 정중앙
                2: [1, 7],               // 좌상, 우하
                3: [1, 4, 7],            // 좌상, 중앙, 우하
                4: [1, 2, 6, 7],         // 좌상, 우상, 좌하, 우하
                5: [1, 2, 4, 6, 7],      // 좌상, 우상, 중앙, 좌하, 우하
                6: [1, 2, 3, 5, 6, 7]    // 좌상, 우상, 좌중, 우중, 좌하, 우하
            };

            let holdSlotIndex = 0;
            for (let i = 0; i < 5; i++) {
                const diceValue = currentRoom.diceValues[i];
                
                const diceDiv = document.createElement("div");
                diceDiv.className = `dice ${currentRoom.isHeld[i] ? 'held' : ''}`;
                diceDiv.setAttribute("data-value", diceValue); // CSS Selector를 위한 데이터 밸류 바인딩[cite: 1]
                
                if (animate && !currentRoom.isHeld[i]) {
                    diceDiv.classList.add("dice-rolling");
                }
                
                // 눈 생성 후 격자에 맞춰 주입[cite: 1]
                const positions = dotPositions[diceValue] || [];
                positions.forEach(pos => {
                    const dotSpan = document.createElement("span");
                    dotSpan.className = `dot pos-${pos}`;
                    diceDiv.appendChild(dotSpan);
                });

                if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling && !isDelayedMoving) {
                    diceDiv.onclick = () => {
                        currentRoom.isHeld[i] = !currentRoom.isHeld[i];
                        renderDice(false);
                    };
                }

                if (currentRoom.isHeld[i]) {
                    if (slots[holdSlotIndex]) {
                        if (isDelayedMoving) {
                            diceDiv.classList.add("dice-glide");
                        }
                        slots[holdSlotIndex].appendChild(diceDiv);
                        holdSlotIndex++;
                    }
                } else {
                    activeArea.appendChild(diceDiv);
                }
            }
        }

        function renderScoreBoard() {
            if (!currentRoom) return;

            const headerRow = document.getElementById("table-header");
            headerRow.innerHTML = "<th>카테고리</th>";

            currentRoom.players.forEach((p, idx) => {
                const th = document.createElement("th");
                const isPlayerTurn = currentRoom.currentTurnIndex === idx;
                th.innerHTML = `${isPlayerTurn ? '🎲 ' : ''}${p.name}${p.id === myId ? '<br>(나)' : ''}`;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById("score-table-body");
            tbody.innerHTML = "";

            const activePlayer = currentRoom.players[currentRoom.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            categories.forEach(cat => {
                const tr = document.createElement("tr");

                if (cat.isSpecial) {
                    tr.className = "gray-row";
                    const nameTd = document.createElement("td");
                    nameTd.className = "category-label";
                    nameTd.innerText = cat.name;
                    tr.appendChild(nameTd);

                    currentRoom.players.forEach(p => {
                        const valTd = document.createElement("td");
                        if (cat.id === 'bonus') {
                            let sum = 0;
                            ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                                if (p.scores[c] !== undefined) sum += p.scores[c];
                            });
                            const bonusAchieved = sum >= 63;
                            valTd.innerHTML = `${sum}/63 <span style="color:${bonusAchieved?'#2e7d32':'#888'};">${bonusAchieved ? '(+35)' : '(0)'}</span>`;
                        } else if (cat.id === 'total') {
                            let sum = 0;
                            let upperSum = 0;
                            categories.forEach(c => {
                                if (!c.isSpecial && p.scores[c.id] !== undefined) {
                                    sum += p.scores[c.id];
                                }
                            });
                            ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                                if (p.scores[c] !== undefined) upperSum += p.scores[c];
                            });
                            if (upperSum >= 63) sum += 35;
                            valTd.innerText = sum;
                        }
                        tr.appendChild(valTd);
                    });
                    tbody.appendChild(tr);
                    return;
                }

                const nameTd = document.createElement("td");
                nameTd.className = "category-label";
                nameTd.innerText = cat.name;
                tr.appendChild(nameTd);

                currentRoom.players.forEach(p => {
                    const scoreTd = document.createElement("td");
                    scoreTd.className = "score-cell";

                    if (p.scores[cat.id] !== undefined) {
                        scoreTd.innerText = p.scores[cat.id];
                        scoreTd.classList.add("confirmed");
                    } else {
                        if (p.id === myId && isMyTurn && !isTurnJustStarted) {
                            scoreTd.classList.add("interactive");
                            const possible = calculatePossibleScore(cat.id, currentRoom.diceValues);
                            
                            if (selectedCategory === cat.id) {
                                scoreTd.innerText = `${possible} (클릭시 확정)`;
                                scoreTd.classList.add("active-preview");
                            } else {
                                scoreTd.innerText = `${possible}`;
                                scoreTd.style.color = "#bbb";
                            }

                            scoreTd.onclick = () => {
                                handleCellClick(cat.id);
                            };
                        } else {
                            scoreTd.innerText = "-";
                            scoreTd.style.opacity = "0.3";
                        }
                    }
                    tr.appendChild(scoreTd);
                });

                tbody.appendChild(tr);
            });
        }

        function calculatePossibleScore(category, vals) {
            const counts = {};
            vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sumAll = vals.reduce((a, b) => a + b, 0);

            switch (category) {
                case 'aces': return (counts[1] || 0) * 1;
                case 'duals': return (counts[2] || 0) * 2;
                case 'triples': return (counts[3] || 0) * 3;
                case 'quads': return (counts[4] || 0) * 4;
                case 'pentas': return (counts[5] || 0) * 5;
                case 'hexas': return (counts[6] || 0) * 6;
                case 'choice': return sumAll;
                case 'poker': case 'poker': {
                    for (let val in counts) {
                        // 동일한 눈이 4개 이상(4개 또는 5개) 나왔을 때
                        if (counts[val] >= 4) {
                            // 해당 눈의 값(val)에 딱 4를 곱한 점수만 인정 (남은 1개는 버림)
                            return Number(val) * 4;
                        }
                    }
                    return 0;
                }
                case 's_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr.includes('1234') || uniqueStr.includes('2345') || uniqueStr.includes('3456')) return 15;
                    return 0;
                }
                case 'l_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr === '12345' || uniqueStr === '23456') return 30;
                    return 0;
                }
                case 'yacht': {
                    for (let val in counts) {
                        if (counts[val] === 5) return 50;
                    }
                    return 0;
                }
                default: return 0;
            }
        }

        function requestGyroPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotionEvent);
                            alert("자이로 흔들기 기능이 활성화되었습니다!");
                            document.getElementById("gyro-init-btn").style.display = "none";
                        } else {
                            alert("자이로 센서 접근이 거부되었습니다. 드래그를 이용해 주세요.");
                        }
                    })
                    .catch(console.error);
            } else {
                if (window.DeviceMotionEvent) {
                    window.addEventListener('devicemotion', handleMotionEvent);
                    alert("모바일 흔들기 감지가 작동을 시도합니다!");
                    document.getElementById("gyro-init-btn").style.display = "none";
                } else {
                    alert("이 기기는 흔들기 센서를 지원하지 않습니다. 마우스/터치 드래그를 사용하세요.");
                }
            }
        }

        function handleMotionEvent(event) {
            if (isClientRolling || isDelayedMoving || !currentRoom) return;

            const activePlayer = currentRoom.players[currentRoom.currentTurnIndex];
            if (activePlayer.id !== myId || currentRoom.remainingRolls <= 0) return;

            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            if (lastShakingX === null) {
                lastShakingX = acc.x;
                lastShakingY = acc.y;
                lastShakingZ = acc.z;
                return;
            }

            const deltaX = Math.abs(acc.x - lastShakingX);
            const deltaY = Math.abs(acc.y - lastShakingY);
            const deltaZ = Math.abs(acc.z - lastShakingZ);

            if (deltaX + deltaY + deltaZ > shakeThreshold) {
                shakeAccumulator += (deltaX + deltaY + deltaZ);
                
                const activeDice = document.querySelectorAll("#active-dice-area .dice");
                activeDice.forEach(d => d.classList.add("dice-gathering"));

                if (Date.now() - lastSoundTime > 120) {
                    playClatterSound();
                    lastSoundTime = Date.now();
                }
            }

            lastShakingX = acc.x;
            lastShakingY = acc.y;
            lastShakingZ = acc.z;

            if (shakeAccumulator > 320) {
                shakeAccumulator = 0;
                triggerRoll();
            }
        }
    </script>
</body>
</html>
