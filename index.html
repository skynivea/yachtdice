<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요트 다이스 (Yacht Dice)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 3D 주사위 및 부드러운 애니메이션을 위한 스타일 */
        .dice-container {
            perspective: 600px;
        }
        .shaking {
            animation: shake 0.15s infinite alternate;
        }
        @keyframes shake {
            0% { transform: translate(5px, 5px) rotate(5deg); }
            100% { transform: translate(-5px, -5px) rotate(-5deg); }
        }
        /* 말풍선 꼬리 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #f3f4f6 transparent;
            display: block;
            width: 0;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between font-sans">

    <!-- 헤더 -->
    <header class="py-4 bg-slate-800 text-center border-b border-slate-700 shadow-md">
        <h1 class="text-2xl font-bold text-emerald-400 tracking-wider">🎲 YACHT DICE (요트 다이스)</h1>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow flex items-center justify-center p-4">
        <!-- 반응형 메인 컨테이너 (정사각형 게임판 / 통 / 스코어보드 가로 배치) -->
        <div class="flex flex-col lg:flex-row gap-6 max-w-6xl w-full items-stretch justify-center">
            
            <!-- 1. 정사각형 게임판 (Game Board) -->
            <div class="flex-1 bg-slate-800 border-2 border-slate-700 rounded-2xl p-6 flex flex-col justify-between items-center aspect-square shadow-xl relative min-w-[320px] max-w-[400px] mx-auto lg:mx-0">
                <div class="text-center w-full">
                    <h2 class="text-lg font-bold text-slate-300 mb-1 border-b border-slate-700 pb-2">필드 (보관된 주사위)</h2>
                    <p class="text-xs text-slate-400 mt-1">클릭하면 주사위를 킵하거나 다시 던질 수 있습니다.</p>
                </div>

                <!-- 주사위가 배치되는 영역 -->
                <div id="field-dice" class="grid grid-cols-3 gap-4 w-full justify-items-center my-auto">
                    <!-- JS에서 주사위 5개가 생성됨 -->
                </div>

                <div class="text-center w-full">
                    <span id="roll-count-badge" class="bg-emerald-600/30 text-emerald-400 text-sm font-semibold px-4 py-1.5 rounded-full border border-emerald-500/30">
                        남은 롤 횟수: <span id="roll-count" class="font-bold text-emerald-300">3</span>회
                    </span>
                </div>
            </div>

            <!-- 2. 주사위 통 (Cup) 영역 -->
            <div class="w-full lg:w-72 bg-slate-800 border border-slate-700 rounded-2xl p-6 flex flex-col justify-between items-center shadow-xl relative min-h-[350px] lg:min-h-auto">
                <div class="text-center">
                    <h2 class="text-lg font-bold text-slate-300 mb-1">주사위 통</h2>
                    <p class="text-xs text-slate-400">마우스로 통을 좌우로 마구 흔들어보세요!</p>
                </div>

                <!-- 통 영역 및 드래그 인터랙션 -->
                <div class="relative flex flex-col items-center justify-center my-auto w-full h-48">
                    <!-- 약한 흔들기 경고 토스트 (메시지창 프리징 원인 해결) -->
                    <div id="shake-warning" class="absolute -top-4 bg-amber-500 text-slate-900 text-xs font-bold px-3 py-1 rounded shadow-md opacity-0 transition-opacity duration-300 pointer-events-none z-40">
                        ⚠️ 더 강하게 흔들어주세요!
                    </div>

                    <!-- 이모티콘 말풍선 (상단 배치 및 최상위 z-index 보장) -->
                    <div id="speech-bubble" class="speech-bubble absolute -top-12 bg-gray-100 text-slate-800 text-sm font-bold py-2 px-4 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 z-50 pointer-events-none">
                        야호! 대박 점수 가자!
                    </div>

                    <!-- 드래그할 주사위 통 -->
                    <div id="dice-cup" class="w-32 h-36 bg-gradient-to-b from-amber-600 to-amber-800 rounded-b-3xl rounded-t-lg border-t-4 border-amber-500 shadow-2xl flex items-center justify-center cursor-grab active:cursor-grabbing transition-transform duration-75 relative z-10 select-none">
                        <div class="text-center">
                            <div class="text-3xl">🏺</div>
                            <span class="text-[10px] text-amber-200 font-bold tracking-wider block mt-2 uppercase">Shake Me</span>
                        </div>
                    </div>
                </div>

                <!-- 이모티콘 바 (말풍선과 겹치지 않도록 하단 레이어로 분리) -->
                <div class="w-full bg-slate-700/50 p-2.5 rounded-xl border border-slate-600 z-20">
                    <div class="text-[11px] text-slate-400 text-center mb-1.5 font-semibold">감정 표현하기</div>
                    <div class="flex justify-around gap-1">
                        <button onclick="showSpeech('🔥 불타오르네!!')" class="hover:scale-125 transition-transform text-lg p-1">🔥</button>
                        <button onclick="showSpeech('😭 제발 6 나와라...')" class="hover:scale-125 transition-transform text-lg p-1">😭</button>
                        <button onclick="showSpeech('😎 요트 간다 딱 대!')" class="hover:scale-125 transition-transform text-lg p-1">😎</button>
                        <button onclick="showSpeech('🎉 가즈아아아아!')" class="hover:scale-125 transition-transform text-lg p-1">🎉</button>
                    </div>
                </div>
            </div>

            <!-- 3. 스코어보드 (Scoreboard) -->
            <div class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl p-5 shadow-xl min-w-[320px]">
                <h2 class="text-lg font-bold text-slate-300 mb-3 text-center border-b border-slate-700 pb-2">점수판 (요트 족보)</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400 text-xs">
                                <th class="py-1.5 px-2">족보 이름</th>
                                <th class="py-1.5 px-2 text-center">조건</th>
                                <th class="py-1.5 px-2 text-right">내 점수</th>
                            </tr>
                        </thead>
                        <tbody id="scoreboard-body" class="divide-y divide-slate-700/50">
                            <!-- JS를 통해 한글화된 족보 행이 동적 렌더링됩니다. -->
                        </tbody>
                    </table>
                </div>

                <!-- 보너스 및 총점 디스플레이 -->
                <div class="mt-4 pt-3 border-t border-slate-600 flex justify-between items-center text-sm font-bold text-slate-300">
                    <div>보너스 (63점 이상 시 +35): <span id="bonus-progress" class="text-emerald-400">0 / 63</span></div>
                    <div class="text-lg text-emerald-400">총점: <span id="total-score">0</span></div>
                </div>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <footer class="py-3 text-center text-xs text-slate-500 bg-slate-900 border-t border-slate-800">
        &copy; 2026 Yacht Dice Board Game. All rights reserved.
    </footer>

    <!-- 게임 로직 스크립트 -->
    <script>
        // --- 게임 상태 관리 ---
        const gameState = {
            dice: [
                { value: 1, kept: false },
                { value: 2, kept: false },
                { value: 3, kept: false },
                { value: 4, kept: false },
                { value: 5, kept: false }
            ],
            rollsLeft: 3,
            scores: {
                aces: null, deuces: null, threes: null, fours: null, fives: null, sixes: null,
                choice: null, fourOfAKind: null, fullHouse: null,
                smallStraight: null, largeStraight: null, yacht: null
            },
            isRolling: false
        };

        // --- 족보 한글 통일 데이터 ---
        const categories = [
            { id: 'aces', name: '에이스 (Aces)', desc: '1의 눈 합' },
            { id: 'deuces', name: '듀스 (Deuces)', desc: '2의 눈 합' },
            { id: 'threes', name: '쓰리 (Threes)', desc: '3의 눈 합' },
            { id: 'fours', name: '포 (Fours)', desc: '4의 눈 합' },
            { id: 'fives', name: '파이브 (Fives)', desc: '5의 눈 합' },
            { id: 'sixes', name: '식스 (Sixes)', desc: '6의 눈 합' },
            { id: 'choice', name: '초이스 (Choice)', desc: '모든 눈의 합' },
            { id: 'fourOfAKind', name: '포카인드 (4 of a Kind)', desc: '동일 눈 4개 이상' },
            { id: 'fullHouse', name: '풀하우스 (Full House)', desc: '3개 동일 + 2개 동일' },
            { id: 'smallStraight', name: '스몰 스트레이트', desc: '이어지는 눈 4개 (15점)' },
            { id: 'largeStraight', name: '라지 스트레이트', desc: '이어지는 눈 5개 (30점)' },
            { id: 'yacht', name: '요트 (Yacht)', desc: '동일 눈 5개 (50점)' }
        ];

        // --- DOM 요소 참조 ---
        const diceCup = document.getElementById('dice-cup');
        const fieldDiceContainer = document.getElementById('field-dice');
        const rollCountEl = document.getElementById('roll-count');
        const scoreboardBody = document.getElementById('scoreboard-body');
        const totalScoreEl = document.getElementById('total-score');
        const bonusProgressEl = document.getElementById('bonus-progress');
        const shakeWarning = document.getElementById('shake-warning');
        const speechBubble = document.getElementById('speech-bubble');

        // --- 초기화 ---
        function init() {
            renderFieldDice();
            renderScoreboard();
            setupCupPhysics();
        }

        // --- 필드 주사위 렌더링 ---
        function renderFieldDice() {
            fieldDiceContainer.innerHTML = '';
            gameState.dice.forEach((die, index) => {
                const dieEl = document.createElement('div');
                dieEl.className = `dice-container w-16 h-16 flex items-center justify-center rounded-xl text-3xl font-bold cursor-pointer transition-all duration-200 select-none border-2 shadow-md
                    ${die.kept 
                        ? 'bg-emerald-600 border-emerald-400 text-white scale-95 shadow-inner' 
                        : 'bg-slate-700 border-slate-500 text-slate-100 hover:bg-slate-600 hover:-translate-y-1'}`;
                
                // 주사위 유니코드 매핑
                const diceFaces = ['🎲', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                dieEl.innerHTML = `<span class="transform transition-transform">${diceFaces[die.value]}</span>`;
                
                dieEl.addEventListener('click', () => toggleKeep(index));
                fieldDiceContainer.appendChild(dieEl);
            });
            rollCountEl.textContent = gameState.rollsLeft;
        }

        // --- 주사위 킵 토글 ---
        function toggleKeep(index) {
            if (gameState.rollsLeft === 3 || gameState.isRolling) return; // 굴리기 전이거나 굴리는 중엔 킵 불가
            gameState.dice[index].kept = !gameState.dice[index].kept;
            renderFieldDice();
            calculatePotentialScores();
        }

        // --- 컵 흔들기 피지스 (드래그 인터랙션) ---
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let lastX = 0;
        let lastY = 0;
        let totalDistance = 0;
        let lastTime = 0;

        function setupCupPhysics() {
            // 마우스 이벤트
            diceCup.addEventListener('mousedown', dragStart);
            window.addEventListener('mousemove', dragMove);
            window.addEventListener('mouseup', dragEnd);

            // 터치 이벤트 (모바일)
            diceCup.addEventListener('touchstart', (e) => dragStart(e.touches[0]), {passive: true});
            window.addEventListener('touchmove', (e) => dragMove(e.touches[0]), {passive: true});
            window.addEventListener('touchend', dragEnd);
        }

        function dragStart(e) {
            if (gameState.rollsLeft <= 0 || gameState.isRolling) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            lastX = e.clientX;
            lastY = e.clientY;
            totalDistance = 0;
            lastTime = Date.now();
            diceCup.style.transition = 'none';
        }

        function dragMove(e) {
            if (!isDragging) return;
            
            const currentX = e.clientX;
            const currentY = e.clientY;

            // 이동 거리 계산
            const deltaX = currentX - lastX;
            const deltaY = currentY - lastY;
            totalDistance += Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            // 주사위 통 시각적 움직임 반영 (범위 제한)
            const cupOffsetX = Math.max(-50, Math.min(50, currentX - startX));
            const cupOffsetY = Math.max(-30, Math.min(30, currentY - startY));
            diceCup.style.transform = `translate(${cupOffsetX}px, ${cupOffsetY}px) rotate(${cupOffsetX * 0.3}deg)`;

            lastX = currentX;
            lastY = currentY;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;

            // 컵 원래 자리로 복원
            diceCup.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            diceCup.style.transform = 'translate(0px, 0px) rotate(0deg)';

            const duration = Date.now() - lastTime;
            
            // 감도 검증: 최소 드래그 거리가 200px 이상이어야 굴리기 인정 (완화됨)
            if (totalDistance > 200 && duration > 100) {
                rollDice();
            } else {
                // 프리징 유발하는 alert 대신 화면 내부 토스트 띄우고 즉시 리셋
                showShakeWarning();
            }
        }

        // --- 부드러운 경고창 토스트 기능 ---
        let warningTimeout;
        function showShakeWarning() {
            shakeWarning.style.opacity = '1';
            clearTimeout(warningTimeout);
            warningTimeout = setTimeout(() => {
                shakeWarning.style.opacity = '0';
            }, 1200);
        }

        // --- 말풍선 감정 표현 ---
        let speechTimeout;
        function showSpeech(text) {
            speechBubble.textContent = text;
            speechBubble.style.opacity = '1';
            clearTimeout(speechTimeout);
            speechTimeout = setTimeout(() => {
                speechBubble.style.opacity = '0';
            }, 2500);
        }

        // --- 주사위 굴리기 시뮬레이션 ---
        function rollDice() {
            if (gameState.rollsLeft <= 0 || gameState.isRolling) return;
            
            gameState.isRolling = true;
            gameState.rollsLeft--;
            rollCountEl.textContent = gameState.rollsLeft;

            // 컵 쉐이킹 애니메이션 클래스 부여
            diceCup.classList.add('shaking');

            // 주사위 랜덤 롤링 연출
            let rolls = 0;
            const interval = setInterval(() => {
                gameState.dice.forEach((die) => {
                    if (!die.kept) {
                        die.value = Math.floor(Math.random() * 6) + 1;
                    }
                });
                renderFieldDice();
                rolls++;
                if (rolls > 8) {
                    clearInterval(interval);
                    diceCup.classList.remove('shaking');
                    gameState.isRolling = false;
                    calculatePotentialScores();
                }
            }, 100);
        }

        // --- 족보 계산 로직 ---
        function calculateScore(catId, diceValues) {
            const counts = Array(7).fill(0);
            diceValues.forEach(v => counts[v]++);
            const sum = diceValues.reduce((a, b) => a + b, 0);

            switch (catId) {
                case 'aces': return counts[1] * 1;
                case 'deuces': return counts[2] * 2;
                case 'threes': return counts[3] * 3;
                case 'fours': return counts[4] * 4;
                case 'fives': return counts[5] * 5;
                case 'sixes': return counts[6] * 6;
                case 'choice': return sum;
                case 'fourOfAKind':
                    return counts.some(c => c >= 4) ? sum : 0;
                case 'fullHouse':
                    const hasThree = counts.includes(3);
                    const hasTwo = counts.includes(2);
                    const hasFive = counts.includes(5);
                    return (hasThree && hasTwo) || hasFive ? sum : 0;
                case 'smallStraight':
                    const sStr = diceValues.join('');
                    const isSS = /1.*2.*3.*4|2.*3.*4.*5|3.*4.*5.*6/.test([...new Set(diceValues)].sort().join(''));
                    return isSS ? 15 : 0;
                case 'largeStraight':
                    const lStr = [...new Set(diceValues)].sort().join('');
                    return (lStr === '12345' || lStr === '23456') ? 30 : 0;
                case 'yacht':
                    return counts.includes(5) ? 50 : 0;
                default: return 0;
            }
        }

        // --- 스코어보드 렌더링 및 점수 표기 ---
        function renderScoreboard() {
            scoreboardBody.innerHTML = '';
            
            categories.forEach(cat => {
                const currentScore = gameState.scores[cat.id];
                const isCalculated = currentScore !== null;

                const row = document.createElement('tr');
                row.className = `border-b border-slate-700/50 text-xs transition-colors ${isCalculated ? 'bg-slate-800/40' : 'hover:bg-slate-700/30'}`;

                row.innerHTML = `
                    <td class="py-2.5 px-2 font-medium text-slate-200">
                        ${cat.name}
                        <div class="text-[10px] text-slate-500 font-normal">${cat.desc}</div>
                    </td>
                    <td class="py-2.5 px-2 text-center text-slate-400" id="cond-${cat.id}">-</td>
                    <td class="py-2.5 px-2 text-right font-bold text-sm" id="score-${cat.id}">
                        ${isCalculated ? `<span class="text-white">${currentScore}</span>` : `<span class="text-slate-500">-</span>`}
                    </td>
                `;

                if (!isCalculated) {
                    row.classList.add('cursor-pointer');
                    row.addEventListener('click', () => selectCategory(cat.id));
                }

                scoreboardBody.appendChild(row);
            });

            updateTotalScores();
        }

        // --- 예측 점수 프리뷰 노출 ---
        function calculatePotentialScores() {
            if (gameState.rollsLeft === 3) return; // 한 번도 던지지 않았을 때는 계산 생략

            const currentDiceValues = gameState.dice.map(d => d.value);

            categories.forEach(cat => {
                const scoreCell = document.getElementById(`score-${cat.id}`);
                if (gameState.scores[cat.id] === null && scoreCell) {
                    const potential = calculateScore(cat.id, currentDiceValues);
                    scoreCell.innerHTML = `<span class="text-emerald-400/70 group-hover:text-emerald-400">${potential}</span>`;
                }
            });
        }

        // --- 족보 선택 및 라운드 종료 ---
        function selectCategory(catId) {
            if (gameState.rollsLeft === 3 || gameState.isRolling) return; // 던지지 않고는 기록 불가
            if (gameState.scores[catId] !== null) return; // 이미 기록된 족보 패스

            const currentDiceValues = gameState.dice.map(d => d.value);
            gameState.scores[catId] = calculateScore(catId, currentDiceValues);

            // 다음 라운드 리셋
            gameState.rollsLeft = 3;
            gameState.dice.forEach(d => d.kept = false);

            renderFieldDice();
            renderScoreboard();

            // 게임 완료 판정
            if (Object.values(gameState.scores).every(v => v !== null)) {
                setTimeout(() => {
                    alert(`🎉 게임 종료! 최종 점수: ${document.getElementById('total-score').innerText}점`);
                }, 100);
            }
        }

        // --- 총점 & 보너스 점수 실시간 연산 ---
        function updateTotalScores() {
            // 상단 6항목 합계 (Aces ~ Sixes)
            const subtotalKeys = ['aces', 'deuces', 'threes', 'fours', 'fives', 'sixes'];
            let subtotal = 0;
            subtotalKeys.forEach(key => {
                subtotal += (gameState.scores[key] || 0);
            });

            // 보너스 조건 달성 여부 체크
            const bonusEarned = subtotal >= 63;
            bonusProgressEl.textContent = `${subtotal} / 63`;
            if (bonusEarned) {
                bonusProgressEl.className = 'text-emerald-400 font-extrabold';
                bonusProgressEl.textContent = `${subtotal} / 63 (보너스 +35 획득!)`;
            } else {
                bonusProgressEl.className = 'text-slate-400';
            }

            // 전체 종합
            let total = bonusEarned ? 35 : 0;
            Object.keys(gameState.scores).forEach(key => {
                total += (gameState.scores[key] || 0);
            });

            totalScoreEl.textContent = total;
        }

        // 실행
        init();
    </script>
</body>
</html>
