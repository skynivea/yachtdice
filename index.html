<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-velvet: #1b5e20; /* 벨벳 그린 보드판 컬러 */
            --wood-rim: #3e2723;
            --panel-dark: #123314;
            --accent-gold: #ffd700;
            --button-cyan: #00e5ff;
        }
        body {
            background-color: #0b220c;
            color: #fff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        header {
            background: linear-gradient(135deg, var(--wood-rim), #1b110e);
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            border-bottom: 4px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #lobby {
            background: linear-gradient(145deg, var(--panel-dark), #0a1f0b);
            padding: 35px;
            border-radius: 16px;
            border: 3px solid var(--accent-gold);
            margin-top: 60px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 400px;
            width: 90%;
        }
        .flat-input {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid var(--accent-gold);
            background: #000;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn-gold {
            background: linear-gradient(to bottom, #ffe082, #ffb300);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn-gold:active { transform: scale(0.95); }
        
        #game-arena {
            display: flex;
            flex-direction: column;
            width: 96%;
            max-width: 1200px;
            margin-top: 15px;
        }
        .room-tag {
            text-align: center;
            font-size: 18px;
            background: var(--panel-dark);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--accent-gold);
            margin-bottom: 10px;
        }
        #board-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }
        #dice-board {
            flex: 1.5;
            background-color: var(--bg-velvet);
            border: 10px solid var(--wood-rim);
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            min-height: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        /* 컵 (완전히 숨겨져 흔들 때 비비는 컵 디자인) */
        #dice-cup {
            width: 130px;
            height: 160px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            border: 5px solid #fff;
            border-radius: 30px 30px 100px 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            cursor: grab;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            touch-action: none;
            position: relative;
        }
        #dice-cup.shaking {
            animation: cup-shaking-anim 0.12s infinite alternate;
        }
        @keyframes cup-shaking-anim {
            0% { transform: translate(6px, 6px) rotate(-6deg); }
            100% { transform: translate(-6px, -6px) rotate(6deg); }
        }
        /* 필드 및 보관함 구획 */
        .dice-tray {
            width: 90%;
            min-height: 110px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 2px dashed rgba(255,255,255,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        #hold-home {
            background: rgba(0, 48, 12, 0.5);
            border: 2px solid var(--accent-gold);
        }
        .dice {
            width: 55px;
            height: 55px;
            background: #fff;
            color: #000;
            border-radius: 12px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s;
            user-select: none;
        }
        /* 미끄러져 들어가는 애니메이션 처리 */
        .dice.sliding {
            transform: translateY(120px) scale(0.9);
            opacity: 0.5;
        }
        .dice.held {
            border: 3px solid var(--button-cyan);
            box-shadow: 0 0 12px var(--button-cyan);
        }
        #scoreboard-section {
            flex: 1.2;
            background: var(--panel-dark);
            border: 3px solid var(--wood-rim);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 4px;
            text-align: center;
            font-size: 13px;
        }
        th { background-color: rgba(0,0,0,0.4); color: var(--accent-gold); }
        .score-cell { cursor: pointer; background: rgba(255,255,255,0.03); }
        .score-cell.confirmed { color: #4caf50; font-weight: bold; cursor: default; }
        
        /* [지뢰 8 해결] 부드러운 확인 인라인 모달 디자인 */
        #confirm-modal-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: linear-gradient(135deg, #111, #222);
            border: 2px solid var(--accent-gold);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 80%;
            max-width: 320px;
        }
        #confirm-modal-box.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* 순서 정하기 전용 오버레이 */
        #sequence-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>🎲 YACHT DICE DELUXE</header>

    <div id="lobby">
        <h2 style="color: var(--accent-gold); margin-top:0;">대기실 입장</h2>
        <input type="text" id="nickname-input" class="flat-input" placeholder="닉네임 (최대 8자)" maxlength="8">
        <button class="btn-gold" style="width: 85%; margin-bottom:10px;" onclick="createRoom()">➕ 방 만들기</button>
        <div style="display:flex; justify-content:center; gap:8px; width:85%; margin:0 auto;">
            <input type="text" id="room-code-input" class="flat-input" style="margin-bottom:0; width:60%;" placeholder="방 코드">
            <button class="btn-gold" style="width:38%; padding:0;" onclick="joinRoom()">입장</button>
        </div>
    </div>

    <div id="game-arena" class="hidden">
        <div class="room-tag">
            <span id="room-code-display" style="font-weight:bold;">코드: -</span>
            <button class="btn-gold" style="padding: 3px 10px; font-size:12px; margin-left:10px;" onclick="copyRoomCode()">복사 📋</button>
        </div>

        <div id="board-wrapper">
            <!-- 메인 보드 (벨벳 게임판) -->
            <div id="dice-board">
                <!-- 순서뽑기 오버레이 -->
                <div id="sequence-overlay" class="hidden">
                    <h2 style="color:var(--accent-gold);">🎲 선공 뽑기 스테이지 🎲</h2>
                    <p style="text-align:center;">순서를 정하기 위해 주사위를 굴리세요!<br>가장 높은 눈금이 나온 사람부터 시작합니다.</p>
                    <div id="sequence-rollers" style="display:flex; gap:10px; margin:20px 0;"></div>
                    <button id="seq-roll-btn" class="btn-gold" onclick="rollSequence()">뽑기 주사위 굴리기</button>
                </div>

                <div id="profile-container" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; width:100%;"></div>

                <!-- 컵 오브젝트 (주사위를 가리고 흔들기 트리거) -->
                <div id="dice-cup" class="hidden">주사위 컵 🥤</div>

                <h4 style="margin: 5px 0 0 0; color: #a5d6a7;">주사위 필드</h4>
                <div id="dice-field" class="dice-tray"></div>

                <h4 style="margin: 5px 0 0 0; color: var(--accent-gold);">보관함 (Hold)</h4>
                <div id="hold-home" class="dice-tray"></div>

                <div style="display:flex; gap:10px; width:100%; justify-content:center; margin-bottom:10px;">
                    <button id="roll-btn" class="btn-gold" style="background:#00e5ff; color:#000;" onclick="startShakingSequence()" disabled>Roll Dice</button>
                    <button id="start-btn" class="btn-gold hidden" onclick="startGame()">▶️ 게임 시작</button>
                    <button id="restart-btn" class="btn-gold hidden" onclick="requestRestart()">🔄 다시 시작</button>
                </div>

                <!-- 커스텀 슬라이드 인 모달 -->
                <div id="confirm-modal-box">
                    <span id="confirm-modal-text" style="font-weight:bold; color:#fff;">-</span>
                    <div style="display:flex; gap:15px; width:100%;">
                        <button class="btn-gold" style="flex:1; background:#4caf50;" onclick="confirmWriteScore(true)">확인</button>
                        <button class="btn-gold" style="flex:1; background:#f44336;" onclick="confirmWriteScore(false)">취소</button>
                    </div>
                </div>
            </div>

            <!-- 스코어보드 판 -->
            <div id="scoreboard-section">
                <h3 style="color: var(--accent-gold); margin-top:0; text-align:center;">SCOREBOARD</h3>
                <table id="score-table">
                    <thead>
                        <tr id="table-header"><th>카테고리</th></tr>
                    </thead>
                    <tbody id="score-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let myId = null;
        let isClientRolling = false;
        
        // 흔들기 감지 제어 변수들
        let isDraggingCup = false;
        let lastX = 0, lastY = 0;
        let shakeIntensity = 0;
        let lastMotionTime = 0;
        let lastAccX = 0, lastAccY = 0, lastAccZ = 0;

        const categories = [
            { id: 'aces', name: 'Aces (⚀)' },
            { id: 'duals', name: 'Duals (⚁)' },
            { id: 'triples', name: 'Triples (⚂)' },
            { id: 'quads', name: 'Quads (⚃)' },
            { id: 'pentas', name: 'Pentas (⚄)' },
            { id: 'hexas', name: 'Hexas (⚅)' },
            { id: 'choice', name: 'Choice (초이스)' },
            { id: 'poker', name: 'Poker (포커)' },
            { id: 'full_house', name: 'Full House (풀하우스)' },
            { id: 's_straight', name: 'S. Straight (스몰)' },
            { id: 'l_straight', name: 'L. Straight (라지)' },
            { id: 'yacht', name: 'Yacht (요트)' }
        ];

        let selectedCategoryForConfirm = null;

        function getNickname() {
            return document.getElementById("nickname-input").value.trim() || `User_${Math.floor(Math.random()*1000)}`;
        }

        function createRoom() {
            socket.emit('createRoom', { nickname: getNickname() });
        }

        function joinRoom() {
            const roomCode = document.getElementById("room-code-input").value.trim().toUpperCase();
            if (!roomCode) return alert("방 코드를 입력하세요.");
            socket.emit('joinRoom', { roomCode, nickname: getNickname() });
        }

        function copyRoomCode() {
            if (!currentRoom) return;
            navigator.clipboard.writeText(currentRoom.code);
            alert("방 코드가 클립보드에 복사되었습니다!");
        }

        function startGame() {
            socket.emit('startGame', { roomCode: currentRoom.code });
        }

        function rollSequence() {
            socket.emit('rollSequence', { roomCode: currentRoom.code });
            document.getElementById("seq-roll-btn").disabled = true;
        }

        function requestRestart() {
            socket.emit('restartGame', { roomCode: currentRoom.code });
        }

        // 마우스 드래그 및 흔들기 감지 초기화 함수 (모바일 & 데스크톱 모두 완벽 대응)
        function initShakePhysics() {
            const cup = document.getElementById("dice-cup");
            
            // 데스크톱 드래그 비비기 감지
            cup.addEventListener('mousedown', (e) => {
                isDraggingCup = true;
                shakeIntensity = 0;
                lastX = e.clientX;
                lastY = e.clientY;
                cup.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDraggingCup) return;
                const deltaX = Math.abs(e.clientX - lastX);
                const deltaY = Math.abs(e.clientY - lastY);
                shakeIntensity += (deltaX + deltaY);
                lastX = e.clientX;
                lastY = e.clientY;

                if (shakeIntensity > 350 && !isClientRolling) {
                    triggerRollSequence();
                }
            });

            window.addEventListener('mouseup', () => {
                isDraggingCup = false;
                cup.style.cursor = 'grab';
            });

            // 모바일 하드웨어 자이로/가속도 감지 (IOS & Android 완벽 호환)
            if (window.DeviceMotionEvent) {
                // iOS 13+ 가속도 허용 절차 우회 대응
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    cup.addEventListener('touchstart', () => {
                        DeviceMotionEvent.requestPermission().then(state => {
                            if (state === 'granted') {
                                window.addEventListener('devicemotion', handleMobileShake, true);
                            }
                        }).catch(console.error);
                    }, { once: true });
                } else {
                    window.addEventListener('devicemotion', handleMobileShake, true);
                }
            }
        }

        function handleMobileShake(event) {
            const currentTime = Date.now();
            if ((currentTime - lastMotionTime) > 100) {
                const diffTime = currentTime - lastMotionTime;
                lastMotionTime = currentTime;

                const acc = event.accelerationIncludingGravity;
                if (!acc) return;

                const speed = Math.abs(acc.x + acc.y + acc.z - lastAccX - lastAccY - lastAccZ) / diffTime * 10000;
                
                // 디바이스 가속도가 특정 임계치(800) 이상으로 격렬히 흔들렸을 때
                if (speed > 800 && !isClientRolling && currentRoom && currentRoom.players[currentRoom.currentTurnIndex].id === myId && currentRoom.remainingRolls > 0) {
                    triggerRollSequence();
                }

                lastAccX = acc.x;
                lastAccY = acc.y;
                lastAccZ = acc.z;
            }
        }

        function triggerRollSequence() {
            isDraggingCup = false;
            startShakingSequence();
        }

        function startShakingSequence() {
            if (!currentRoom || isClientRolling) return;
            isClientRolling = true;
            document.getElementById("roll-btn").disabled = true;

            const cup = document.getElementById("dice-cup");
            cup.classList.add("shaking");

            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: currentRoom.isHeld
            });
        }

        // [지뢰 8 해결] 인라인 슬라이드형 기입 컨펌 모달
        function promptWriteScore(category, name, possibleScore) {
            selectedCategoryForConfirm = category;
            const modal = document.getElementById("confirm-modal-box");
            document.getElementById("confirm-modal-text").innerText = `[${name}] 칸에 ${possibleScore}점을 기입합니까?`;
            modal.classList.add("show");
        }

        function confirmWriteScore(isConfirmed) {
            const modal = document.getElementById("confirm-modal-box");
            modal.classList.remove("show");

            if (isConfirmed && selectedCategoryForConfirm) {
                socket.emit('writeScore', {
                    roomCode: currentRoom.code,
                    category: selectedCategoryForConfirm
                });
            }
            selectedCategoryForConfirm = null;
        }

        socket.on('roomCreated', ({ roomCode }) => {
            myId = socket.id;
            document.getElementById("lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            document.getElementById("room-code-display").innerText = `방 코드: ${roomCode}`;
            initShakePhysics();
        });

        socket.on('roomJoined', ({ roomCode }) => {
            myId = socket.id;
            document.getElementById("lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            document.getElementById("room-code-display").innerText = `방 코드: ${roomCode}`;
            initShakePhysics();
        });

        socket.on('sequenceStageStarted', (room) => {
            currentRoom = room;
            document.getElementById("sequence-overlay").classList.remove("hidden");
            document.getElementById("seq-roll-btn").disabled = false;
            updateSequenceOverlay();
        });

        socket.on('sequenceRolled', ({ playerId, value }) => {
            const player = currentRoom.players.find(p => p.id === playerId);
            if (player) player.sequenceRoll = value;
            updateSequenceOverlay();
        });

        function updateSequenceOverlay() {
            const container = document.getElementById("sequence-rollers");
            container.innerHTML = "";
            currentRoom.players.forEach(p => {
                const box = document.createElement("div");
                box.style.background = "rgba(255,255,255,0.1)";
                box.style.padding = "10px";
                box.style.borderRadius = "8px";
                box.style.textAlign = "center";
                box.innerHTML = `<div>${p.name}</div><div style="font-size:24px; color:var(--accent-gold); font-weight:bold;">${p.sequenceRoll > 0 ? getDiceEmoji(p.sequenceRoll) : '⏳'}</div>`;
                container.appendChild(box);
            });
        }

        socket.on('gameStarted', (room) => {
            document.getElementById("sequence-overlay").classList.add("hidden");
            document.getElementById("start-btn").classList.add("hidden");
            document.getElementById("restart-btn").classList.add("hidden");
            updateRoomState(room);
        });

        socket.on('diceRolled', ({ diceValues, remainingRolls, isHeld }) => {
            currentRoom.diceValues = diceValues;
            currentRoom.remainingRolls = remainingRolls;
            currentRoom.isHeld = isHeld;

            const cup = document.getElementById("dice-cup");
            cup.classList.add("shaking");

            setTimeout(() => {
                cup.classList.remove("shaking");
                cup.classList.add("hidden"); // 컵 내부 주사위 노출 시 숨김 처리
                isClientRolling = false;
                
                // 만약 마지막 롤링이 끝났다면 남은 필드 주사위를 보관함으로 미끄러져 들어가는 슬라이드 효과 트리거
                if (remainingRolls === 0) {
                    triggerSlideToHoldAnimation();
                } else {
                    renderDice();
                    renderScoreBoard();
                }

                const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
                if (isMyTurn && remainingRolls > 0) {
                    document.getElementById("roll-btn").disabled = false;
                }
            }, 700);
        });

        // [지뢰 7 해결] 미끄러지듯 홀드 홈으로 주입되는 애니메이션 연출
        function triggerSlideToHoldAnimation() {
            const dices = document.querySelectorAll("#dice-field .dice");
            dices.forEach((d) => {
                d.classList.add("sliding");
            });

            setTimeout(() => {
                currentRoom.isHeld = [true, true, true, true, true];
                renderDice();
                renderScoreBoard();
            }, 300);
        }

        socket.on('gameStateUpdate', (room) => {
            updateRoomState(room);
        });

        socket.on('scoreRegistered', ({ playerId, category, score }) => {
            if (category === 'yacht' && score === 50) {
                confetti({ particleCount: 180, spread: 100, origin: { y: 0.5 } });
            }
        });

        socket.on('gameFinished', (room) => {
            updateRoomState(room);
            alert("경기가 종료되었습니다! 결과를 확인하세요.");
            if (room.players[0].id === myId) {
                document.getElementById("restart-btn").classList.remove("hidden");
            }
        });

        function updateRoomState(room) {
            currentRoom = room;

            const isOwner = room.players[0].id === myId;
            if (isOwner && !room.gameStarted) {
                document.getElementById("start-btn").classList.remove("hidden");
            } else {
                document.getElementById("start-btn").classList.add("hidden");
            }

            const profileContainer = document.getElementById("profile-container");
            profileContainer.innerHTML = "";
            room.players.forEach((p, idx) => {
                const card = document.createElement("div");
                const isMyTurn = idx === room.currentTurnIndex;
                card.style.background = isMyTurn ? "var(--bg-velvet)" : "rgba(0,0,0,0.5)";
                card.style.border = isMyTurn ? "3px solid var(--accent-gold)" : "1px solid #555";
                card.style.padding = "8px 15px";
                card.style.borderRadius = "8px";
                card.innerHTML = `<strong>${idx === 0 ? '👑 ' : ''}${p.name}</strong> ${p.id === myId ? '(나)' : ''} ${p.active ? '' : '[탈주]'}`;
                profileContainer.appendChild(card);
            });

            const isMyTurn = room.players[room.currentTurnIndex].id === myId;
            const rollBtn = document.getElementById("roll-btn");
            const cup = document.getElementById("dice-cup");

            // [지뢰 3 해결] 턴 시작 및 점수 등록 직후 주사위 컵 속에 숨기기
            const isTurnJustStarted = room.diceValues.every(v => v === 0);

            if (room.stage === 'play' && isMyTurn && room.remainingRolls > 0 && !isClientRolling) {
                rollBtn.disabled = false;
                rollBtn.innerText = `Roll Dice (${room.remainingRolls}회 남음)`;
                if (isTurnJustStarted) {
                    cup.classList.remove("hidden"); // 던지기 전에는 무조건 컵 속에 밀봉
                }
            } else {
                rollBtn.disabled = true;
                rollBtn.innerText = room.stage === 'play' ? `상대방 차례` : `대기 중...`;
                cup.classList.add("hidden");
            }

            renderDice();
            renderScoreBoard();
        }

        function renderDice() {
            const field = document.getElementById("dice-field");
            const holdHome = document.getElementById("hold-home");
            field.innerHTML = "";
            holdHome.innerHTML = "";

            if (!currentRoom) return;

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            // 주사위 값이 아예 없는 단계에서는 눈금을 일체 렌더링하지 않음
            if (isTurnJustStarted) return;

            for (let i = 0; i < 5; i++) {
                const diceDiv = document.createElement("div");
                diceDiv.className = `dice ${currentRoom.isHeld[i] ? 'held' : ''}`;
                diceDiv.innerText = getDiceEmoji(currentRoom.diceValues[i]);

                if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling) {
                    // [지뢰 6 해결] 클릭 시 보관함 <-> 필드로 정밀 전환
                    diceDiv.onclick = () => {
                        currentRoom.isHeld[i] = !currentRoom.isHeld[i];
                        renderDice();
                    };
                }

                if (currentRoom.isHeld[i]) {
                    holdHome.appendChild(diceDiv);
                } else {
                    field.appendChild(diceDiv);
                }
            }
        }

        function getDiceEmoji(num) {
            const emojis = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            return emojis[num] || num;
        }

        function renderScoreBoard() {
            if (!currentRoom) return;

            const headerRow = document.getElementById("table-header");
            headerRow.innerHTML = "<th>카테고리</th>";

            currentRoom.players.forEach(p => {
                const th = document.createElement("th");
                th.innerText = p.name;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById("score-table-body");
            tbody.innerHTML = "";

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            categories.forEach(cat => {
                const tr = document.createElement("tr");
                const nameTd = document.createElement("td");
                nameTd.innerText = cat.name;
                tr.appendChild(nameTd);

                currentRoom.players.forEach(p => {
                    const scoreTd = document.createElement("td");
                    scoreTd.className = "score-cell";

                    if (p.scores[cat.id] !== undefined) {
                        scoreTd.innerText = p.scores[cat.id];
                        scoreTd.classList.add("confirmed");
                    } else {
                        if (p.id === myId && isMyTurn && !isTurnJustStarted && !isClientRolling) {
                            const possible = calculatePossibleScore(cat.id, currentRoom.diceValues);
                            scoreTd.innerText = `${possible}`;
                            scoreTd.style.color = "var(--accent-gold)";
                            scoreTd.onclick = () => {
                                promptWriteScore(cat.id, cat.name, possible);
                            };
                        } else {
                            scoreTd.innerText = "-";
                            scoreTd.style.opacity = "0.3";
                        }
                    }
                    tr.appendChild(scoreTd);
                });

                tbody.appendChild(tr);
            });

            // [지뢰 9 해결] 보너스점수 가산 수식 렌더러
            const bonusTr = document.createElement("tr");
            bonusTr.innerHTML = "<td><strong>보너스 (+35)</strong></td>";
            currentRoom.players.forEach(p => {
                let sum = 0;
                ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                    if (p.scores[c] !== undefined) sum += p.scores[c];
                });
                const achieved = sum >= 63;
                bonusTr.innerHTML += `<td style="color:${achieved ? '#4caf50':'#fff'}"><strong>${sum}/63 ${achieved ? '(+35)' : ''}</strong></td>`;
            });
            tbody.appendChild(bonusTr);
        }

        function calculatePossibleScore(category, vals) {
            const counts = {};
            vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sumAll = vals.reduce((a, b) => a + b, 0);

            switch (category) {
                case 'aces': return (counts[1] || 0) * 1;
                case 'duals': return (counts[2] || 0) * 2;
                case 'triples': return (counts[3] || 0) * 3;
                case 'quads': return (counts[4] || 0) * 4;
                case 'pentas': return (counts[5] || 0) * 5;
                case 'hexas': return (counts[6] || 0) * 6;
                case 'choice': return sumAll;
                case 'poker': {
                    for (let val in counts) {
                        if (counts[val] >= 4) return sumAll;
                    }
                    return 0;
                }
                case 'full_house': {
                    let hasThree = false;
                    let hasTwo = false;
                    for (let val in counts) {
                        if (counts[val] === 3) hasThree = true;
                        if (counts[val] === 2) hasTwo = true;
                        if (counts[val] === 5) { hasThree = true; hasTwo = true; }
                    }
                    return (hasThree && hasTwo) ? sumAll : 0;
                }
                case 's_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr.includes('1234') || uniqueStr.includes('2345') || uniqueStr.includes('3456')) return 15;
                    return 0;
                }
                case 'l_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr === '12345' || uniqueStr === '23456') return 30;
                    return 0;
                }
                case 'yacht': {
                    for (let val in counts) {
                        if (counts[val] === 5) return 50;
                    }
                    return 0;
                }
                default: return 0;
            }
        }
    </script>
