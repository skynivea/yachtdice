<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Deluxe</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark-gray: #1a1a1a; /* 세련되고 어두운 회색 */
            --bg-panel: #262626;
            --velvet-burgundy: #6b1416; /* 🍷 깊고 클래식한 버건디 벨벳 */
            --accent-gold: #e5a93b;
            --paper-white: #fafaf6; /* 📝 종이 스코어보드 하얀색 */
            --paper-border: #d4d4cb;
        }
        body {
            background-color: var(--bg-dark-gray);
            color: #f5f5f5;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        
        /* 메인 홈 / 대기실 */
        #main-home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        .main-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .menu-box {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #3d3d3d;
            padding: 30px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .flat-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .flat-input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5c060, #d39325);
            color: #0d0d0d;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-gold:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-outline:hover { color: #fff; border-color: #888; }

        /* 대기방(Lobby) 구조 */
        #waiting-lobby {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #444;
            padding: 30px;
            margin-top: 50px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lobby-title {
            font-size: 20px;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: bold;
        }
        .user-list {
            background: #111;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            min-height: 120px;
        }
        .user-item {
            padding: 8px 12px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
        
        /* 🕹️ 실시간 게임 아레나 */
        #game-arena {
            display: flex;
            flex-direction: column;
            width: 96%;
            max-width: 1100px;
            margin: 20px auto;
        }
        .room-tag {
            text-align: center;
            font-size: 16px;
            background: var(--bg-panel);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #board-wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* 3. 정사각형 주사위 벨벳 판 디자인 */
        #dice-board {
            flex: 1.3;
            background-color: var(--velvet-burgundy);
            border: 12px solid #1a0607;
            border-radius: 24px;
            padding: 25px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 12px 25px rgba(0,0,0,0.6);
            aspect-ratio: 1 / 1; /* 정사각형 가로세로 비율 강제 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
        }

        /* 주사위 홈 5개 */
        .dice-slots-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }
        .dice-slot {
            flex: 1;
            aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.6);
        }

        /* 벨벳 필드 구획 (주사위가 자유롭게 굴러다니는 느낌의 메인 영역) */
        #dice-field {
            flex: 1;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        /* 주사위 자체 디자인 */
        .dice {
            width: 60px;
            height: 60px;
            background: #ffffff;
            color: #000;
            border-radius: 12px;
            font-size: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s;
            user-select: none;
        }
        .dice.held {
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
        }

        /* 4. 리얼 종이 스코어보드 (하얀 배경) */
        #scoreboard-section {
            flex: 1.1;
            background: var(--paper-white);
            color: #2b2b2b;
            border: 1px solid var(--paper-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .paper-title {
            color: #1a1a1a;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        .paper-badge {
            background: #eaeae3;
            color: #4f4f48;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 auto 15px auto;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border-bottom: 1px solid var(--paper-border);
            padding: 10px 5px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background: #eaeae3;
            color: #333;
            font-weight: bold;
            font-size: 12px;
        }
        /* 인라인 터치 입력 감성 */
        .score-cell {
            cursor: pointer;
            background: rgba(0,0,0,0.01);
            transition: background 0.2s;
            font-weight: bold;
            color: #777;
        }
        .score-cell:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .score-cell.confirmed {
            color: #2e7d32; /* 확정된 점수 초록색 */
            font-size: 15px;
            cursor: default;
        }
        .score-cell.active-confirm {
            background: #ffe082 !important;
            color: #b7791f !important;
            animation: pulse-border 1s infinite alternate;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        /* 로비 상태 전용 숨김 처리 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header style="background:#111; width:100%; padding:15px; text-align:center; font-size:24px; font-weight:900; color:var(--accent-gold); border-bottom:1px solid #333;">
        🎲 YACHT DICE DELUXE
    </header>

    <!-- [수정] 1. 메인 홈 화면 (방 만들기 / 방 들어가기 2개 버튼 구성) -->
    <div id="main-home">
        <h1 class="main-title">Yacht Dice</h1>
        
        <!-- 홈 화면 기본 메뉴 -->
        <div id="home-menu" class="menu-box">
            <button class="btn-gold" onclick="showInputForm('create')">➕ 방 만들기</button>
            <button class="btn-outline" onclick="showInputForm('join')">🔑 방 들어가기</button>
        </div>

        <!-- 닉네임 입력 (방 만들기용) -->
        <div id="create-form" class="menu-box hidden">
            <h3 style="margin-top:0;">방 만들기</h3>
            <input type="text" id="nickname-create" class="flat-input" placeholder="사용할 닉네임 (최대 8자)" maxlength="8">
            <button class="btn-gold" onclick="createRoom()">방 생성하기</button>
            <button class="btn-outline" onclick="goBackToMenu()">뒤로가기</button>
        </div>

        <!-- 닉네임 & 방코드 입력 (방 들어가기용) -->
        <div id="join-form" class="menu-box hidden">
            <h3 style="margin-top:0;">방 들어가기</h3>
            <input type="text" id="nickname-join" class="flat-input" placeholder="사용할 닉네임 (최대 8자)" maxlength="8" style="margin-bottom:10px;">
            <input type="text" id="room-code-input" class="flat-input" placeholder="방 코드 (4자리)" maxlength="4" style="text-transform:uppercase;">
            <button class="btn-gold" onclick="joinRoom()">방 입장하기</button>
            <button class="btn-outline" onclick="goBackToMenu()">뒤로가기</button>
        </div>
    </div>

    <!-- [수정] 2. 대기방 화면 (다 들어오면 방장이 게임 시작 버튼 누를 수 있음) -->
    <div id="waiting-lobby" class="hidden">
        <div class="lobby-title">🚪 대기실 입장 완료</div>
        <div style="font-size: 28px; font-weight: bold; letter-spacing: 2px; color: var(--accent-gold); margin: 15px 0;" id="lobby-code-display">-</div>
        <p style="font-size:12px; color:#aaa; margin-top:0;">이 코드를 복사해서 다른 사람에게 전달하세요.</p>
        
        <div class="user-list" id="lobby-users">
            <!-- 실시간 접속 플레이어들 목록 -->
        </div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <button id="start-btn" class="btn-gold hidden" onclick="startGame()">▶️ 게임 시작 (방장전용)</button>
            <div id="owner-waiting-msg" style="font-size:14px; color:#888;">방장이 게임을 시작할 때까지 대기하고 있습니다...</div>
        </div>
    </div>

    <!-- [수정] 3. 실제 요트 다이스 인게임 아레나 -->
    <div id="game-arena" class="hidden">
        <div class="room-tag">
            <span>Room Code: <strong id="room-code-display" style="color:var(--accent-gold);">-</strong></span>
            <span style="font-size: 13px; color:#aaa;" id="turn-indicator">대기 중...</span>
        </div>

        <div id="board-wrapper">
            <!-- 정사각형 벨벳 게임판 -->
            <div id="dice-board">
                <!-- 상단 주사위 보관함 (홈 5개) -->
                <div class="dice-slots-container" id="hold-home">
                    <div class="dice-slot" data-index="0"></div>
                    <div class="dice-slot" data-index="1"></div>
                    <div class="dice-slot" data-index="2"></div>
                    <div class="dice-slot" data-index="3"></div>
                    <div class="dice-slot" data-index="4"></div>
                </div>

                <!-- 중앙 주사위 굴리는 버건디 필드 -->
                <div id="dice-field">
                    <!-- 굴려진 주사위가 여기에 떨어짐 -->
                </div>

                <!-- 하단 액션 바 -->
                <div style="width: 100%; display:flex; flex-direction:column; gap:10px;">
                    <button id="roll-btn" class="btn-gold" style="margin: 0;" onclick="rollDice()" disabled>Roll Dice (3/3)</button>
                    <button id="restart-btn" class="btn-outline hidden" onclick="requestRestart()">🔄 다시 시작</button>
                </div>
            </div>

            <!-- 📝 리얼 종이 스코어보드 (우측 패널) -->
            <div id="scoreboard-section">
                <h3 class="paper-title">Yacht Scorecard</h3>
                <div style="text-align:center;">
                    <span class="paper-badge">63점 달성 시 보너스 +35점 🎁</span>
                </div>
                
                <table id="score-table">
                    <thead>
                        <tr id="table-header"><th>Categories</th></tr>
                    </thead>
                    <tbody id="score-table-body">
                        <!-- 점수 기록 라인들이 동적으로 하얗게 들어옴 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let myId = null;
        let isClientRolling = false;
        let activeConfirmCategory = null; // 인라인 점수 기입 선택용 변수

        const categories = [
            { id: 'aces', name: 'Aces (⚀)' },
            { id: 'duals', name: 'Duals (⚁)' },
            { id: 'triples', name: 'Triples (⚂)' },
            { id: 'quads', name: 'Quads (⚃)' },
            { id: 'pentas', name: 'Pentas (⚄)' },
            { id: 'hexas', name: 'Hexas (⚅)' },
            { id: 'choice', name: 'Choice' },
            { id: 'poker', name: 'Poker' },
            { id: 'full_house', name: 'Full House' },
            { id: 's_straight', name: 'S. Straight' },
            { id: 'l_straight', name: 'L. Straight' },
            { id: 'yacht', name: 'Yacht ⛵' }
        ];

        // 화면 네비게이션 제어
        function showInputForm(type) {
            document.getElementById("home-menu").classList.add("hidden");
            if (type === 'create') {
                document.getElementById("create-form").classList.remove("hidden");
            } else {
                document.getElementById("join-form").classList.remove("hidden");
            }
        }

        function goBackToMenu() {
            document.getElementById("create-form").classList.add("hidden");
            document.getElementById("join-form").classList.add("hidden");
            document.getElementById("home-menu").classList.remove("hidden");
        }

        // 1-1. 방 만들기 (닉네임 설정 후 방장이 되며 4자리 코드 획득)
        function createRoom() {
            const nickname = document.getElementById("nickname-create").value.trim() || `Host_${Math.floor(Math.random()*1000)}`;
            socket.emit('createRoom', { nickname });
        }

        // 1-2. 방 들어가기 (닉네임, 방 코드 입력 후 다른 사람 방에 입장)
        function joinRoom() {
            const nickname = document.getElementById("nickname-join").value.trim() || `Guest_${Math.floor(Math.random()*1000)}`;
            const roomCode = document.getElementById("room-code-input").value.trim().toUpperCase();
            if (!roomCode) return alert("방 코드를 입력하세요.");
            socket.emit('joinRoom', { roomCode, nickname });
        }

        function startGame() {
            socket.emit('startGame', { roomCode: currentRoom.code });
        }

        function rollDice() {
            if (!currentRoom || isClientRolling) return;
            isClientRolling = true;
            document.getElementById("roll-btn").disabled = true;

            socket.emit('rollDice', {
                roomCode: currentRoom.code,
                clientHeld: currentRoom.isHeld
            });
        }

        function requestRestart() {
            socket.emit('restartGame', { roomCode: currentRoom.code });
        }

        // 4. 인라인 스코어보드 클릭 액션 (가독성 & 조작감 대폭 개선)
        function handleCellClick(category, name, possibleScore, cellElement) {
            // 이미 다른 칸이 활성화되어 있었다면 클래스 초기화
            document.querySelectorAll(".score-cell").forEach(el => el.classList.remove("active-confirm"));

            if (activeConfirmCategory === category) {
                // 한 번 더 누르면 최종 기입 확정
                socket.emit('writeScore', {
                    roomCode: currentRoom.code,
                    category: category
                });
                activeConfirmCategory = null;
            } else {
                // 처음 누르면 활성화 표시 (깜빡이는 인라인 이펙트 적용)
                activeConfirmCategory = category;
                cellElement.classList.add("active-confirm");
                cellElement.innerText = `${possibleScore} (Click again!)`;
            }
        }

        // 소켓 이벤트 수신
        socket.on('roomCreated', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        socket.on('roomJoined', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        function transitionToLobby(roomCode) {
            document.getElementById("main-home").classList.add("hidden");
            document.getElementById("waiting-lobby").classList.remove("hidden");
            document.getElementById("lobby-code-display").innerText = roomCode;
        }

        socket.on('gameStateUpdate', (room) => {
            currentRoom = room;

            // 로비 단계인 경우 접속 유저 리스트만 최신화
            if (room.stage === 'lobby') {
                updateLobbyUsers(room);
                return;
            }

            // 게임 플레이 스테이지 진입
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            
            updateRoomState(room);
        });

        function updateLobbyUsers(room) {
            const container = document.getElementById("lobby-users");
            container.innerHTML = "";
            room.players.forEach((p, idx) => {
                const item = document.createElement("div");
                item.className = "user-item";
                item.innerHTML = `<span>${idx === 0 ? '👑 ' : '👤 '}${p.name} ${p.id === myId ? '(나)' : ''}</span><span style="color:#888;">Ready</span>`;
                container.appendChild(item);
            });

            // 2. 방장에게만 게임 시작 버튼 노출 (그 외엔 대기 상태)
            const isOwner = room.players[0].id === myId;
            if (isOwner) {
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("owner-waiting-msg").classList.add("hidden");
            } else {
                document.getElementById("start-btn").classList.add("hidden");
                document.getElementById("owner-waiting-msg").classList.remove("hidden");
            }
        }

        socket.on('gameStarted', (room) => {
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        socket.on('diceRolled', ({ diceValues, remainingRolls, isHeld }) => {
            currentRoom.diceValues = diceValues;
            currentRoom.remainingRolls = remainingRolls;
            currentRoom.isHeld = isHeld;

            // 필드를 어둡고 긴장감 있게 연출
            const field = document.getElementById("dice-field");
            field.style.opacity = "0.5";

            setTimeout(() => {
                field.style.opacity = "1";
                isClientRolling = false;
                renderDice();
                renderScoreBoard();

                const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
                if (isMyTurn && remainingRolls > 0) {
                    document.getElementById("roll-btn").disabled = false;
                }
            }, 600);
        });

        socket.on('scoreRegistered', ({ playerId, category, score }) => {
            if (category === 'yacht' && score === 50) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }
        });

        socket.on('gameFinished', (room) => {
            updateRoomState(room);
            alert("요트 경기가 종료되었습니다! 결과를 종이 스코어보드에서 확인해 보세요.");
            if (room.players[0].id === myId) {
                document.getElementById("restart-btn").classList.remove("hidden");
            }
        });

        function updateRoomState(room) {
            currentRoom = room;
            document.getElementById("room-code-display").innerText = room.code;

            const activePlayer = room.players[room.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;

            // 턴 인디케이터 상단 배치
            const turnIndicator = document.getElementById("turn-indicator");
            if (isMyTurn) {
                turnIndicator.innerHTML = `<span style="color:var(--accent-gold); font-weight:bold;">🟢 당신의 차례입니다!</span>`;
            } else {
                turnIndicator.innerText = `🔴 ${activePlayer.name}의 차례`;
            }

            // 주사위 버튼 세팅
            const rollBtn = document.getElementById("roll-btn");
            if (room.stage === 'play' && isMyTurn && room.remainingRolls > 0 && !isClientRolling) {
                rollBtn.disabled = false;
                rollBtn.innerText = `Roll Dice (${room.remainingRolls}회 남음)`;
            } else {
                rollBtn.disabled = true;
                rollBtn.innerText = room.stage === 'play' ? `상대 차례 대기 중` : `게임 오버`;
            }

            renderDice();
            renderScoreBoard();
        }

        // 3. 주사위 & 홀드 칸 분리 렌더링
        function renderDice() {
            const field = document.getElementById("dice-field");
            const slots = document.querySelectorAll(".dice-slot");
            
            // 필드와 슬롯 비우기
            field.innerHTML = "";
            slots.forEach(slot => slot.innerHTML = "");

            if (!currentRoom) return;

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            if (isTurnJustStarted) {
                field.innerHTML = `<span style="color:rgba(255,255,255,0.25); font-size:14px;">Roll Dice 버튼을 눌러 던지세요!</span>`;
                return;
            }

            let holdSlotIndex = 0;
            for (let i = 0; i < 5; i++) {
                const diceDiv = document.createElement("div");
                diceDiv.className = `dice ${currentRoom.isHeld[i] ? 'held' : ''}`;
                diceDiv.innerText = getDiceEmoji(currentRoom.diceValues[i]);

                if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling) {
                    diceDiv.onclick = () => {
                        currentRoom.isHeld[i] = !currentRoom.isHeld[i];
                        renderDice();
                    };
                }

                if (currentRoom.isHeld[i]) {
                    // 상단 주사위 홀드 홈 빈자리에 순서대로 안착
                    if (slots[holdSlotIndex]) {
                        slots[holdSlotIndex].appendChild(diceDiv);
                        holdSlotIndex++;
                    }
                } else {
                    // 버건디 필드에 렌더링
                    field.appendChild(diceDiv);
                }
            }
        }

        function getDiceEmoji(num) {
            const emojis = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            return emojis[num] || num;
        }

        // 4. 리얼 하얀 종이 스코어보드 렌더링
        function renderScoreBoard() {
            if (!currentRoom) return;

            const headerRow = document.getElementById("table-header");
            headerRow.innerHTML = "<th>Categories</th>";

            currentRoom.players.forEach(p => {
                const th = document.createElement("th");
                th.innerText = p.name;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById("score-table-body");
            tbody.innerHTML = "";

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            categories.forEach(cat => {
                const tr = document.createElement("tr");
                const nameTd = document.createElement("td");
                nameTd.innerHTML = `<strong style="color:#222;">${cat.name}</strong>`;
                tr.appendChild(nameTd);

                currentRoom.players.forEach(p => {
                    const scoreTd = document.createElement("td");
                    scoreTd.className = "score-cell";

                    if (p.scores[cat.id] !== undefined) {
                        scoreTd.innerText = p.scores[cat.id];
                        scoreTd.classList.add("confirmed");
                    } else {
                        if (p.id === myId && isMyTurn && !isTurnJustStarted && !isClientRolling) {
                            const possible = calculatePossibleScore(cat.id, currentRoom.diceValues);
                            scoreTd.innerText = `${possible}`;
                            scoreTd.style.color = "#d39325"; // 예상 점수 색상 설정
                            scoreTd.onclick = () => {
                                handleCellClick(cat.id, cat.name, possible, scoreTd);
                            };
                        } else {
                            scoreTd.innerText = "-";
                            scoreTd.style.opacity = "0.4";
                        }
                    }
                    tr.appendChild(scoreTd);
                });

                tbody.appendChild(tr);
            });

            // 📝 보너스 인디케이터 수치 테이블 삽입
            const bonusTr = document.createElement("tr");
            bonusTr.innerHTML = "<td><strong style='color:#b71c1c;'>Bonus Subtotal</strong></td>";
            currentRoom.players.forEach(p => {
                let sum = 0;
                ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                    if (p.scores[c] !== undefined) sum += p.scores[c];
                });
                const achieved = sum >= 63;
                bonusTr.innerHTML += `<td style="color:${achieved ? '#2e7d32':'#777'}; font-weight:bold;">${sum}/63 ${achieved ? '(+35)' : ''}</td>`;
            });
            tbody.appendChild(bonusTr);
        }

        function calculatePossibleScore(category, vals) {
            const counts = {};
            vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sumAll = vals.reduce((a, b) => a + b, 0);

            switch (category) {
                case 'aces': return (counts[1] || 0) * 1;
                case 'duals': return (counts[2] || 0) * 2;
                case 'triples': return (counts[3] || 0) * 3;
                case 'quads': return (counts[4] || 0) * 4;
                case 'pentas': return (counts[5] || 0) * 5;
                case 'hexas': return (counts[6] || 0) * 6;
                case 'choice': return sumAll;
                case 'poker': {
                    for (let val in counts) {
                        if (counts[val] >= 4) return sumAll;
                    }
                    return 0;
                }
                case 'full_house': {
                    let hasThree = false;
                    let hasTwo = false;
                    for (let val in counts) {
                        if (counts[val] === 3) hasThree = true;
                        if (counts[val] === 2) hasTwo = true;
                        if (counts[val] === 5) { hasThree = true; hasTwo = true; }
                    }
                    return (hasThree && hasTwo) ? sumAll : 0;
                }
                case 's_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr.includes('1234') || uniqueStr.includes('2345') || uniqueStr.includes('3456')) return 15;
                    return 0;
                }
                case 'l_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr === '12345' || uniqueStr === '23456') return 30;
                    return 0;
                }
                case 'yacht': {
                    for (let val in counts) {
                        if (counts[val] === 5) return 50;
                    }
                    return 0;
                }
                default: return 0;
            }
        }
    </script>
