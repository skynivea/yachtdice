<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Deluxe</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark-gray: #1a1a1a;
            --bg-panel: #262626;
            --velvet-burgundy: #6b1416; /* 🍷 안쪽 작은 네모 (버건디 벨벳) */
            --outer-black: #0d0d0d;      /* 🔲 바깥쪽 큰 네모 (검은색) */
            --accent-gold: #e5a93b;
            --paper-white: #fafaf6;      /* 📝 종이 스코어보드 하얀색 */
            --paper-border: #d4d4cb;
        }
        body {
            background-color: var(--bg-dark-gray);
            color: #f5f5f5;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        
        /* 메인 홈 / 대기실 */
        #main-home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        .main-title {
            font-size: 42px;
            font-weight: 900;
            color: var(--accent-gold);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .menu-box {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #3d3d3d;
            padding: 30px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .flat-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .flat-input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5c060, #d39325);
            color: #0d0d0d;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-gold:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-outline:hover { color: #fff; border-color: #888; }

        /* 대기방(Lobby) 구조 */
        #waiting-lobby {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #444;
            padding: 30px;
            margin-top: 50px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lobby-title {
            font-size: 20px;
            color: var(--accent-gold);
            margin-bottom: 20px;
            font-weight: bold;
        }
        .user-list {
            background: #111;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            min-height: 120px;
        }
        .user-item {
            padding: 8px 12px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
        
        /* 실시간 게임 아레나 */
        #game-arena {
            display: flex;
            flex-direction: column;
            width: 96%;
            max-width: 1100px;
            margin: 20px auto;
        }
        .room-tag {
            text-align: center;
            font-size: 16px;
            background: var(--bg-panel);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #board-wrapper {
            display: flex;
            gap: 25px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* 2. 큰 네모 (검은색 테두리 영역) */
        #outer-board {
            flex: 1.3;
            background-color: var(--outer-black);
            border: 4px solid #222;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            position: relative;
        }

        /* 테두리(큰 네모 영역) 내에 들어간 5개의 주사위 홈 (검정색 디자인) */
        .dice-slots-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
            margin-bottom: 15px;
        }
        .dice-slot {
            flex: 1;
            aspect-ratio: 1/1;
            background: #000000; /* 검정색 홈 */
            border-radius: 10px;
            border: 1.5px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.9);
        }

        /* 안쪽 작은 네모 (버건디 벨벳 필드) */
        #inner-velvet-field {
            flex: 1;
            background-color: var(--velvet-burgundy);
            border-radius: 14px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #4a0d0f;
            padding: 20px;
        }

        /* 마우스 드래그 쉐이킹 전용 컵 */
        #dice-cup {
            width: 85px;
            height: 105px;
            background: linear-gradient(180deg, #422d1b, #201308);
            border-radius: 12px 12px 30px 30px;
            border: 2px solid var(--accent-gold);
            cursor: grab;
            position: absolute;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            user-select: none;
            touch-action: none;
        }
        #dice-cup:active {
            cursor: grabbing;
        }
        .cup-label {
            font-size: 11px;
            color: var(--accent-gold);
            font-weight: bold;
            pointer-events: none;
            text-transform: uppercase;
            text-align: center;
        }

        /* 주사위 배치 구획 */
        #active-dice-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* 주사위 디자인 */
        .dice {
            width: 54px;
            height: 54px;
            background: #ffffff;
            color: #000;
            border-radius: 10px;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
        }
        .dice.held {
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 12px var(--accent-gold);
        }

        /* 3. 하얀 종이 스코어보드 */
        #scoreboard-section {
            flex: 1.1;
            background: var(--paper-white);
            color: #2b2b2b;
            border: 1px solid var(--paper-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .paper-title {
            color: #1a1a1a;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            margin-top: 0;
            margin-bottom: 5px;
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        .paper-badge {
            background: #eaeae3;
            color: #4f4f48;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 auto 15px auto;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border-bottom: 1px solid var(--paper-border);
            padding: 10px 5px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background: #eaeae3;
            color: #333;
            font-weight: bold;
            font-size: 12px;
        }
        .score-cell {
            cursor: pointer;
            background: rgba(0,0,0,0.01);
            transition: background 0.2s;
            font-weight: bold;
            color: #777;
        }
        .score-cell:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .score-cell.confirmed {
            color: #2e7d32;
            font-size: 15px;
            cursor: default;
        }
        .score-cell.active-confirm {
            background: #ffe082 !important;
            color: #b7791f !important;
            animation: pulse-border 1s infinite alternate;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .roll-counter-display {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #ccc;
            margin-top: 10px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header style="background:#111; width:100%; padding:15px; text-align:center; font-size:24px; font-weight:900; color:var(--accent-gold); border-bottom:1px solid #333;">
        🎲 YACHT DICE DELUXE
    </header>

    <!-- 1. 메인 홈 화면 -->
    <div id="main-home">
        <h1 class="main-title">Yacht Dice</h1>
        
        <div id="home-menu" class="menu-box">
            <button class="btn-gold" onclick="showInputForm('create')">➕ 방 만들기</button>
            <button class="btn-outline" onclick="showInputForm('join')">🔑 방 들어가기</button>
        </div>

        <div id="create-form" class="menu-box hidden">
            <h3 style="margin-top:0;">방 만들기</h3>
            <input type="text" id="nickname-create" class="flat-input" placeholder="사용할 닉네임 (최대 8자)" maxlength="8">
            <button class="btn-gold" onclick="createRoom()">방 생성하기</button>
            <button class="btn-outline" onclick="goBackToMenu()">뒤로가기</button>
        </div>

        <div id="join-form" class="menu-box hidden">
            <h3 style="margin-top:0;">방 들어가기</h3>
            <input type="text" id="nickname-join" class="flat-input" placeholder="사용할 닉네임 (최대 8자)" maxlength="8" style="margin-bottom:10px;">
            <input type="text" id="room-code-input" class="flat-input" placeholder="방 코드 (4자리)" maxlength="4" style="text-transform:uppercase;">
            <button class="btn-gold" onclick="joinRoom()">방 입장하기</button>
            <button class="btn-outline" onclick="goBackToMenu()">뒤로가기</button>
        </div>
    </div>

    <!-- 2. 대기방 화면 (다 들어오면 방장이 시작) -->
    <div id="waiting-lobby" class="hidden">
        <div class="lobby-title">🚪 대기실 입장 완료</div>
        <div style="font-size: 28px; font-weight: bold; letter-spacing: 2px; color: var(--accent-gold); margin: 15px 0;" id="lobby-code-display">-</div>
        <p style="font-size:12px; color:#aaa; margin-top:0;">이 코드를 복사해서 다른 사람에게 전달하세요.</p>
        
        <div class="user-list" id="lobby-users"></div>

        <div style="display:flex; flex-direction:column; gap:10px;">
            <button id="start-btn" class="btn-gold hidden" onclick="startGame()">▶️ 게임 시작 (방장전용)</button>
            <div id="owner-waiting-msg" style="font-size:14px; color:#888;">방장이 게임을 시작할 때까지 대기하고 있습니다...</div>
        </div>
    </div>

    <!-- 3. 실제 요트 다이스 인게임 아레나 -->
    <div id="game-arena" class="hidden">
        <div class="room-tag">
            <span>Room Code: <strong id="room-code-display" style="color:var(--accent-gold);">-</strong></span>
            <span style="font-size: 13px; color:#aaa;" id="turn-indicator">대기 중...</span>
        </div>

        <div id="board-wrapper">
            <!-- 큰 네모 (검은색 테두리 판) -->
            <div id="outer-board">
                <!-- 큰 네모 내부 테두리 영역에 장착된 검정색 주사위 홀드 홈 5개 -->
                <div class="dice-slots-container" id="hold-home">
                    <div class="dice-slot" data-index="0"></div>
                    <div class="dice-slot" data-index="1"></div>
                    <div class="dice-slot" data-index="2"></div>
                    <div class="dice-slot" data-index="3"></div>
                    <div class="dice-slot" data-index="4"></div>
                </div>

                <!-- 작은 네모 (버건디 벨벳 굴림 필드) -->
                <div id="inner-velvet-field">
                    <!-- 드래그 컵 (턴 소유자에게만 등장) -->
                    <div id="dice-cup" class="hidden">
                        <div class="cup-label">드래그해서<br>섞어 던지기</div>
                    </div>
                    
                    <!-- 주사위 필드 내부 배치 -->
                    <div id="active-dice-area"></div>
                </div>

                <!-- 하단 정보 영역 -->
                <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <div class="roll-counter-display" id="roll-count-text">남은 횟수: 3/3</div>
                    <button id="restart-btn" class="btn-outline hidden" style="width:auto; padding:8px 16px; margin:0;" onclick="requestRestart()">🔄 다시 시작</button>
                </div>
            </div>

            <!-- 📝 리얼 하얀 종이 스코어보드 (우측 패널) -->
            <div id="scoreboard-section">
                <h3 class="paper-title">요트 스코어판</h3>
                <div style="text-align:center;">
                    <span class="paper-badge">63점 달성 시 보너스 +35점 🎁</span>
                </div>
                
                <table id="score-table">
                    <thead>
                        <tr id="table-header"><th>족보 카테고리</th></tr>
                    </thead>
                    <tbody id="score-table-body">
                        <!-- 점수판 세팅 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let myId = null;
        let isClientRolling = false;
        let activeConfirmCategory = null;

        // 3. 한글 카테고리 명칭으로 전면 개편 (이모티콘 제거)
        const categories = [
            { id: 'aces', name: '에이스' },
            { id: 'duals', name: '듀스' },
            { id: 'triples', name: '트리플' },
            { id: 'quads', name: '쿼드' },
            { id: 'pentas', name: '펜타' },
            { id: 'hexas', name: '헥사' },
            { id: 'choice', name: '초이스' },
            { id: 'poker', name: '포커' },
            { id: 'full_house', name: '풀하우스' },
            { id: 's_straight', name: '스몰 스트레이트' },
            { id: 'l_straight', name: '라지 스트레이트' },
            { id: 'yacht', name: '요트' }
        ];

        // 컵 드래그 물리 모션 전용 변수
        let isDraggingCup = false;
        let startX, startY;
        let cupX = 0, cupY = 0;
        let shakePoints = [];

        function showInputForm(type) {
            document.getElementById("home-menu").classList.add("hidden");
            if (type === 'create') {
                document.getElementById("create-form").classList.remove("hidden");
            } else {
                document.getElementById("join-form").classList.remove("hidden");
            }
        }

        function goBackToMenu() {
            document.getElementById("create-form").classList.add("hidden");
            document.getElementById("join-form").classList.add("hidden");
            document.getElementById("home-menu").classList.remove("hidden");
        }

        function createRoom() {
            const nickname = document.getElementById("nickname-create").value.trim() || `Host_${Math.floor(Math.random()*1000)}`;
            socket.emit('createRoom', { nickname });
        }

        function joinRoom() {
            const nickname = document.getElementById("nickname-join").value.trim() || `Guest_${Math.floor(Math.random()*1000)}`;
            const roomCode = document.getElementById("room-code-input").value.trim().toUpperCase();
            if (!roomCode) return alert("방 코드를 입력하세요.");
            socket.emit('joinRoom', { roomCode, nickname });
        }

        function startGame() {
            socket.emit('startGame', { roomCode: currentRoom.code });
        }

        function requestRestart() {
            socket.emit('restartGame', { roomCode: currentRoom.code });
        }

        // 3. 인라인 터치 변경 ("한 번 더 클릭" 한글화)
        function handleCellClick(category, name, possibleScore, cellElement) {
            document.querySelectorAll(".score-cell").forEach(el => el.classList.remove("active-confirm"));

            if (activeConfirmCategory === category) {
                socket.emit('writeScore', {
                    roomCode: currentRoom.code,
                    category: category
                });
                activeConfirmCategory = null;
            } else {
                activeConfirmCategory = category;
                cellElement.classList.add("active-confirm");
                cellElement.innerText = `${possibleScore} (한 번 더 클릭)`;
            }
        }

        socket.on('roomCreated', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        socket.on('roomJoined', ({ roomCode }) => {
            myId = socket.id;
            transitionToLobby(roomCode);
        });

        function transitionToLobby(roomCode) {
            document.getElementById("main-home").classList.add("hidden");
            document.getElementById("waiting-lobby").classList.remove("hidden");
            document.getElementById("lobby-code-display").innerText = roomCode;
        }

        socket.on('gameStateUpdate', (room) => {
            currentRoom = room;
            if (room.stage === 'lobby') {
                updateLobbyUsers(room);
                return;
            }
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        function updateLobbyUsers(room) {
            const container = document.getElementById("lobby-users");
            container.innerHTML = "";
            room.players.forEach((p, idx) => {
                const item = document.createElement("div");
                item.className = "user-item";
                item.innerHTML = `<span>${idx === 0 ? '👑 ' : '👤 '}${p.name} ${p.id === myId ? '(나)' : ''}</span><span style="color:#888;">Ready</span>`;
                container.appendChild(item);
            });

            const isOwner = room.players[0].id === myId;
            if (isOwner) {
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("owner-waiting-msg").classList.add("hidden");
            } else {
                document.getElementById("start-btn").classList.add("hidden");
                document.getElementById("owner-waiting-msg").classList.remove("hidden");
            }
        }

        socket.on('gameStarted', (room) => {
            document.getElementById("waiting-lobby").classList.add("hidden");
            document.getElementById("game-arena").classList.remove("hidden");
            updateRoomState(room);
        });

        // 1. 드래그 물리 모션 주사위 트리거 적용 및 리롤 정상 차감 반영
        socket.on('diceRolled', ({ diceValues, remainingRolls, isHeld }) => {
            currentRoom.diceValues = diceValues;
            currentRoom.remainingRolls = remainingRolls;
            currentRoom.isHeld = isHeld;

            const field = document.getElementById("active-dice-area");
            field.style.opacity = "0.3";

            // 주사위 떨어질 때 사운드 대용 애니메이션 후 배치 완료
            setTimeout(() => {
                field.style.opacity = "1";
                isClientRolling = false;
                renderDice();
                renderScoreBoard();
                updateCupState();
            }, 700);
        });

        socket.on('scoreRegistered', ({ playerId, category, score }) => {
            if (category === 'yacht' && score === 50) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }
        });

        socket.on('gameFinished', (room) => {
            updateRoomState(room);
            alert("경기가 종료되었습니다! 결과를 확인해 보세요.");
            if (room.players[0].id === myId) {
                document.getElementById("restart-btn").classList.remove("hidden");
            }
        });

        function updateRoomState(room) {
            currentRoom = room;
            document.getElementById("room-code-display").innerText = room.code;

            const activePlayer = room.players[room.currentTurnIndex];
            const isMyTurn = activePlayer.id === myId;

            const turnIndicator = document.getElementById("turn-indicator");
            if (isMyTurn) {
                turnIndicator.innerHTML = `<span style="color:var(--accent-gold); font-weight:bold;">🟢 당신의 차례입니다! 컵을 흔들어 던지세요!</span>`;
            } else {
                turnIndicator.innerText = `🔴 ${activePlayer.name}의 차례`;
            }

            document.getElementById("roll-count-text").innerText = `남은 횟수: ${room.remainingRolls}/3`;

            renderDice();
            renderScoreBoard();
            updateCupState();
        }

        // 4. 주사위 컵 쉐이킹 인터페이스 동작 구현
        const cup = document.getElementById("dice-cup");

        function updateCupState() {
            if (!currentRoom) return;
            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            
            // 던질 기회가 있고 내 차례인 경우에만 컵 노출
            if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling) {
                cup.classList.remove("hidden");
                resetCupPosition();
            } else {
                cup.classList.add("hidden");
            }
        }

        function resetCupPosition() {
            cupX = 0;
            cupY = 0;
            cup.style.transform = `translate(0px, 0px)`;
            shakePoints = [];
        }

        // 마우스 및 터치 드래그 이벤트 리스너 등록
        cup.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', endDrag);

        cup.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });
        window.addEventListener('touchmove', (e) => dragMove(e.touches[0]), { passive: false });
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (isClientRolling) return;
            isDraggingCup = true;
            startX = e.clientX;
            startY = e.clientY;
            shakePoints = [];
        }

        function dragMove(e) {
            if (!isDraggingCup) return;
            
            // 화면 드래그 스크롤 방지
            if (e.preventDefault) e.preventDefault();

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            // 안쪽 버건디 필드 내부에서 일정 한도로만 드래그 가능하게 제한
            cupX = Math.max(-120, Math.min(120, dx));
            cupY = Math.max(-120, Math.min(120, dy));

            cup.style.transform = `translate(${cupX}px, ${cupY}px) rotate(${cupX * 0.1}deg)`;
            
            // 드래그 속도와 회전 변화 측정을 위해 좌표 수집
            shakePoints.push({ x: cupX, y: cupY, time: Date.now() });
        }

        function endDrag() {
            if (!isDraggingCup) return;
            isDraggingCup = false;

            // 드래그 속도 판별 (충분히 빠르게 통을 섞었는지 체크)
            let isShakenAction = false;
            if (shakePoints.length > 3) {
                const first = shakePoints[0];
                const last = shakePoints[shakePoints.length - 1];
                const dist = Math.hypot(last.x - first.x, last.y - first.y);
                const duration = last.time - first.time;
                const speed = dist / (duration || 1); // 픽셀/ms

                // 마우스를 빠르게 이동했거나 큰 폭으로 움직였다면 던지기 실행
                if (speed > 0.4 || dist > 60) {
                    isShakenAction = true;
                }
            }

            if (isShakenAction) {
                // 주사위 던지기 실행 및 리롤 횟수 차감 호출
                isClientRolling = true;
                cup.classList.add("hidden");
                
                socket.emit('rollDice', {
                    roomCode: currentRoom.code,
                    clientHeld: currentRoom.isHeld
                });
            } else {
                // 살살 드래그하면 원위치
                resetCupPosition();
            }
        }

        // 2. 바깥쪽 검은 홈(Slots)과 안쪽 버건디 필드(Active Area) 분리 렌더링
        function renderDice() {
            const activeArea = document.getElementById("active-dice-area");
            const slots = document.querySelectorAll(".dice-slot");
            
            activeArea.innerHTML = "";
            slots.forEach(slot => slot.innerHTML = "");

            if (!currentRoom) return;

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            if (isTurnJustStarted) {
                if (isMyTurn) {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.3); font-size:13px; pointer-events:none;">가죽 컵을 위아래로 마구 흔드세요!</span>`;
                } else {
                    activeArea.innerHTML = `<span style="color:rgba(255,255,255,0.3); font-size:13px;">상대방이 흔드는 중입니다...</span>`;
                }
                return;
            }

            let holdSlotIndex = 0;
            for (let i = 0; i < 5; i++) {
                const diceDiv = document.createElement("div");
                diceDiv.className = `dice ${currentRoom.isHeld[i] ? 'held' : ''}`;
                diceDiv.innerText = getDiceEmoji(currentRoom.diceValues[i]);

                // 턴 전용 클릭 시 홀딩 액션
                if (isMyTurn && currentRoom.remainingRolls > 0 && !isClientRolling) {
                    diceDiv.onclick = () => {
                        currentRoom.isHeld[i] = !currentRoom.isHeld[i];
                        renderDice();
                    };
                }

                if (currentRoom.isHeld[i]) {
                    // 큰 검정 테두리 속 5개 검정색 홀딩 홈에 순서대로 격납
                    if (slots[holdSlotIndex]) {
                        slots[holdSlotIndex].appendChild(diceDiv);
                        holdSlotIndex++;
                    }
                } else {
                    // 컵을 거쳐 굴러떨어진 주사위는 버건디 벨벳 필드 안에 노출
                    activeArea.appendChild(diceDiv);
                }
            }
        }

        function getDiceEmoji(num) {
            const emojis = ["", "1", "2", "3", "4", "5", "6"];
            return emojis[num] || num;
        }

        function renderScoreBoard() {
            if (!currentRoom) return;

            const headerRow = document.getElementById("table-header");
            headerRow.innerHTML = "<th>족보 카테고리</th>";

            currentRoom.players.forEach(p => {
                const th = document.createElement("th");
                th.innerText = p.name;
                headerRow.appendChild(th);
            });

            const tbody = document.getElementById("score-table-body");
            tbody.innerHTML = "";

            const isMyTurn = currentRoom.players[currentRoom.currentTurnIndex].id === myId;
            const isTurnJustStarted = currentRoom.diceValues.every(v => v === 0);

            categories.forEach(cat => {
                const tr = document.createElement("tr");
                const nameTd = document.createElement("td");
                nameTd.innerHTML = `<strong style="color:#222;">${cat.name}</strong>`;
                tr.appendChild(nameTd);

                currentRoom.players.forEach(p => {
                    const scoreTd = document.createElement("td");
                    scoreTd.className = "score-cell";

                    if (p.scores[cat.id] !== undefined) {
                        scoreTd.innerText = p.scores[cat.id];
                        scoreTd.classList.add("confirmed");
                    } else {
                        if (p.id === myId && isMyTurn && !isTurnJustStarted && !isClientRolling) {
                            const possible = calculatePossibleScore(cat.id, currentRoom.diceValues);
                            scoreTd.innerText = `${possible}`;
                            scoreTd.style.color = "#d39325";
                            scoreTd.onclick = () => {
                                handleCellClick(cat.id, cat.name, possible, scoreTd);
                            };
                        } else {
                            scoreTd.innerText = "-";
                            scoreTd.style.opacity = "0.4";
                        }
                    }
                    tr.appendChild(scoreTd);
                });

                tbody.appendChild(tr);
            });

            const bonusTr = document.createElement("tr");
            bonusTr.innerHTML = "<td><strong style='color:#b71c1c;'>상단 보너스 합계</strong></td>";
            currentRoom.players.forEach(p => {
                let sum = 0;
                ['aces','duals','triples','quads','pentas','hexas'].forEach(c => {
                    if (p.scores[c] !== undefined) sum += p.scores[c];
                });
                const achieved = sum >= 63;
                bonusTr.innerHTML += `<td style="color:${achieved ? '#2e7d32':'#777'}; font-weight:bold;">${sum}/63 ${achieved ? '(+35)' : ''}</td>`;
            });
            tbody.appendChild(bonusTr);
        }

        function calculatePossibleScore(category, vals) {
            const counts = {};
            vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const sumAll = vals.reduce((a, b) => a + b, 0);

            switch (category) {
                case 'aces': return (counts[1] || 0) * 1;
                case 'duals': return (counts[2] || 0) * 2;
                case 'triples': return (counts[3] || 0) * 3;
                case 'quads': return (counts[4] || 0) * 4;
                case 'pentas': return (counts[5] || 0) * 5;
                case 'hexas': return (counts[6] || 0) * 6;
                case 'choice': return sumAll;
                case 'poker': {
                    for (let val in counts) {
                        if (counts[val] >= 4) return sumAll;
                    }
                    return 0;
                }
                case 'full_house': {
                    let hasThree = false;
                    let hasTwo = false;
                    for (let val in counts) {
                        if (counts[val] === 3) hasThree = true;
                        if (counts[val] === 2) hasTwo = true;
                        if (counts[val] === 5) { hasThree = true; hasTwo = true; }
                    }
                    return (hasThree && hasTwo) ? sumAll : 0;
                }
                case 's_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr.includes('1234') || uniqueStr.includes('2345') || uniqueStr.includes('3456')) return 15;
                    return 0;
                }
                case 'l_straight': {
                    const uniqueStr = Array.from(new Set(vals)).sort().join('');
                    if (uniqueStr === '12345' || uniqueStr === '23456') return 30;
                    return 0;
                }
                case 'yacht': {
                    for (let val in counts) {
                        if (counts[val] === 5) return 50;
                    }
                    return 0;
                }
                default: return 0;
            }
        }
    </script>
