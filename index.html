<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요트 다이스</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
 <style>
        :root {
            /* 🖤 촌스러운 가죽/나무 톤을 모던한 다크블랙 & 다크그레이 톤으로 교체 */
            --bg-wood: #111115;          /* 외부 배경: 묵직한 카본 블랙 */
            --tray-border: #1a1a1e;      /* 트레이 테두리: 다크 그레이 */
            --tray-velvet: #1e1e24;      /* 벨벳 트레이: 무광 블랙 스킨 */
            --holder-bg: #0b0b0d;        /* 키퍼 슬롯: 완전 블랙 */
            --dice-white: #ffffff;
            --dice-dot: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
        body { background-color: #0c0c0e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        #app { display: flex; width: 1200px; height: 800px; background: var(--bg-wood); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 10px solid #23232a; position: relative; }

        /* 대기실 / 로그인 화면 */
        #lobby { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .lobby-box { background: #222; padding: 40px; border-radius: 15px; border: 3px solid #ffaa00; text-align: center; width: 400px; }
        .lobby-box h2 { color: #ffaa00; margin-bottom: 20px; font-size: 28px; }
        .lobby-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; text-align: center; }
        .lobby-box button { width: 100%; padding: 12px; background: #ffaa00; color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .lobby-box button:hover { background: #ffcc66; }

        /* 대기방 카드 뒤집기 순서 매칭 */
        #card-room { display: none; position: absolute; width: 100%; height: 100%; background: rgba(18,18,18,0.95); z-index: 90; flex-direction: column; justify-content: center; align-items: center; }
        #card-room h3 { color: #fff; margin-bottom: 30px; font-size: 24px; }
        .card-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .draw-card { width: 100px; height: 150px; background: #333; border: 3px solid #ffaa00; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; color: transparent; transition: transform 0.6s, background 0.3s; transform-style: preserve-3d; }
        .draw-card.flipped { background: #fff; color: #000; transform: rotateY(180deg); border-color: #ffaa00; }

        /* 인게임 메인 화면 레이아웃 */
        #game-layout { display: none; width: 100%; height: 100%; }

        /* 좌측: 플레이 영역 (프로필 + 주사위 트레이) */
        .play-area { width: 60%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; position: relative; }
        
        /* 상단 프로필 바 */
        .profile-bar { height: 90px; display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; }
        .profile-card { flex: 1; height: 100%; background: #222; border-radius: 8px; border: 2px solid #555; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; transition: 0.3s; }
        .profile-card.active { border-color: #ffaa00; box-shadow: 0 0 15px #ffaa00; background: #3c2f10; }
        .profile-card.disconnected { opacity: 0.5; background: #555 !important; }
        .profile-name { font-size: 14px; font-weight: bold; }
        .profile-status { font-size: 11px; color: #aaa; margin-top: 2px; }
        .profile-badge { position: absolute; top: -5px; right: -5px; background: #ffaa00; color: #000; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 5px; }

        /* 🎲 중앙: 주사위 하드웨어 트레이 세트 */
        .tray-system-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; gap: 30px; }
        
        .tray-board { width: 420px; height: 500px; background: var(--tray-border); border-radius: 30px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 10px 20px rgba(0,0,0,0.5); border: 2px solid #2e2e38; }
        
        /* 1. 홀드 홈 (Keeper Slots) */
        .hold-home { height: 75px; background: #000; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.8); }
        .hold-slot { width: 55px; height: 55px; background: var(--holder-bg); border-radius: 8px; border: 2px dashed #444; display: flex; justify-content: center; align-items: center; transition: 0.2s; cursor: pointer; }
        .hold-slot.active { border-color: #ff5500; background: #1f1212; }

        /* 2. 벨벳 다이스 트레이 */
        .dice-tray { flex-grow: 1; background: var(--tray-velvet); border-radius: 20px; position: relative; box-shadow: inset 0 10px 30px rgba(0,0,0,0.95); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* 주사위 디자인 */
        .dice { width: 52px; height: 52px; background: var(--dice-white); border-radius: 10px; box-shadow: 0 5px 10px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.3); position: absolute; cursor: pointer; display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); padding: 5px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.4s, top 0.4s, opacity 0.3s; }
        .dice.held { position: static !important; width: 48px; height: 48px; box-shadow: none; border: 2px solid #ff5500; }
        
        /* 💡 컵에 숨겨졌을 때 상태 (완전 비활성화 및 안 보이게 숨김 처리) */
        .dice.in-cup { opacity: 0; transform: scale(0.1) rotate(180deg) !important; pointer-events: none; } 
        
        .dice-dot { background: var(--dice-dot); border-radius: 50%; width: 8px; height: 8px; margin: auto; opacity: 0; }
        /* 주사위 눈금 배치 */
        .dice[data-val="1"] .dot-5 { opacity: 1; background: red; width: 12px; height: 12px; }
        .dice[data-val="2"] .dot-1, .dice[data-val="2"] .dot-9 { opacity: 1; }
        .dice[data-val="3"] .dot-1, .dice[data-val="3"] .dot-5, .dice[data-val="3"] .dot-9 { opacity: 1; }
        .dice[data-val="4"] .dot-1, .dice[data-val="4"] .dot-3, .dice[data-val="4"] .dot-7, .dice[data-val="4"] .dot-9 { opacity: 1; }
        .dice[data-val="5"] .dot-1, .dice[data-val="5"] .dot-3, .dice[data-val="5"] .dot-5, .dice[data-val="5"] .dot-7, .dice[data-val="5"] .dot-9 { opacity: 1; }
        .dice[data-val="6"] .dot-1, .dice[data-val="6"] .dot-3, .dice[data-val="6"] .dot-4, .dice[data-val="6"] .dot-6, .dice[data-val="6"] .dot-7, .dice[data-val="6"] .dot-9 { opacity: 1; }

        /* 3. 우측 흔들기 컵 가죽 영역 */
        .cup-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* 🖤 못생긴 가죽 이미지 링크 제거 및 고급 매트 블랙 그라데이션으로 변경 */
        .dice-cup { width: 140px; height: 180px; background: linear-gradient(135deg, #2e2e38 0%, #111115 100%); border-radius: 70px 70px 15px 15px; border: 4px solid #3f3f4e; box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 5px 15px rgba(255,255,255,0.05); cursor: grab; transition: transform 0.1s; transform-origin: bottom center; display: flex; align-items: center; justify-content: center; position: relative; }
        .dice-cup:active { cursor: grabbing; }
        .cup-shadow { width: 140px; height: 20px; background: rgba(0,0,0,0.6); border-radius: 50%; filter: blur(6px); }
        .shake-count-badge { background: #ff5500; color: #fff; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .cup-btn { padding: 10px 20px; background: #222; border: 2px solid #ffaa00; border-radius: 8px; color: #ffaa00; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cup-btn:hover { background: #ffaa00; color: #000; }

        /* 우측: 스코어보드 */
        .score-area { width: 40%; height: 100%; background: #f0f0f0; border-left: 5px solid #23232a; padding: 20px; color: #333; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 3px solid #333; padding-bottom: 10px; }
        .score-header h2 { font-size: 24px; color: #000; font-weight: 900; }
        
        .table-container { flex-grow: 1; overflow-y: auto; background: #fff; border: 2px solid #ccc; border-radius: 8px; padding: 5px; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        th { background: #333; color: #fff; padding: 8px; font-weight: bold; }
        td { border: 1px solid #ddd; padding: 7px 5px; font-weight: 500; }
        
        .category-name { font-weight: 900; text-align: left; padding-left: 10px; background: #eaeaea; width: 35%; }
        .score-cell { cursor: pointer; font-weight: bold; font-size: 15px; position: relative; }
        .score-cell.empty:hover { background: #fff2cc; }
        .score-cell.empty:hover::after { content: attr(data-preview); position: absolute; left: 0; right: 0; margin: auto; color: #999; font-weight: normal; opacity: 0.7; }
        .score-cell.filled { background: #e2f0d9; color: #385723; cursor: not-allowed; }
        
        .bonus-row { background: #dfebf7 !important; font-weight: bold; }
        .total-row { background: #333 !important; color: #fff !important; font-size: 16px; font-weight: bold; }

        /* 확인 모달 */
        .confirm-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; border-radius: 10px; }
        .modal-box { background: #fff; color: #000; padding: 30px; border-radius: 12px; text-align: center; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-box p { font-size: 18px; margin-bottom: 20px; font-weight: bold; line-height: 1.5; }
        .modal-btns { display: flex; gap: 15px; justify-content: center; }
        .modal-btn { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-yes { background: #4caf50; color: #fff; }
        .btn-no { background: #f44336; color: #fff; }

        #btn-view-all { background: #333; color: #fff; border: 1px solid #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #btn-view-all:hover { background: #ffaa00; color: #000; }

        /* 결과 화면 */
        #game-over-screen { display: none; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; color: #fff; padding: 50px; }
        .result-board { background: #222; border: 3px solid #ffaa00; border-radius: 15px; padding: 30px; width: 800px; text-align: center; }
        .result-board h2 { font-size: 36px; color: #ffaa00; margin-bottom: 20px; }
        .ranking-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .ranking-item { display: flex; justify-content: space-between; background: #333; padding: 15px 25px; border-radius: 8px; font-size: 20px; font-weight: bold; }
        .ranking-item.first { background: #614e1a; border: 2px solid #ffaa00; }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 대기 및 닉네임 입력 로비 -->
    <div id="lobby">
        <div class="lobby-box">
            <h2>요트 다이스 대기실</h2>
            <input type="text" id="input-nickname" placeholder="닉네임 입력" maxlength="8">
            <input type="text" id="input-roomcode" placeholder="방 코드 입력 (선택)">
            <button id="btn-create" onclick="createRoom()">새 방 만들기</button>
            <button id="btn-join" onclick="joinRoom()">방 참가하기</button>
        </div>
    </div>

    <!-- 2. 순서 카드 드로우 룸 -->
    <div id="card-room">
        <h3>🃏 게임 순서를 정할 카드를 한 장씩 공정하게 골라주세요!</h3>
        <div class="card-container" id="card-wrap"></div>
        <div id="draw-info" style="color: #ff5500; font-weight: bold;"></div>
    </div>

    <!-- 3. 인게임 화면 -->
    <div id="game-layout">
        <div class="play-area">
            <div class="profile-bar" id="profile-wrap"></div>

            <div class="tray-system-container">
                <div class="tray-board">
                    <!-- 홀드 홈 -->
                    <div class="hold-home">
                        <div class="hold-slot" data-idx="0" onclick="toggleDice(0)"></div>
                        <div class="hold-slot" data-idx="1" onclick="toggleDice(1)"></div>
                        <div class="hold-slot" data-idx="2" onclick="toggleDice(2)"></div>
                        <div class="hold-slot" data-idx="3" onclick="toggleDice(3)"></div>
                        <div class="hold-slot" data-idx="4" onclick="toggleDice(4)"></div>
                    </div>

                    <!-- 벨벳 다이스 트레이 -->
                    <div class="dice-tray" id="velvet-tray">
                        <div class="dice" id="dice-0" data-val="1" onclick="toggleDice(0)">
                            <div class="dice-dot dot-1"></div><div class="dice-dot dot-2"></div><div class="dice-dot dot-3"></div>
                            <div class="dice-dot dot-4"></div><div class="dice-dot dot-5"></div><div class="dice-dot dot-6"></div>
                            <div class="dice-dot dot-7"></div><div class="dice-dot dot-8"></div><div class="dice-dot dot-9"></div>
                        </div>
                        <div class="dice" id="dice-1" data-val="1" onclick="toggleDice(1)">
                            <div class="dice-dot dot-1"></div><div class="dice-dot dot-2"></div><div class="dice-dot dot-3"></div>
                            <div class="dice-dot dot-4"></div><div class="dice-dot dot-5"></div><div class="dice-dot dot-6"></div>
                            <div class="dice-dot dot-7"></div><div class="dice-dot dot-8"></div><div class="dice-dot dot-9"></div>
                        </div>
                        <div class="dice" id="dice-2" data-val="1" onclick="toggleDice(2)">
                            <div class="dice-dot dot-1"></div><div class="dice-dot dot-2"></div><div class="dice-dot dot-3"></div>
                            <div class="dice-dot dot-4"></div><div class="dice-dot dot-5"></div><div class="dice-dot dot-6"></div>
                            <div class="dice-dot dot-7"></div><div class="dice-dot dot-8"></div><div class="dice-dot dot-9"></div>
                        </div>
                        <div class="dice" id="dice-3" data-val="1" onclick="toggleDice(3)">
                            <div class="dice-dot dot-1"></div><div class="dice-dot dot-2"></div><div class="dice-dot dot-3"></div>
                            <div class="dice-dot dot-4"></div><div class="dice-dot dot-5"></div><div class="dice-dot dot-6"></div>
                            <div class="dice-dot dot-7"></div><div class="dice-dot dot-8"></div><div class="dice-dot dot-9"></div>
                        </div>
                        <div class="dice" id="dice-4" data-val="1" onclick="toggleDice(4)">
                            <div class="dice-dot dot-1"></div><div class="dice-dot dot-2"></div><div class="dice-dot dot-3"></div>
                            <div class="dice-dot dot-4"></div><div class="dice-dot dot-5"></div><div class="dice-dot dot-6"></div>
                            <div class="dice-dot dot-7"></div><div class="dice-dot dot-8"></div><div class="dice-dot dot-9"></div>
                        </div>
                    </div>
                </div>

                <!-- 조작 영역 -->
                <div class="cup-panel">
                    <div class="shake-count-badge">남은 리롤: <span id="roll-count-val">3</span>번</div>
                    <div class="dice-cup" id="main-leather-cup" onmousedown="startShakeDrag(event)" ontouchstart="startShakeDrag(event)"></div>
                    <div class="cup-shadow"></div>
                    <button class="cup-btn" onclick="triggerAutoRoll()">🎰 자동 흔들기</button>
                    <button class="cup-btn" style="border-color: #ff5500; color: #ff5500;" onclick="putDiceInCup()">📥 컵에 전부 넣기</button>
                </div>
            </div>
        </div>

        <!-- 우측 스코어보드 -->
        <div class="score-area">
            <div class="score-header">
                <h2>📊 SCOREBOARD</h2>
                <button id="btn-view-all">점수판 보기</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>족보 항목</th>
                            <th>내 점수</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboard-rows"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div class="confirm-modal" id="score-confirm-modal">
        <div class="modal-box">
            <p id="modal-desc">점수는 n점입니다.<br>기입하겠습니까?</p>
            <div class="modal-btns">
                <button class="modal-btn btn-yes" onclick="confirmRecordScore()">네, 결정합니다</button>
                <button class="modal-btn btn-no" onclick="closeConfirmModal()">아니오</button>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="game-over-screen">
        <div class="result-board">
            <h2>🏆 GAME OVER</h2>
            <p style="margin-bottom: 20px; font-size: 18px; color: #aaa;">모든 플레이어가 점수판 기입을 끝마쳤습니다!</p>
            <div class="ranking-list" id="final-ranking-wrap"></div>
            <button class="cup-btn" style="margin-top: 35px; padding: 15px 40px;" onclick="location.reload()">새 게임 하기</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let myRoomCode = "";
    let myNickname = "";
    let amIHost = false;
    let isMyTurn = false;
    let localRollsLeft = 3;
    let currentDice = [1,1,1,1,1];
    let currentKeep = [false, false, false, false, false];
    let selectedCategoryToRecord = "";

    let isDraggingCup = false;
    let lastX = 0, lastY = 0;
    let totalShakeDistance = 0;
    let shakeThreshold = 2500;

    const categoryLabels = {
        ace: "⚀ 에이스", dual: "⚁ 듀얼", triple: "⚂ 트리플", quad: "⚃ 쿼드", penta: "⚄ 펜타", hexa: "⚅ 헥사",
        choice: "📋 초이스", poker: "💥 포커", fullhouse: "🏠 풀 하우스", s_straight: "🏃‍♂️ 스몰 스트레이트", l_straight: "🏃‍♀️ 라지 스트레이트", yacht: "👑 요트"
    };

    function createRoom() {
        const nickname = document.getElementById("input-nickname").value.trim();
        if(!nickname) return alert("닉네임을 적어주세요!");
        myNickname = nickname;
        socket.emit("create_room", nickname);
    }

    function joinRoom() {
        const nickname = document.getElementById("input-nickname").value.trim();
        const code = document.getElementById("input-roomcode").value.trim().toUpperCase();
        if(!nickname || !code) return alert("닉네임과 방 코드를 채워주세요!");
        myNickname = nickname;
        socket.emit("join_room", { code: code, nickname: nickname });
    }

    socket.on("room_created", (code) => {
        myRoomCode = code;
        amIHost = true;
        document.getElementById("lobby").innerHTML = `
            <div class="lobby-box">
                <h2>방 개설 완료!</h2>
                <p style="color: #ffaa00; font-size: 24px; font-weight: bold; margin: 15px 0;">CODE: ${code}</p>
                <p style="color: #aaa; margin-bottom: 20px;">대기중인 플레이어 리스트</p>
                <div id="waiting-p-list" style="margin-bottom: 25px; text-align: left; font-size: 16px;"></div>
                <button onclick="requestOrderSetup()">👉 순서 결정 카드 열기</button>
            </div>
        `;
    });

    socket.on("room_joined", (code) => {
        myRoomCode = code;
        document.getElementById("lobby").innerHTML = `
            <div class="lobby-box">
                <h2>방 가입 성공!</h2>
                <p style="color: #ffaa00; font-size: 24px; font-weight: bold; margin: 15px 0;">CODE: ${code}</p>
                <p style="color: #aaa;">방장이 순서 정하기 게임을 열 때까지 잠시 대기하세요...</p>
                <div id="waiting-p-list" style="margin-top: 15px; text-align: left;"></div>
            </div>
        `;
    });

    socket.on("update_players", (players) => {
        const wrap = document.getElementById("waiting-p-list");
        if(wrap) {
            wrap.innerHTML = players.map(p => `• <b>${p.name}</b> ${p.isHost ? '(방장)':''}`).join("<br>");
        }
    });

    socket.on("error_msg", (msg) => alert(msg));

    function requestOrderSetup() {
        socket.emit("start_order_draw", myRoomCode);
    }

    socket.on("order_draw_ready", ({ totalCards }) => {
        document.getElementById("lobby").style.display = "none";
        const cardRoom = document.getElementById("card-room");
        cardRoom.style.display = "flex";

        const cardWrap = document.getElementById("card-wrap");
        cardWrap.innerHTML = "";
        for(let i=0; i<totalCards; i++) {
            const card = document.createElement("div");
            card.className = "draw-card";
            card.innerHTML = "❔";
            card.onclick = () => {
                if(!card.classList.contains("flipped")) {
                    socket.emit("draw_card", myRoomCode);
                }
            };
            cardWrap.appendChild(card);
        }
    });

    socket.on("card_drawn_event", ({ playerId, cardValue }) => {
        const cards = document.querySelectorAll(".draw-card");
        const unflipped = Array.from(cards).filter(c => !c.classList.contains("flipped"));
        if(unflipped.length > 0) {
            const target = unflipped[0];
            target.classList.add("flipped");
            target.innerHTML = cardValue;
        }
    });

    socket.on("game_start_sync", ({ order, scoreboard, round, turnIndex }) => {
        document.getElementById("card-room").style.display = "none";
        document.getElementById("game-layout").style.display = "flex";
        buildScoreTable(scoreboard[myNickname]);
        updateProfileCards(order, turnIndex);
        setDicePositionsRandomly();
    });

    // 🎲 흔들기 마우스 피지컬 엔진 (진짜 컵 안으로 빨려 들어가 숨는 연출 구현)
  function startShakeDrag(e) {
        if(!isMyTurn || localRollsLeft <= 0) return;
        isDraggingCup = true;
        totalShakeDistance = 0;
        const pageX = e.pageX || e.touches[0].pageX;
        const pageY = e.pageY || e.touches[0].pageY;
        lastX = pageX;
        lastY = pageY;

        // 드래그를 대기하는 순간 킵하지 않은 주사위들을 즉시 컵 속에 격리 (수납 이펙트)
        hideUnkeptDiceInCup();

        document.addEventListener("mousemove", onShakeDrag);
        document.addEventListener("mouseup", endShakeDrag);
        document.addEventListener("touchmove", onShakeDrag);
        document.addEventListener("touchend", endShakeDrag);
    }

    function hideUnkeptDiceInCup() {
        const tray = document.getElementById("velvet-tray");
        const cup = document.getElementById("main-leather-cup"); // 무광 블랙 컵
        const cupRect = cup.getBoundingClientRect();
        const trayRect = tray.getBoundingClientRect();

        for(let i=0; i<5; i++) {
            const dice = document.getElementById(`dice-${i}`);
            if(!currentKeep[i]) {
                dice.classList.add("in-cup"); // CSS 무광 블랙 스펙 적용: 투명 및 축소 처리로 화면에서 감춤
                const relativeX = cupRect.left - trayRect.left + 40;
                const relativeY = cupRect.top - trayRect.top + 60;
                dice.style.left = `${relativeX}px`;
                dice.style.top = `${relativeY}px`;
            }
        }
    }

    function onShakeDrag(e) {
        if(!isDraggingCup) return;
        const pageX = e.pageX || (e.touches && e.touches[0].pageX);
        const pageY = e.pageY || (e.touches && e.touches[0].pageY);
        if(!pageX || !pageY) return;

        const dx = pageX - lastX;
        const dy = pageY - lastY;
        const distance = Math.sqrt(dx*dx + dy*dy);
        totalShakeDistance += distance;

        lastX = pageX;
        lastY = pageY;

        const cup = document.getElementById("main-leather-cup");
        const rot = (Math.random() - 0.5) * 20;
        cup.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;

        socket.emit("shake_cup", myRoomCode);
    }

    function endShakeDrag() {
        if(!isDraggingCup) return;
        isDraggingCup = false;
        
        document.removeEventListener("mousemove", onShakeDrag);
        document.removeEventListener("mouseup", endShakeDrag);
        document.removeEventListener("touchmove", onShakeDrag);
        document.removeEventListener("touchend", endShakeDrag);

        const cup = document.getElementById("main-leather-cup");
        cup.style.transform = "none";

        if(totalShakeDistance > shakeThreshold) {
            triggerDiceRoll();
        } else {
            // 충분히 흔들지 않고 마우스를 떼면 주사위들이 다시 트레이에 노출됩니다 (사기 불가!)
            resetDiceToTray();
            alert("조금 더 세차게 흔들어서 던져 주세요!");
        }
    }

    function resetDiceToTray() {
        for(let i=0; i<5; i++) {
            const dice = document.getElementById(`dice-${i}`);
            if(!currentKeep[i]) {
                dice.classList.remove("in-cup");
            }
        }
        setDicePositionsRandomly();
    }

    socket.on("cup_shaking", () => {
        const cup = document.getElementById("main-leather-cup");
        cup.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;
        setTimeout(() => cup.style.transform = "none", 100);
    });

    function putDiceInCup() {
        if(!isMyTurn) return;
        socket.emit("put_dice_in_cup", myRoomCode);
    }

    socket.on("dice_entered_cup", () => {
        hideUnkeptDiceInCup();
    });

    function triggerAutoRoll() {
        if(!isMyTurn || localRollsLeft <= 0) return;
        
        hideUnkeptDiceInCup(); // 오토 롤도 즉시 컵 속에 주사위 격리

        const cup = document.getElementById("main-leather-cup");
        let tick = 0;
        const interval = setInterval(() => {
            tick++;
            cup.style.transform = `translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) rotate(${(Math.random()-0.5)*40}deg)`;
            if(tick > 8) {
                clearInterval(interval);
                cup.style.transform = "none";
                triggerDiceRoll();
            }
        }, 80);
    }

    function triggerDiceRoll() {
        socket.emit("roll_dice", myRoomCode);
    }

// 💡 최종 수정된 dice_rolled 이벤트 (이걸로 교체하세요!)
    socket.on("dice_rolled", ({ dice, keep, rollsLeft }) => { // 1. 여기서 keep을 추가로 받아옵니다.
        currentDice = dice;
        currentKeep = keep; // 2. 서버가 들고 있는 실제 최신 킵 상태로 동기화합니다.
        localRollsLeft = rollsLeft;
        document.getElementById("roll-count-val").innerText = rollsLeft;

        const tray = document.getElementById("velvet-tray");
        const trayWidth = tray.clientWidth;
        const trayHeight = tray.clientHeight;

        for(let i=0; i<5; i++) {
            const diceElem = document.getElementById(`dice-${i}`);
            
            // 이제 동기화된 확실한 currentKeep 정보를 바탕으로 필드 주사위만 굴립니다!
            if(!currentKeep[i]) {
                diceElem.classList.remove("in-cup"); // 던져지면서 비로소 컵 밖으로 출현!
                diceElem.setAttribute("data-val", dice[i]);

                const randX = Math.floor(Math.random() * (trayWidth - 120)) + 30;
                const randY = Math.floor(Math.random() * (trayHeight - 120)) + 30;
                const randRot = Math.floor(Math.random() * 360);

                diceElem.style.left = `${randX}px`;
                diceElem.style.top = `${randY}px`;
                diceElem.style.transform = `rotate(${randRot}deg) scale(1.1)`;
                setTimeout(() => {
                    diceElem.style.transform = `rotate(${randRot}deg) scale(1.0)`;
                }, 150);
            }
        }
        updateScorePreview();
    });

    function toggleDice(index) {
        if(!isMyTurn) return;
        // 이미 컵 안에 숨겨져 섞이는 중인 주사위는 선택 불가
        const dice = document.getElementById(`dice-${index}`);
        if(dice.classList.contains("in-cup")) return;

        socket.emit("toggle_keep", { roomCode: myRoomCode, index: index });
    }

// 💡 최종 개선된 keep_updated 이벤트 (기존 함수를 이걸로 교체해 주세요!)
    socket.on("keep_updated", (keepState) => {
        currentKeep = keepState;
        for(let i=0; i<5; i++) {
            const dice = document.getElementById(`dice-${i}`);
            const slot = document.querySelector(`.hold-slot[data-idx="${i}"]`);
            
            if(keepState[i]) {
                // 1) 킵 설정: 홈(Hold Slot)으로 이동
                slot.appendChild(dice);
                dice.classList.add("held");
                dice.classList.remove("in-cup");
                
                // 💡 [수정] 강제 좌표를 제거하고 position을 static으로 바꿔 홈 정중앙에 딱 맞게 고정합니다.
                dice.style.position = "static"; 
                dice.style.left = "";
                dice.style.top = "";
                dice.style.transform = "none";
                slot.classList.add("active");
            } else {
                // 2) 킵 해제: 필드(Velvet Tray)로 탈출
                const tray = document.getElementById("velvet-tray");
                tray.appendChild(dice);
                dice.classList.remove("held");
                dice.classList.remove("in-cup");
                slot.classList.remove("active");
                
                // 💡 [수정] 필드에서는 마우스 드래그나 자유 배치가 되도록 position: absolute를 명시해 줍니다.
                dice.style.position = "absolute";
                
                const trayWidth = tray.clientWidth;
                const trayHeight = tray.clientHeight;
                const randX = Math.floor(Math.random() * (trayWidth - 120)) + 30;
                const randY = Math.floor(Math.random() * (trayHeight - 120)) + 30;
                dice.style.left = `${randX}px`;
                dice.style.top = `${randY}px`;
                dice.style.transform = `rotate(${Math.random()*360}deg)`;
            }
        }
        updateScorePreview();
    });

    function buildScoreTable(myScores) {
        const rowsWrap = document.getElementById("scoreboard-rows");
        rowsWrap.innerHTML = "";

        const keys = ['ace', 'dual', 'triple', 'quad', 'penta', 'hexa', 'bonus', 'choice', 'poker', 'fullhouse', 's_straight', 'l_straight', 'yacht', 'total'];
        
        keys.forEach(key => {
            const tr = document.createElement("tr");
            
            if(key === 'bonus') {
                tr.className = "bonus-row";
                tr.innerHTML = `
                    <td class="category-name">🎁 상단 보너스 (63점 이상 시)</td>
                    <td id="cell-bonus">${myScores.bonus > 0 ? '+35점 달성!' : '0 / 63'}</td>
                `;
            } else if(key === 'total') {
                tr.className = "total-row";
                tr.innerHTML = `
                    <td>🏆 총합 합계</td>
                    <td id="cell-total">${myScores.total}점</td>
                `;
            } else {
                const displayVal = myScores[key] !== null ? `${myScores[key]}점` : "";
                const isFilledClass = myScores[key] !== null ? "filled" : "empty";
                
                tr.innerHTML = `
                    <td class="category-name">${categoryLabels[key]}</td>
                    <td class="score-cell ${isFilledClass}" id="cell-${key}" data-cat="${key}" onclick="clickScoreCell('${key}')" data-preview="">${displayVal}</td>
                `;
            }
            rowsWrap.appendChild(tr);
        });
    }

    function updateScorePreview() {
        const cells = document.querySelectorAll(".score-cell.empty");
        cells.forEach(cell => {
            const cat = cell.getAttribute("data-cat");
            const previewScore = simulateLocalScore(cat, currentDice);
            cell.setAttribute("data-preview", previewScore + "점");
        });
    }

    function clickScoreCell(category) {
        if(!isMyTurn) return;
        const cell = document.getElementById(`cell-${category}`);
        if(cell.classList.contains("filled")) return;

        selectedCategoryToRecord = category;
        const finalScore = simulateLocalScore(category, currentDice);

        document.getElementById("modal-desc").innerHTML = `[${categoryLabels[category]}] 칸에<br><b style="font-size:24px; color:#ff5500;">${finalScore}점</b>을 기입하시겠습니까?`;
        document.getElementById("score-confirm-modal").style.display = "flex";
    }

    function confirmRecordScore() {
        socket.emit("record_score", { roomCode: myRoomCode, category: selectedCategoryToRecord });
        closeConfirmModal();
    }

    function closeConfirmModal() {
        document.getElementById("score-confirm-modal").style.display = "none";
    }

    socket.on("sync_game_state", ({ dice, keep, rollsLeft, turnIndex, round }) => {
        currentDice = dice;
        currentKeep = keep;
        localRollsLeft = rollsLeft;
        document.getElementById("roll-count-val").innerText = rollsLeft;
        
        // 싱크 동기화가 이루어질 때도 던질 기회가 남은 주사위들은 컵 속에 즉시 대기 격리
        if (isMyTurn && localRollsLeft > 0) {
            hideUnkeptDiceInCup();
        }
    });

    socket.on("score_recorded", ({ playerName, category, score, scoreboard, triggerEffect }) => {
        if(playerName === myNickname) {
            buildScoreTable(scoreboard[myNickname]);
        }

        if(triggerEffect === 'yacht_boom') {
            triggerConfettiExplosion();
            triggerHapticVibration([100, 50, 100, 50, 200, 100, 500]);
        } else if(triggerEffect === 'fullhouse_epic') {
            triggerConfettiShower();
            triggerHapticVibration([200, 100, 200]);
        } else if(triggerEffect === 'quad_nice') {
            triggerConfettiBurst();
            triggerHapticVibration([100, 100]);
        }
    });

    socket.on("turn_changed", ({ turnIndex, round }) => {
        const order = Array.from(document.querySelectorAll(".profile-card")).map(card => {
            return { id: card.getAttribute("data-sid"), name: card.getAttribute("data-pname") };
        });
        updateProfileCards(order, turnIndex);

        // 💡 [수정] 턴이 바뀌었을 때 트레이에 주사위를 뿌려버리던 기존 함수 제거
        // 새로운 턴이 되었을 때, 던지기 전이므로 킵하지 않은 주사위들은 컵 속으로 숨겨져야 합니다.
        hideUnkeptDiceInCup();
    });

    let inactiveTimer = null;
    socket.on("inactive_player_detected", () => {
        if(amIHost) {
            clearTimeout(inactiveTimer);
            inactiveTimer = setTimeout(() => {
                socket.emit("skip_inactive_player", myRoomCode);
            }, 7000);
        }
    });

    function triggerConfettiExplosion() {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        confetti({ particleCount: 100, spread: 120, origin: { x: 0.2, y: 0.5 } });
        confetti({ particleCount: 100, spread: 120, origin: { x: 0.8, y: 0.5 } });
    }

    function triggerConfettiShower() {
        var end = Date.now() + (1.5 * 1000);
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    function triggerConfettiBurst() {
        confetti({ particleCount: 40, spread: 45, origin: { y: 0.7 } });
    }

    function triggerHapticVibration(pattern) {
        if ("vibrate" in navigator) {
            navigator.vibrate(pattern);
        }
    }

    socket.on("game_finished", (finalScoreboard) => {
        const screen = document.getElementById("game-over-screen");
        screen.style.display = "flex";

        const listWrap = document.getElementById("final-ranking-wrap");
        listWrap.innerHTML = "";

        const playersList = Object.keys(finalScoreboard).map(name => {
            return { name: name, total: finalScoreboard[name].total };
        }).sort((a,b) => b.total - a.total);

        playersList.forEach((p, idx) => {
            const item = document.createElement("div");
            item.className = `ranking-item ${idx === 0 ? 'first' : ''}`;
            item.innerHTML = `
                <span>👑 ${idx + 1}등 : ${p.name}</span>
                <span>${p.total} 점</span>
            `;
            listWrap.appendChild(item);
        });

        triggerConfettiExplosion();
    });

    function updateProfileCards(order, currentTurnIndex) {
        const wrap = document.getElementById("profile-wrap");
        wrap.innerHTML = "";

        isMyTurn = false;

        order.forEach((p, idx) => {
            const isActive = idx === currentTurnIndex;
            if(isActive && p.name === myNickname) {
                isMyTurn = true;
            }

            const card = document.createElement("div");
            card.className = `profile-card ${isActive ? 'active' : ''}`;
            card.setAttribute("data-sid", p.id);
            card.setAttribute("data-pname", p.name);
            card.innerHTML = `
                <div class="profile-name">${p.name}</div>
                <div class="profile-status">${isActive ? '플레이 중!' : '대기'}</div>
                ${p.name === myNickname ? '<span class="profile-badge">나</span>' : ''}
            `;
            wrap.appendChild(card);
        });
    }

    function setDicePositionsRandomly() {
        for(let i=0; i<5; i++) {
            const dice = document.getElementById(`dice-${i}`);
            const tray = document.getElementById("velvet-tray");
            tray.appendChild(dice);
            dice.classList.remove("held");
            dice.classList.remove("in-cup"); // 턴 시작 시 노출 상태 복구

            const rx = Math.floor(Math.random() * 150) + 100;
            const ry = Math.floor(Math.random() * 150) + 150;
            dice.style.left = `${rx}px`;
            dice.style.top = `${ry}px`;
            dice.style.transform = `rotate(${Math.random()*360}deg)`;
        }
    }

    function simulateLocalScore(category, dice) {
        const counts = Array(7).fill(0);
        let sum = 0;
        dice.forEach(v => { counts[v]++; sum += v; });

        switch(category) {
            case 'ace': return counts[1] * 1;
            case 'dual': return counts[2] * 2;
            case 'triple': return counts[3] * 3;
            case 'quad': return counts[4] * 4;
            case 'penta': return counts[5] * 5;
            case 'hexa': return counts[6] * 6;
            case 'choice': return sum;
            case 'poker':
                for(let i=1; i<=6; i++) if(counts[i] >= 4) return i * 4;
                return 0;
            case 'fullhouse':
                let has3 = false, has2 = false;
                for(let i=1; i<=6; i++) {
                    if(counts[i] === 3) has3 = true;
                    if(counts[i] === 2) has2 = true;
                    if(counts[i] === 5) { has3 = true; has2 = true; }
                }
                return (has3 && has2) ? sum : 0;
            case 's_straight':
                const uStr = [...new Set(dice)].sort().join('');
                if(uStr.includes('1234') || uStr.includes('2345') || uStr.includes('3456')) return 15;
                return 0;
            case 'l_straight':
                const sStr = [...dice].sort().join('');
                if(sStr === '12345' || sStr === '23456') return 30;
                return 0;
            case 'yacht':
                for(let i=1; i<=6; i++) if(counts[i] === 5) return 50;
                return 0;
            default: return 0;
        }
    }
</script>
</body>
</html>
