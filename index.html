<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Yacht Dice Deluxe</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark-gray: #121212;
            --bg-panel: #1e1e1e;
            --velvet-burgundy: #580f11; 
            --outer-black: #080808;      
            --accent-gold: #d4af37;
            --paper-white: #f5f5ee;      
            --paper-border: #cccccc;
        }
        body {
            background-color: var(--bg-dark-gray);
            color: #f5f5f5;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        
        #main-home, #waiting-lobby {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid #333;
            padding: 30px;
            margin-top: 50px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .main-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 30px;
        }
        .flat-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: #fff;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5c060, #d39325);
            color: #0d0d0d;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-outline {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-action {
            background: #e65100;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn-action:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #game-arena {
            display: flex;
            flex-direction: column;
            width: 98%;
            max-width: 1200px;
            margin: 15px auto;
        }
        .room-tag {
            text-align: center;
            font-size: 14px;
            background: var(--bg-panel);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #board-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            align-items: flex-start;
        }

        /* [좌측] 게임판 */
        #outer-board {
            flex: 1.2;
            background-color: var(--outer-black);
            border: 6px solid #222;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            aspect-ratio: 1 / 1;
        }

        .dice-slots-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 15px;
        }
        .dice-slot {
            flex: 1;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
        }

        #inner-velvet-field {
            flex: 1;
            background-color: var(--velvet-burgundy);
            border-radius: 16px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid #3d0709;
        }

        #active-dice-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        /* [중앙] 흔들기 구역 */
        #cup-shaker-zone {
            width: 160px;
            height: 420px;
            background: #181818;
            border: 2px dashed #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
            box-sizing: border-box;
            position: relative;
        }
        .zone-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            line-height: 1.4;
            pointer-events: none;
            user-select: none;
        }

        /* 가죽 컵 (드래그 시 body 전체 영역 탈출을 위해 position: fixed로 동적 제어) */
        #dice-cup {
            width: 90px;
            height: 120px;
            background: linear-gradient(135deg, #3a2212 0%, #1c0e05 100%);
            border-left: 5px solid #28170b;
            border-right: 5px solid #28170b;
            border-top: 3px solid var(--accent-gold);
            border-bottom: 8px solid #100803;
            border-radius: 40px / 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 5px 15px rgba(255,255,255,0.05);
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            z-index: 9999; /* 화면 최상단에 뜨도록 설계 */
            touch-action: none;
            user-select: none;
            transition: transform 0.05s linear;
        }
        #dice-cup::after {
            content: '';
            position: absolute;
            bottom: 12px;
            width: 80%;
            height: 2px;
            background: #d4af37;
            opacity: 0.4;
        }
        #dice-cup:active { cursor: grabbing; }
        .cup-inner-text {
            color: var(--accent-gold);
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* [우측] 스코어판 */
        #scoreboard-section {
            flex: 1.4;
            background: var(--paper-white);
            color: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            box-sizing: border-box;
            overflow-x: auto;
        }
        .paper-title {
            font-size: 24px;
            font-weight: 900;
            text-align: left;
            margin: 0 0 15px 0;
            color: #111;
            letter-spacing: -1px;
        }
        
        .close-score-btn {
            display: none;
            background: #cc1111;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 320px;
        }
        th, td {
            border: 1px solid #c0c0b8;
            padding: 8px 5px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background: #e2e2da;
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }
        .category-label {
            text-align: left;
            padding-left: 10px;
            font-weight: bold;
            color: #222;
            min-width: 130px;
        }
        .score-cell {
            font-weight: 900;
            color: #888;
            background: rgba(0,0,0,0.02);
            transition: background 0.15s;
        }
        .score-cell.interactive {
            cursor: pointer;
        }
        .score-cell.confirmed {
            color: #1a1a1a;
            background: transparent;
            cursor: default;
        }
        .score-cell.active-preview {
            background: #ffe0b2 !important;
            color: #e65100 !important;
            font-size: 12px;
            border: 2px dashed #fb8c00;
        }
        .gray-row {
            background: #e9e9e2;
            font-weight: bold;
        }

        /* ----------------------------------
           🎨 진짜 주사위 눈 디자인 (CSS Grid)
        ---------------------------------- */
        .dice {
            width: 54px;
            height: 54px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 -4px 0 #d9d9d9;
            cursor: pointer;
            user-select: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 6px;
            box-sizing: border-box;
            position: relative;
            transition: transform 0.1s ease, opacity 0.5s ease;
        }
        .dice.held {
            border: 3px solid var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold), inset 0 -4px 0 #d9d9d9;
        }
        
        /* 주사위 점 */
        .dot {
            background-color: #111111;
            border-radius: 50%;
            width: 8px;
            height: 8px;
            justify-self: center;
            align-self: center;
        }
        
        /* 1의 눈은 정중앙에 위치하는 커다랗고 빨간색 도트 */
        .dice[data-value="1"] {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dice[data-value="1"] .dot {
            width: 14px;
            height: 14px;
            background-color: #d32f2f;
        }

        /* 각 주사위 값에 따른 그리드 배치 정의 */
        .dice[data-value="2"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .dice[data-value="2"] .dot:nth-child(2) { grid-area: 3 / 3; }

        .dice[data-value="3"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .dice[data-value="3"] .dot:nth-child(2) { grid-area: 2 / 2; }
        .dice[data-value="3"] .dot:nth-child(3) { grid-area: 3 / 3; }

        .dice[data-value="4"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .dice[data-value="4"] .dot:nth-child(2) { grid-area: 1 / 3; }
        .dice[data-value="4"] .dot:nth-child(3) { grid-area: 3 / 1; }
        .dice[data-value="4"] .dot:nth-child(4) { grid-area: 3 / 3; }

        .dice[data-value="5"] .dot:nth-child(1) { grid-area: 1 / 1; }
        .dice[data-value="5"] .dot:nth-child(2) { grid-area: 1 / 3; }
        .dice[data-value="5"] .dot:nth-child(3) { grid-area: 2 / 2; }
        .dice[data-value="5"] .dot:nth-child(4) { grid-area: 3 / 1; }
        .dice[data-value="5"] .dot:nth-child(5) { grid-area: 3 / 3; }

        .dice[data-value="6"] .dot:nth-child(1) { grid-area: 1 / 1; }
